	<script>
		var editor = PKAudioEditor.init ('app');
		if ('serviceWorker' in navigator && location.protocol !== 'file:') {
			window.addEventListener('load', function () {
				try {
					var rl = 0;
					function showUpdateNotice ( sw ) {
						if (document.getElementById('pk_upd')) return;
						var el = document.createElement('div');
						el.id = 'pk_upd';
						el.className = 'pk_oneup';
						el.style.cssText = 'top:58px;margin-top:0;opacity:1;transform:translateX(-50%);pointer-events:auto;font-size:13px';
						el.innerHTML = PKLocale.t('pwa.new_version') + ' <button class="pk_modal_a_bottom pk_modal_a_accpt" style="float:none;display:inline-block;margin-left:10px">' + PKLocale.t('pwa.reload') + '</button>';
						document.body.appendChild(el);
						el.getElementsByTagName('button')[0].onclick = function () {
							rl = 1;
							sw && sw.postMessage('SKIP_WAITING');
							setTimeout(function () { location.reload(); }, 900);
						};
					}
					navigator.serviceWorker.addEventListener('controllerchange', function () {
						if (rl) location.reload();
					});
					navigator.serviceWorker.register('sw.js').then(function (r) {
						function check (sw) {
							sw && (sw.state === 'installed' && navigator.serviceWorker.controller
								? showUpdateNotice(sw)
								: sw.onstatechange = function () {
									sw.state === 'installed' && navigator.serviceWorker.controller && showUpdateNotice(sw);
								});
						}
						r.waiting && navigator.serviceWorker.controller && showUpdateNotice(r.waiting);
						check(r.installing);
						r.onupdatefound = function () { check(r.installing); };
					});
				} catch (error) {}
			});
		}
	</script>
</body>
