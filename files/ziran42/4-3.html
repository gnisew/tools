<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能源與電路：串聯和並聯</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Phosphor Icons 做為圖示庫 -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* 隱藏捲軸但保留捲動功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 零干擾平滑動畫設計 */
    .fade-transition {
      transition: opacity 0.4s ease-in-out, background-color 0.4s ease-in-out, border-color 0.4s ease-in-out, color 0.4s ease-in-out, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), height 0.4s ease-in-out;
    }

    /* 電流流動動畫 (調慢速度) */
    @keyframes circuit-flow {
      from { stroke-dashoffset: 56; }
      to { stroke-dashoffset: 0; }
    }
    .animate-circuit-flow {
      animation: circuit-flow 8s linear infinite;
    }
	/* 電池串聯時的快速電流 */
    .animate-circuit-flow-fast {
      animation: circuit-flow 2s linear infinite; /* 把時間從 3.5s 縮短到 2s，速度變快！ */
    }

    /* 正常發光閃爍動畫 */
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.6)); }
      50% { filter: drop-shadow(0 0 25px rgba(250, 204, 21, 1)); }
    }
    .animate-glow {
      animation: glow-pulse 2s ease-in-out infinite;
    }
    
    /* 爆亮特效 (電池串聯時) */
    @keyframes super-glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 25px rgba(250, 204, 21, 0.9)); }
      50% { filter: drop-shadow(0 0 50px rgba(250, 204, 21, 1)); }
    }
    .animate-super-glow {
      animation: super-glow-pulse 1.5s ease-in-out infinite;
    }
    
    /* 黯淡特效 (燈泡串聯時) */
    @keyframes dim-glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 5px rgba(250, 204, 21, 0.3)); }
      50% { filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5)); }
    }
    .animate-dim-glow {
      animation: dim-glow-pulse 3s ease-in-out infinite;
    }

    /* 斷路/壞掉狀態 */
    .broken-bulb {
      color: #64748B;
      filter: none;
      transform: scale(0.95);
      opacity: 0.5;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-16 min-h-screen">

  <!-- 標題列：環保沉穩色系，取消 sticky 以最大化可視空間 -->
  <header class="bg-slate-700 text-white p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="ph-fill ph-plugs text-3xl text-amber-400"></i>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-wider">串聯和並聯</h1>
      </div>
    </div>
  </header>

  <!-- 全解鎖導航列 -->
  <div id="progress-container" class="max-w-6xl mx-auto px-4 pt-6 fade-transition">
    <div class="bg-white p-4 rounded-2xl shadow-sm border-2 border-slate-200 flex flex-wrap justify-between items-center gap-2 overflow-x-auto hide-scrollbar" id="progress-bar">
      <!-- JS 渲染進度條 -->
    </div>
  </div>

  <main id="main-content" class="max-w-6xl mx-auto p-4 mt-4 fade-transition">
    <!-- JS 渲染內容 -->
  </main>

  <script>
    // --- 實用的隨機洗牌函數 ---
    function shuffleArray(array) {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    }

    // --- 系統狀態管理 ---
    const steps = ['welcome', 'battery', 'bulb', 'compare', 'quiz'];
    let currentStepIndex = 0;
    
    // 各大關卡的細部任務進度
    let batProgress = 0;    
    let bulbProgress = 0;  
    let compProgress = 0;   

    // 電池實驗室狀態 (採用 BAK 的精緻模組)
    let batState = { conn: '1', cond: 'normal' }; // conn: '1', 's', 'p'. cond: 'normal', 'cut', 'dead'
    let batTestedS = false;
    let batTestedP = false;

    // 燈泡實驗室狀態 (採用 BAK 的精緻模組)
    let bulbState = { conn: '1', cond: 'normal' }; // conn: '1', 's', 'p'. cond: 'normal', 'cut', 'dead'
    let bulbTestedS = false;
    let bulbTestedP = false;

    // 分類遊戲狀態 (串聯 vs 並聯)
    const baseSortItems = [
      { id: 1, text: '電池：正極連接另一顆的負極', type: 'series', emoji: '🔋', desc: '這是一直線接下去的接法' },
      { id: 2, text: '電池：讓燈泡變得更亮', type: 'series', emoji: '✨', desc: '電壓相加，燈泡非常亮' },
      { id: 3, text: '電池：正接正、負接負', type: 'parallel', emoji: '🔋', desc: '並排連接的接法' },
      { id: 4, text: '燈泡：一顆壞掉，全部都不亮', type: 'series', emoji: '❌', desc: '只有一條路，斷掉就沒電了' },
      { id: 5, text: '燈泡：一顆壞掉，其他繼續亮', type: 'parallel', emoji: '💡', desc: '有不同的分支路線可以走' },
      { id: 6, text: '日常：手電筒裡的電池接法', type: 'series', emoji: '🔦', desc: '為了讓手電筒夠亮' },
      { id: 7, text: '日常：家裡電燈的接法', type: 'parallel', emoji: '🏠', desc: '客廳燈壞了，房間燈還是會亮' }
    ];
    let sortItems = [];
    let sortCurrentIndex = 0;
    let sortFeedback = null;

    // --- 最終測驗題庫池 ---
    const rawQuizPools = [
      [ // 概念1：電池串聯
        { q: "在通路中，把電池的『正極』連接另一顆電池的『負極』，這稱為什麼？", options: ["電池串聯", "電池並聯", "燈泡串聯", "燈泡並聯"], answer: 0 },
        { q: "手電筒為了讓燈泡能發出更亮的光，裡面的電池通常是採用什麼連接方式？", options: ["電池串聯", "電池並聯", "燈泡並聯", "隨便亂塞"], answer: 0 }
      ],
      [ // 概念2：電池並聯
        { q: "將兩顆電池的『正極接正極』、『負極接負極』，這稱為什麼？", options: ["電池並聯", "電池串聯", "燈泡串聯", "斷路"], answer: 0 },
        { q: "關於『電池並聯』的特性，下列哪一個敘述是正確的？", options: ["拿掉其中一顆電池，燈泡依然會亮", "燈泡會變得超級無敵亮", "拿掉其中一顆電池，燈泡就不亮了", "正極必須接負極"], answer: 0 }
      ],
      [ // 概念3：燈泡串聯
        { q: "將兩顆燈泡接在『同一條』通路上，如果其中一顆燈泡壞了，會發生什麼事？", options: ["另一顆燈泡也不會亮", "另一顆燈泡會變得更亮", "另一顆燈泡還是會繼續亮", "會發生爆炸"], answer: 0 },
        { q: "下列關於『燈泡串聯』的敘述，哪一個是正確的？", options: ["只要有一顆燈泡壞掉，整個電路就會變成斷路", "燈泡是並排連接在不同的分支上", "其中一顆壞掉不影響其他的燈泡", "家裡的電燈都是串聯的"], answer: 0 }
      ],
      [ // 概念4：燈泡並聯
        { q: "將兩顆燈泡分別接在『不同』的電線分支上，如果其中一顆燈泡壞了，另一顆會怎樣？", options: ["仍然會繼續發亮", "一定會跟著熄滅", "會一閃一閃的", "會變成其他顏色"], answer: 0 },
        { q: "家裡的客廳電燈壞了，但房間的電燈還是可以正常發亮，這是因為家裡的電燈採用什麼連接方式？", options: ["燈泡並聯", "燈泡串聯", "電池串聯", "電池並聯"], answer: 0 }
      ],
      [ // 概念5：電池串並聯比較
        { q: "在同樣只有一顆燈泡的電路中，『兩顆電池串聯』和『兩顆電池並聯』相比，哪一種接法會讓燈泡比較亮？", options: ["兩顆電池串聯比較亮", "兩顆電池並聯比較亮", "兩種接法一樣亮", "燈泡都不會亮"], answer: 0 },
        { q: "關於電池連接的敘述，哪一個是錯誤的？", options: ["電池並聯可以讓燈泡變得更亮", "電池串聯是正極接負極", "電池並聯是正接正、負接負", "手電筒大多使用電池串聯"], answer: 0 }
      ],
      [ // 概念6：燈泡串並聯比較
        { q: "如果想要在聖誕樹上掛很多燈泡，且希望『一顆燈泡壞掉時，其他的燈泡還能繼續亮』，應該採用什麼接法？", options: ["燈泡並聯", "燈泡串聯", "電池串聯", "都不接電線"], answer: 0 },
        { q: "『燈泡串聯』和『燈泡並聯』最大的差別是什麼？", options: ["一顆壞掉時，另一顆會不會繼續亮", "燈泡的顏色會不會改變", "需不需要使用電池", "開關能不能控制燈泡"], answer: 0 }
      ],
      [ // 概念7：電池正負極常識
        { q: "一般常見的乾電池，凸起的一端和扁平的一端分別稱為什麼？", options: ["凸起是正極，扁平是負極", "凸起是負極，扁平是正極", "兩端都是正極", "兩端都是負極"], answer: 0 },
        { q: "將小燈泡、電池和電線連接形成電路，如果小燈泡發亮了，我們稱這個電路為什麼？", options: ["通路", "斷路", "短路", "死路"], answer: 0 }
      ],
      [ // 概念8：簡易開關與導體
        { q: "如果想用生活中的物品製作簡易開關，下列哪一種物品最適合接在電路中讓電流通過？", options: ["鐵製的迴紋針", "塑膠尺", "木頭鉛筆", "橡皮擦"], answer: 0 },
        { q: "鐵製迴紋針可以讓電流通過，所以我們稱它為什麼？", options: ["電的良導體", "電的不良導體", "絕緣體", "電池"], answer: 0 }
      ],
      [ // 概念9：綜合觀念
        { q: "下列哪一種組合的電路，燈泡會最亮？", options: ["兩顆電池串聯，接一顆燈泡", "兩顆電池並聯，接一顆燈泡", "一顆電池，接一顆燈泡", "一顆電池，接兩顆串聯的燈泡"], answer: 0 },
        { q: "在電路中增加電池的數量並採用『串聯』，會對電路造成什麼最明顯的影響？", options: ["燈泡變亮", "燈泡變暗", "燈泡一定會燒壞", "電路完全沒有變化"], answer: 0 }
      ],
      [ // 概念10：生活應用
        { q: "電器如果沒有電就無法運作，所以日常生活中我們應該怎麼做？", options: ["節約用電，隨手關燈", "把家裡的燈全部打開", "冷氣開越冷越好", "冰箱門一直開著"], answer: 0 },
        { q: "關於生活中的電路，下列哪一個敘述是『錯誤』的？", options: ["鐵絲是電的不良導體，不能用來接電線", "電線通常外面會包覆塑膠來絕緣防觸電", "開關可以控制電路形成通路或斷路", "燈泡發光表示電路形成通路"], answer: 0 }
      ]
    ];

    let quizState = 'dashboard'; 
    let quizData = [];
    let quizCurrentQ = 0;
    let quizScore = 0;
    let quizSelectedOption = null;
    let quizIsAnswered = false;
    let quizStartTime = 0;
    const LOCAL_STORAGE_KEY = '42hz43';

    function initQuizData() {
      quizData = rawQuizPools.map(pool => {
        const qRaw = pool[Math.floor(Math.random() * pool.length)];
        const correctOpt = qRaw.options[qRaw.answer];
        const shuffledOptions = shuffleArray(qRaw.options);
        return {
          question: qRaw.q,
          options: shuffledOptions,
          answer: shuffledOptions.indexOf(correctOpt)
        };
      });
    }

    function formatDuration(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const mins = Math.floor(totalSecs / 60);
      const secs = totalSecs % 60;
      return `${mins}分 ${secs}秒`;
    }

    function jumpToStep(index) {
      currentStepIndex = index;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderProgressBar() {
      const bar = document.getElementById('progress-bar');
      const stages = [
        { name: '出發', icon: 'ph-flag-pennant', th: 'emerald' },
        { name: '電池實驗', icon: 'ph-battery-charging-vertical', th: 'amber' },
        { name: '燈泡實驗', icon: 'ph-lightbulb', th: 'sky' },
        { name: '綜合比較', icon: 'ph-scales', th: 'teal' },
        { name: '最終測驗', icon: 'ph-file-question', th: 'indigo' },
      ];

      let html = '';
      stages.forEach((stage, idx) => {
        const isActive = currentStepIndex === idx;
        const isPassed = (idx === 1 && batProgress >= 3) || 
                         (idx === 2 && bulbProgress >= 3) || 
                         (idx === 3 && compProgress >= 3);

        let iconHtml = isPassed ? '<i class="ph-fill ph-check-circle text-xl"></i>' : `<i class="ph-fill ${stage.icon} text-xl"></i>`;
        
        let circleClass = `w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-sm fade-transition `;
        if (isActive) circleClass += `bg-${stage.th}-500 ring-4 ring-${stage.th}-200`;
        else if (isPassed) circleClass += `bg-emerald-400`;
        else circleClass += `bg-slate-300`;

        let textClass = `text-xs font-bold whitespace-nowrap mt-1 ${isActive ? `text-${stage.th}-600` : 'text-slate-500'}`;

        html += `
          <div class="flex items-center">
            <button onclick="jumpToStep(${idx})" class="flex flex-col items-center px-2 py-1 fade-transition cursor-pointer hover:bg-slate-50 rounded-lg">
              <div class="${circleClass}">${iconHtml}</div>
              <span class="${textClass}">${stage.name}</span>
            </button>
        `;
        if (idx < stages.length - 1) {
          html += `<div class="hidden sm:block w-8 md:w-12 h-1 rounded-full mx-1 ${isPassed ? 'bg-emerald-300' : 'bg-slate-200'}"></div>`;
        }
        html += `</div>`;
      });
      bar.innerHTML = html;
    }

    // --- 共用 SVG 繪製函數 (From BAK) ---
    function drawBattery(x, y, isDead=false) {
        if (isDead) {
            return `
            <g transform="translate(${x-50}, ${y-30})" class="transition-all duration-500 opacity-60 grayscale">
               <rect x="100" y="15" width="10" height="30" fill="#475569" rx="3"/>
               <rect x="0" y="0" width="100" height="60" rx="8" fill="#cbd5e1" stroke="#94a3b8" stroke-width="5"/>
               <text x="50" y="38" font-size="24" font-weight="bold" fill="#64748b" text-anchor="middle">沒電</text>
            </g>
            `;
        }
        return `
        <g transform="translate(${x-50}, ${y-30})" class="transition-all duration-500">
           <rect x="100" y="15" width="10" height="30" fill="#475569" rx="3"/>
           <rect x="0" y="0" width="100" height="60" rx="8" fill="url(#bat-grad-h)" stroke="#334155" stroke-width="5"/>
           <text x="25" y="40" font-size="32" font-weight="bold" fill="#1e293b" text-anchor="middle">-</text>
           <text x="75" y="40" font-size="32" font-weight="bold" fill="#1e293b" text-anchor="middle">+</text>
        </g>
        `;
    }

    function drawBulb(x, y, brightness, isDead=false) {
        // --- 1. 處理燈泡壞掉 (isDead) ---
        if (isDead) {
            return `
            <g transform="translate(${x-50}, ${y-50})" class="transition-all duration-300">
               <path d="M 30,85 L 70,85 L 70,40 L 50,60 L 30,40 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="4"/>
               <line x1="35" y1="85" x2="40" y2="40" stroke="#64748b" stroke-width="4"/>
               <line x1="65" y1="85" x2="60" y2="40" stroke="#64748b" stroke-width="4"/>
               <path d="M 40,40 L 45,25 M 55,25 L 60,40" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linejoin="round"/>
               <rect x="35" y="80" width="30" height="15" fill="#cbd5e1" stroke="#64748b" stroke-width="4"/>
               <rect x="16" y="96" width="16" height="12" fill="#facc15" stroke="#ca8a04" stroke-width="4" rx="4"/>
               <rect x="68" y="96" width="16" height="12" fill="#facc15" stroke="#ca8a04" stroke-width="4" rx="4"/>
               <rect x="28" y="75" width="44" height="35" fill="#facc15" stroke="#ca8a04" stroke-width="4" rx="6"/>
               <line x1="28" y1="88" x2="72" y2="88" stroke="#ca8a04" stroke-width="4" stroke-linecap="round"/>
               <line x1="28" y1="98" x2="72" y2="98" stroke="#ca8a04" stroke-width="4" stroke-linecap="round"/>
               <text x="50" y="10" font-size="32" text-anchor="middle" class="drop-shadow-md">💥</text>
            </g>
            `;
        }

        // --- 2. 處理正常發光 ---
        let glowClass = '';
        let fillClass = '#f8fafc';
        let strokeClass = '#cbd5e1';
        let filamentStroke = '#94a3b8';
        let flowOpacity = brightness > 0 ? 1 : 0;
        let rays = '';
        
        if (brightness > 0) {
            // 🌟 這裡修改：串聯時的底色改得更淡 (#fefce8)
            if (brightness === 1) { fillClass = '#fefce8'; filamentStroke = '#fbbf24'; glowClass = 'animate-dim-glow opacity-80'; }
            if (brightness === 2) { fillClass = '#fde047'; filamentStroke = '#ea580c'; glowClass = 'animate-glow opacity-100'; }
            if (brightness === 3) { fillClass = '#facc15'; filamentStroke = '#ea580c'; glowClass = 'animate-super-glow brightness-125'; strokeClass = '#fde047'; }
            
            const numRays = 12;
            const radiusInner = 55;
            // 🌟 這裡修改：串聯時 (brightness === 1) 的光線長度縮短到 61
            const radiusOuter = brightness === 3 ? 100 : (brightness === 1 ? 61 : 80);
            const rayStroke = brightness === 3 ? '#fbbf24' : '#fcd34d';
            const rayWidth = brightness === 3 ? 4 : 3;
            
            for (let i = 0; i < numRays; i++) {
                const angle = (i * 360 / numRays) * (Math.PI / 180);
                const x1 = 50 + radiusInner * Math.cos(angle);
                const y1 = 45 + radiusInner * Math.sin(angle);
                const x2 = 50 + radiusOuter * Math.cos(angle);
                const y2 = 45 + radiusOuter * Math.sin(angle);
                rays += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${rayStroke}" stroke-width="${rayWidth}" stroke-linecap="round" class="${glowClass}"/>`;
            }
        }

        return `
        <g transform="translate(${x-50}, ${y-50})" class="transition-all duration-300">
           ${rays}
           <circle cx="50" cy="45" r="40" fill="${fillClass}" stroke="${strokeClass}" stroke-width="4" class="${glowClass}"/>
           <line x1="35" y1="85" x2="40" y2="50" stroke="#64748b" stroke-width="4"/>
           <line x1="65" y1="85" x2="60" y2="50" stroke="#64748b" stroke-width="4"/>
           <path d="M 40,50 L 43,35 L 50,50 L 57,35 L 60,50" fill="none" stroke="${filamentStroke}" stroke-width="4" stroke-linejoin="round"/>
           <path d="M 40,50 L 43,35 L 50,50 L 57,35 L 60,50" fill="none" stroke="#fef08a" stroke-width="2" stroke-dasharray="4 4" class="animate-circuit-flow" style="opacity: ${flowOpacity}"/>
           
           <rect x="35" y="80" width="30" height="15" fill="#cbd5e1" stroke="#64748b" stroke-width="4"/>
           
           <rect x="16" y="96" width="16" height="12" fill="#facc15" stroke="#ca8a04" stroke-width="4" rx="4"/>
           <rect x="68" y="96" width="16" height="12" fill="#facc15" stroke="#ca8a04" stroke-width="4" rx="4"/>

                 <button onclick="setBulbConn('s')" class="py-2 px-5 rounded-xl font-bold border-2 fade-transition text-left flex justify-between items-center text-lg ${bulbState.conn==='s'?'bg-sky-100 border-sky-400 text-sky-800 ring-2 ring-sky-200':'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700'}"><span>💡 燈泡串聯</span> ${bulbState.conn==='s'?'✅':''}</button>

    // --- 區塊渲染：3. 綜合比較 (Teal) ---
    function renderCompare() {
      if (compProgress === 0 && sortItems.length === 0) {
        sortItems = shuffleArray(baseSortItems);
      }

      let content = `

      return html + `</div>`;

    window.handleSort = function(cat) {
      if (sortFeedback) return;
      const cur = sortItems[sortCurrentIndex];

        sortFeedback = null;
        if (cur.type === cat) {

        else if (quizScore >= 70) comment = "表現不錯喔！你已經成功掌握電路概念了。";

        return `
          <div class="bg-white rounded-3xl p-8 md:p-12 shadow-sm border-2 border-slate-200 text-center mt-4 fade-transition max-w-4xl mx-auto">
            <h2 class="text-5xl font-bold text-indigo-600 mb-6">測驗結束！</h2>
            <div class="text-8xl mb-6 drop-shadow-md">🏆</div>
            <p class="text-4xl font-bold mb-4">你的最終得分：<span class="${quizScore >= 80 ? 'text-emerald-500' : 'text-amber-500'}">${quizScore}</span> / 100</p>
            <p class="text-2xl text-slate-600 mb-10">${comment}</p>
            <button onclick="returnToQuizDashboard()" class="inline-flex items-center gap-3 bg-slate-200 hover:bg-slate-300 text-slate-700 px-8 py-4 rounded-full text-2xl font-bold fade-transition shadow-sm">
              <i class="ph-bold ph-list-dashes"></i> 查看紀錄面板
            </button>
          </div>
        `;
      }

      const q = quizData[quizCurrentQ];
      const optionLabels = ['A', 'B', 'C', 'D'];
      let content = `
        <div class="space-y-6 fade-transition max-w-4xl mx-auto">
          <div class="bg-indigo-50 border-l-8 border-indigo-500 p-5 rounded-r-2xl shadow-sm flex gap-4 items-center">
            <div class="text-4xl md:text-5xl">📝</div>
            <div>
              <h3 class="font-bold text-indigo-800 text-xl md:text-2xl">特攻隊考驗：最終總測驗</h3>
            </div>
          </div>

          <div class="bg-white rounded-3xl p-6 md:p-10 shadow-sm border-2 border-slate-200">
            <div class="flex justify-between items-center mb-6 pb-4 border-b-2 border-slate-100">
              <h2 class="text-2xl md:text-3xl font-bold text-indigo-700">知識挑戰賽</h2>
              <span class="text-lg md:text-xl font-bold bg-indigo-100 text-indigo-800 px-4 py-2 rounded-full shadow-sm">第 ${quizCurrentQ + 1} / ${quizData.length} 題</span>
            </div>
            <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-8 leading-relaxed flex items-start gap-3">
              <i class="ph-fill ph-question text-indigo-500 text-3xl shrink-0 mt-1"></i>
              <span>${q.question}</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
      `;

      q.options.forEach((opt, idx) => {
        let btnClass = "bg-slate-50 hover:bg-indigo-50 border-slate-200 text-slate-700";
        let iconHtml = '';
        if (quizIsAnswered) {
          if (idx === q.answer) {
            btnClass = "bg-emerald-50 border-emerald-400 text-emerald-800 font-bold ring-4 ring-emerald-200";
            iconHtml = '<i class="ph-fill ph-check-circle text-emerald-500 text-3xl shrink-0"></i>';
          } else if (idx === quizSelectedOption) {
            btnClass = "bg-rose-50 border-rose-300 text-rose-700 ring-4 ring-rose-200";
            iconHtml = '<i class="ph-fill ph-x-circle text-rose-500 text-3xl shrink-0"></i>';
          } else {
            btnClass = "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
          }
        }
        
        content += `
          <button onclick="handleQuizAnswer(${idx})" ${quizIsAnswered ? 'disabled' : ''} class="p-5 md:p-6 text-left text-xl rounded-2xl border-2 fade-transition flex items-center justify-between gap-3 shadow-sm ${btnClass}">
            <div class="flex items-center gap-4">
              <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-white shadow border border-slate-200 text-indigo-600 font-bold text-lg shrink-0">${optionLabels[idx]}</span>
              <span>${opt}</span>
            </div>
            ${iconHtml}
          </button>
        `;
      });
      content += `</div></div></div>`;
      return content;
    }

    window.startFinalQuiz = function() {
      initQuizData(); 
      quizCurrentQ = 0;
      quizScore = 0;
      quizIsAnswered = false;
      quizSelectedOption = null;
      quizStartTime = Date.now();
      quizState = 'playing';
      render();
    }

    window.handleQuizAnswer = function(idx) {
      if (quizIsAnswered) return;
      quizSelectedOption = idx; quizIsAnswered = true;
      if (idx === quizData[quizCurrentQ].answer) {
          quizScore += 10;
      }
      render();

      setTimeout(() => {
        if (quizCurrentQ + 1 < quizData.length) { 
          quizCurrentQ++; quizSelectedOption = null; quizIsAnswered = false; 
        } else { 
          const durationMs = Date.now() - quizStartTime;
          saveQuizRecord(quizScore, durationMs);
          quizState = 'result'; 
        }
        render();
      }, 1500); 
    }

    function saveQuizRecord(score, durationMs) {
      let history = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
      const now = new Date();
      const record = {
         date: now.toLocaleDateString('zh-TW'),
         time: now.toLocaleTimeString('zh-TW', { hour12: false }),
         score: score,
         duration: formatDuration(durationMs)
      };
      history.unshift(record); 
      history = history.slice(0, 5);
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(history));
    }

    window.returnToQuizDashboard = function() {
      quizState = 'dashboard';
      render();
    }

    // --- 共用小測驗產生器 ---
    const mcqStates = {};
    function renderMiniMCQ(id, title, qPool, isCompleted, theme) {
      if (!mcqStates[id]) {
        const varIdx = Math.floor(Math.random() * qPool.length);
        const qRaw = qPool[varIdx];
        const correctOpt = qRaw.opts[qRaw.a];
        const shuffledOpts = shuffleArray(qRaw.opts);
        const newAnsIdx = shuffledOpts.indexOf(correctOpt);
        mcqStates[id] = { selected: null, opts: shuffledOpts, ansIdx: newAnsIdx, varIdx: varIdx };
      }
      const st = mcqStates[id];
      const qRaw = qPool[st.varIdx];
      const th = 'text-' + theme + '-700';
      const bgComp = 'bg-' + theme + '-50 border-' + theme + '-200 opacity-90';

      let html = `<div class="bg-white rounded-2xl p-4 md:p-6 shadow-sm border-2 fade-transition ${isCompleted ? bgComp : 'border-slate-200'}">
          <h3 class="text-xl md:text-2xl font-bold mb-4 flex items-center justify-between ${th}">
            <span class="flex items-center gap-2"><i class="ph-fill ph-question"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-3xl"></i>' : ''}
          </h3>
          <p class="text-lg md:text-xl font-bold text-slate-800 mb-6">${qRaw.q}</p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

      st.opts.forEach((opt, idx) => {
        let cls = "bg-slate-50 border-slate-200 hover:bg-slate-100 text-base md:text-lg shadow-sm";
        if (isCompleted) { 
          cls = idx === st.ansIdx ? "bg-emerald-50 border-emerald-400 text-emerald-800 font-bold" : "bg-slate-50 text-slate-400 border-slate-100"; 
        } else if (st.selected === idx) { 
          cls = idx === st.ansIdx ? "bg-emerald-50 border-emerald-400 text-emerald-800 font-bold ring-2 ring-emerald-200" : "bg-rose-50 border-rose-300 text-rose-700 ring-2 ring-rose-200"; 
        }
        html += `<button onclick="handleMCQ('${id}', ${idx}, ${st.ansIdx})" ${isCompleted ? 'disabled' : ''} class="p-4 rounded-xl border-2 text-left font-bold fade-transition ${cls}">${opt}</button>`;
      });
      return html + `</div></div>`;
    }
    window.handleMCQ = function(id, selIdx, ansIdx) {
      if (mcqStates[id].selected !== null) return;
      mcqStates[id].selected = selIdx; render();
      if (selIdx === ansIdx) setTimeout(() => { progressTask(id); }, 600);
      else setTimeout(() => { mcqStates[id].selected = null; render(); }, 1000);
    }

    const tfStates = {};
    function renderMiniTF(id, title, qPool, isCompleted, theme) {
      if (!tfStates[id]) {
        const varIdx = Math.floor(Math.random() * qPool.length);
        tfStates[id] = { selected: null, varIdx: varIdx };
      }
      const st = tfStates[id];
      const qRaw = qPool[st.varIdx];
      const th = 'text-' + theme + '-700';
      const bgComp = 'bg-' + theme + '-50 border-' + theme + '-200 opacity-90';

      let html = `<div class="bg-white rounded-2xl p-4 md:p-6 shadow-sm border-2 fade-transition ${isCompleted ? bgComp : 'border-slate-200'}">
          <h3 class="text-xl md:text-2xl font-bold mb-4 flex items-center justify-between ${th}">
            <span class="flex items-center gap-2"><i class="ph-fill ph-check-square-offset"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-3xl"></i>' : ''}
          </h3>
          <p class="text-lg md:text-xl font-bold text-slate-800 mb-6">${qRaw.q}</p>
          <div class="flex gap-4 justify-center">`;
      
      const tCls = isCompleted ? (qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-slate-50 text-slate-400 border-slate-100") : (st.selected === true ? (qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-rose-50 border-rose-300 text-rose-700") : "bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700 shadow-sm");
      const fCls = isCompleted ? (!qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-slate-50 text-slate-400 border-slate-100") : (st.selected === false ? (!qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-rose-50 border-rose-300 text-rose-700") : "bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700 shadow-sm");

      html += `<button onclick="handleTF('${id}', true, ${qRaw.a})" ${isCompleted?'disabled':''} class="flex-1 max-w-[200px] p-4 rounded-xl border-2 text-2xl font-bold fade-transition text-center ${tCls}">⭕ 是</button>`;
      html += `<button onclick="handleTF('${id}', false, ${qRaw.a})" ${isCompleted?'disabled':''} class="flex-1 max-w-[200px] p-4 rounded-xl border-2 text-2xl font-bold fade-transition text-center ${fCls}">❌ 非</button>`;
      return html + `</div></div>`;
    }
    window.handleTF = function(id, sel, ans) {
      if (tfStates[id].selected !== null) return;
      tfStates[id].selected = sel; render();
      if (sel === ans) setTimeout(() => { progressTask(id); }, 600);
      else setTimeout(() => { tfStates[id].selected = null; render(); }, 1000);
    }

    const fillStates = {};
    function renderMiniFill(id, title, qPool, isCompleted, theme) {
      if (!fillStates[id]) {
        let bInit = {};
        const varIdx = Math.floor(Math.random() * qPool.length);
        const qRaw = qPool[varIdx];
        qRaw.ans.forEach((_, i) => { bInit['b'+(i+1)] = null; }); 
        
        let wordCards = [];
        qRaw.ans.forEach((a, i) => wordCards.push({ id: 'a'+i, text: a, correctBlank: 'b'+(i+1), c: 'bg-' + theme + '-100 text-' + theme + '-800' }));
        qRaw.distractors.forEach((d, i) => wordCards.push({ id: 'd'+i, text: d, correctBlank: 'none', c: 'bg-' + theme + '-100 text-' + theme + '-800' }));
        
        fillStates[id] = { b: bInit, sel: null, err: null, words: shuffleArray(wordCards), varIdx: varIdx, qRaw: qRaw };
      }
      const st = fillStates[id];
      const qRaw = qPool[st.varIdx];
      
      if (isCompleted) {
         st.qRaw.ans.forEach((a, i) => {
             st.b['b'+(i+1)] = {text: a};
         });
      }
      const th = 'text-' + theme + '-700';
      const bgComp = 'bg-' + theme + '-50 border-' + theme + '-200 opacity-90';

      let html = `<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ${isCompleted ? bgComp : 'border-slate-200'}">
          <h3 class="text-xl md:text-2xl font-bold ${th} mb-4 flex items-center justify-between">
            <span class="flex items-center gap-2"><i class="ph-fill ph-puzzle-piece"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-3xl"></i>' : ''}
          </h3>
          <p class="text-slate-600 mb-6 text-base font-bold">點擊字卡拿起來，填入正確的空格中！</p>`;

      if (!isCompleted) {
        html += `<div class="flex flex-wrap justify-center gap-3 mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-200 min-h-[4rem]">`;
        st.words.forEach(w => {
          const isUsed = Object.values(st.b).some(v => v && v.id === w.id);
          if (isUsed) { html += `<div class="w-20 opacity-0"></div>`; return; }
          const isSelected = st.sel?.id === w.id;
          let cls = `px-4 py-2 rounded-full font-bold text-lg md:text-xl transition-colors cursor-pointer shadow-sm ${w.c} ${isSelected ? 'ring-4 ring-' + theme + '-400' : 'hover:opacity-90'}`;
          html += `<button onclick="handleFillWord('${id}', '${w.id}')" class="${cls}">${w.text}</button>`;
        });
        html += `</div>`;
      }

      let contentHtml = st.qRaw.qParts[0];
      st.qRaw.ans.forEach((_, i) => {
        const key = 'b'+(i+1);
        const val = st.b[key];
        let boxHtml = '';
        if (val) {
          boxHtml = `<span class="inline-block mx-2 px-4 py-1 rounded-full text-white bg-emerald-500 align-middle leading-none shadow-sm">${val.text}</span>`;
        } else {
          const isErr = st.err === key;
          const isSel = !!st.sel && !isErr;
          let cls = `inline-block mx-2 min-w-[80px] h-10 border-b-4 border-dashed align-middle transition-colors outline-none ${isErr ? 'border-rose-500 bg-rose-50' : 'border-' + theme + '-400 bg-white/50'} ${isSel ? 'hover:bg-' + theme + '-100 cursor-pointer border-' + theme + '-500' : ''}`;
          boxHtml = `<button onclick="handleFillBox('${id}', '${key}')" class="${cls}"></button>`;
        }
        contentHtml += boxHtml + st.qRaw.qParts[i+1];
      });

      html += `<div class="text-xl md:text-2xl leading-loose font-bold text-slate-700 bg-${theme}-50 p-6 rounded-2xl border border-${theme}-200 shadow-inner">${contentHtml}</div></div>`;
      return html;
    }

    window.handleFillWord = function(id, wordId) {
      const st = fillStates[id];
      const wordObj = st.words.find(w => w.id === wordId);
      if (Object.values(st.b).some(v => v && v.id === wordId)) return;
      st.sel = wordObj; render();
    };
    window.handleFillBox = function(id, boxKey) {
      const st = fillStates[id];
      if (!st.sel) return;
      if (st.sel.correctBlank === boxKey) {
        st.b[boxKey] = st.sel; st.sel = null; render();
        if (Object.values(st.b).every(v => v !== null)) setTimeout(() => progressTask(id), 600);
      } else {
        st.err = boxKey; render(); setTimeout(() => { st.err = null; render(); }, 1000);
      }
    };

    const matchStates = {};
    function renderMatchingGame(id, title, isCompleted, leftItems, rightItems, theme) {
      if (!matchStates[id]) {
        matchStates[id] = { selLeft: null, matches: [], err: false, left: shuffleArray(leftItems), right: shuffleArray(rightItems) };
      }
      const st = matchStates[id];
      if (isCompleted && st.matches.length < st.left.length) st.matches = st.left.map(i=>i.id);
      const th = `text-${theme}-700`;
      const bgComp = `bg-${theme}-50 border-${theme}-200 opacity-90`;

      let html = `<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ${isCompleted ? bgComp : 'border-slate-200'}">
          <h3 class="text-xl font-bold ${th} mb-2 flex items-center justify-between">
            <span class="flex items-center gap-2"><i class="ph-bold ph-link"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-2xl"></i>' : ''}
          </h3>
          <p class="text-slate-600 mb-6">點擊左邊的項目，再點擊右邊對應的說明連線起來！</p>
          <div class="flex flex-col md:flex-row gap-4 justify-between">
            <div class="w-full md:w-2/5 flex flex-col gap-3">`;
      
      st.left.forEach(item => {
        const isMatched = st.matches.includes(item.id);
        const isSelected = st.selLeft === item.id;
        let cls = isMatched ? 'bg-slate-100 border-slate-200 opacity-50' : item.c;
        cls += isSelected ? ' ring-4 border-transparent' : ' border-transparent hover:brightness-95';
        if (isSelected && st.err) cls += ' bg-rose-100 border-rose-300';
        html += `<button onclick="handleMatchLeft('${id}', '${item.id}')" ${isMatched||isCompleted?'disabled':''} class="flex items-center gap-4 p-4 rounded-2xl border-2 fade-transition text-xl font-bold ${cls}"><span class="text-4xl">${item.e}</span> ${item.t}${isMatched ? '<i class="ph-fill ph-check-circle ml-auto text-emerald-500 text-2xl"></i>' : ''}</button>`;
      });

      html += `</div><div class="w-full md:w-3/5 flex flex-col gap-3">`;

      st.right.forEach(item => {
        const isMatched = st.matches.includes(item.id);
        let cls = isMatched ? 'bg-emerald-50 border-emerald-200 text-emerald-800 opacity-80' : `bg-slate-50 hover:bg-${theme}-50 border-slate-200 text-slate-700`;
        if (!isMatched && st.selLeft) cls += ` ring-2 ring-${theme}-300 cursor-pointer`;
        html += `<button onclick="handleMatchRight('${id}', '${item.id}')" ${isMatched||isCompleted?'disabled':''} class="flex items-center p-4 min-h-[5rem] rounded-2xl border-2 fade-transition text-lg font-bold text-left ${cls}">${item.t}${isMatched ? '<i class="ph-fill ph-check-circle ml-auto text-emerald-500 text-2xl"></i>' : ''}</button>`;
      });
      return html + `</div></div></div>`;
    }
    window.handleMatchLeft = function(id, itemId) {
      if (!matchStates[id].matches.includes(itemId)) { matchStates[id].selLeft = itemId; matchStates[id].err = false; render(); }
    };
    window.handleMatchRight = function(id, itemId) {
      const st = matchStates[id];
      if (!st.selLeft || st.matches.includes(itemId)) return;
      if (st.selLeft === itemId) {
        st.matches.push(itemId); st.selLeft = null; render();
        if (st.matches.length === 3) setTimeout(() => progressTask(id), 500);
      } else {
        st.err = true; render();
        setTimeout(() => { st.selLeft = null; st.err = false; render(); }, 800);
      }
    };

    function renderSortGame(title, isCompleted) {
      if (isCompleted) sortCurrentIndex = sortItems.length;

      let html = `<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ${isCompleted ? 'bg-teal-50 border-teal-200 opacity-80' : 'border-slate-200'}">
          <h2 class="text-xl font-bold text-teal-700 mb-6 flex items-center justify-between">
            <span class="flex items-center gap-2"><i class="ph-fill ph-list-checks"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-2xl"></i>' : ''}
          </h2>`;

      if (sortCurrentIndex < sortItems.length && !isCompleted) {
        const cur = sortItems[sortCurrentIndex];
        html += `<div class="flex flex-col items-center">
            <div class="relative w-full max-w-md bg-slate-50 border-4 border-slate-200 rounded-3xl flex flex-col items-center justify-center mb-8 py-8 px-4 fade-transition min-h-[200px]">`;
        if (sortFeedback) {
          html += `<div class="text-2xl font-bold flex items-center gap-2 ${sortFeedback.isCorrect ? 'text-emerald-600' : 'text-rose-500'} px-4 text-center">
              <i class="ph-fill ${sortFeedback.isCorrect ? 'ph-check-circle' : 'ph-x-circle'} text-4xl shrink-0"></i> ${sortFeedback.text}
            </div>`;
        } else {
          html += `<div class="text-center fade-transition">
              <div class="text-6xl mb-4 drop-shadow-md">${cur.emoji}</div>
              <h3 class="text-2xl font-bold text-slate-800 mb-2">${cur.text}</h3>
              <p class="text-slate-500 font-bold bg-white px-3 py-1 rounded shadow-sm border border-slate-100">${cur.desc}</p>
            </div>`;
        }
        html += `</div>
            <div class="w-full flex justify-center gap-4">`;
        
        html += `<button onclick="handleSort('series')" ${sortFeedback?'disabled':''} class="w-full md:w-40 bg-slate-50 hover:bg-rose-50 border-b-4 border-slate-300 hover:border-rose-400 p-4 rounded-2xl text-center fade-transition disabled:opacity-50 text-slate-700 hover:text-rose-700">
            <div class="text-3xl mb-1">🔗</div><div class="font-bold text-lg">屬於「串聯」</div>
          </button>`;
        html += `<button onclick="handleSort('parallel')" ${sortFeedback?'disabled':''} class="w-full md:w-40 bg-slate-50 hover:bg-sky-50 border-b-4 border-slate-300 hover:border-sky-400 p-4 rounded-2xl text-center fade-transition disabled:opacity-50 text-slate-700 hover:text-sky-700">
            <div class="text-3xl mb-1">🛤️</div><div class="font-bold text-lg">屬於「並聯」</div>
          </button>`;
        
        html += `</div><div class="mt-6 text-slate-500 font-bold bg-slate-100 px-4 py-1 rounded-full">分類進度：${sortCurrentIndex + 1} / ${sortItems.length}</div></div>`;
      } else {
        html += `<div class="text-center py-4 fade-transition"><i class="ph-fill ph-check-circle text-6xl text-emerald-500 mb-4 block mx-auto"></i><h3 class="text-xl font-bold text-slate-800">全數分類完成！</h3></div>`;
      }
      return html + `</div>`;
    }

    window.handleSort = function(cat) {
      if (sortFeedback) return;
      const cur = sortItems[sortCurrentIndex];
      if (cur.type === cat) {
        sortFeedback = { isCorrect: true, text: '判斷正確！' };
      } else {
        sortFeedback = { isCorrect: false, text: `判斷錯誤喔！再想一想。` };
      }
      render();
      setTimeout(() => {
        sortFeedback = null;
        if (cur.type === cat) {
          if (sortCurrentIndex + 1 < sortItems.length) sortCurrentIndex++;
          else progressTask('compSort');
        }
        render();
      }, 1000);
    }

    // --- 全局狀態推進 ---
    window.progressTask = function(taskId) {
      if (taskId.startsWith('bat')) batProgress++;
      else if (taskId.startsWith('bulb')) bulbProgress++;
      else if (taskId.startsWith('comp')) compProgress++;
      render();
    }

    // 主渲染邏輯
    function render() {
      renderProgressBar();
      const main = document.getElementById('main-content');
      switch (steps[currentStepIndex]) {
        case 'welcome': main.innerHTML = renderWelcome(); break;
        case 'battery': main.innerHTML = renderBattery(); break;
        case 'bulb': main.innerHTML = renderBulb(); break;
        case 'compare': main.innerHTML = renderCompare(); break;
        case 'quiz': main.innerHTML = renderQuiz(); break;
      }
    }

    render();
  </script>
</body>
</html>
