    /* 零干擾平滑動畫設計 */
    .fade-transition {
      transition: all 0.3s ease-in-out;
    }

    /* 電流流動動畫 (循環流動) */
    @keyframes circuit-flow {
      from { stroke-dashoffset: 40; }
      to { stroke-dashoffset: 0; }
    }

      animation: circuit-flow 0.8s linear infinite;
    }

    /* 發光閃爍動畫 */
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.6)); }
      50% { filter: drop-shadow(0 0 30px rgba(250, 204, 21, 1)); }
    }
    .animate-glow {
      animation: glow-pulse 2s ease-in-out infinite;
    }

    /* 預測正確的灑花特效 */
    @keyframes confetti-out {
      0% { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.5); opacity: 0; }
    }
    .animate-confetti-out {
      animation: confetti-out 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    /* 置中定位輔助類別 (用於圖形填空) */

        const emojis = ['🎉', '✨', '🌟', '🎊', '💯', '💡'];
        for(let i=0; i<40; i++) {
            const el = document.createElement('div');
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.className = 'absolute text-3xl md:text-5xl animate-confetti-out';
            const tx = (Math.random() - 0.5) * 600 + 'px';
            const ty = (Math.random() - 0.5) * 600 + 'px';
            const rot = Math.random() * 360 + 'deg';
            el.style.setProperty('--tx', tx);
            el.style.setProperty('--ty', ty);
            el.style.setProperty('--rot', rot);
            container.appendChild(el);
        }
        setTimeout(() => container.remove(), 1500);

        return { question: qRaw.q, options: shuffledOptions, answer: shuffledOptions.indexOf(correctOpt) };

      const totalSecs = Math.floor(ms / 1000);
      const mins = Math.floor(totalSecs / 60);
      const secs = totalSecs % 60;
      return mins + '分 ' + secs + '秒';

    window.startFinalQuiz = function() {

    window.handleQuizAnswer = function(idx) {
      if (quizIsAnswered) return;
      quizSelectedOption = idx; quizIsAnswered = true;
      if (idx === quizData[quizCurrentQ].answer) {
          quizScore += 10;
          triggerConfetti();
      }
      render();

      setTimeout(() => {
        if (quizCurrentQ + 1 < quizData.length) { 
          quizCurrentQ++; quizSelectedOption = null; quizIsAnswered = false; 
        } else { 
          const durationMs = Date.now() - quizStartTime;
          saveQuizRecord(quizScore, durationMs);
          quizState = 'result'; 
        }
        render();
      }, 1500); 
    }

      const now = new Date();
      const record = {
         date: now.toLocaleDateString('zh-TW'),
         time: now.toLocaleTimeString('zh-TW', { hour12: false }),
         score: score,
         duration: formatDuration(durationMs)
      };
      history.unshift(record); 
      history = history.slice(0, 5);
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(history));
    }

    window.returnToQuizDashboard = function() {
      quizState = 'dashboard';
      render();
    }

    // --- 共用小測驗產生器 ---
    const mcqStates = {};
    function renderMiniMCQ(id, title, qPool, isCompleted, theme) {
      if (!mcqStates[id]) {
        const varIdx = Math.floor(Math.random() * qPool.length);
        const qRaw = qPool[varIdx];
        const correctOpt = qRaw.opts[qRaw.a];
        const shuffledOpts = shuffleArray(qRaw.opts);
        const newAnsIdx = shuffledOpts.indexOf(correctOpt);
        mcqStates[id] = { selected: null, opts: shuffledOpts, ansIdx: newAnsIdx, varIdx: varIdx };
      }
      const st = mcqStates[id];
      const qRaw = qPool[st.varIdx];
      const th = 'text-' + theme + '-700';
      const bgComp = 'bg-' + theme + '-50 border-' + theme + '-200 opacity-90';

      let html = '<div class="bg-white rounded-2xl p-4 md:p-6 shadow-sm border-2 fade-transition ' + (isCompleted ? bgComp : 'border-slate-200') + '"><h3 class="text-xl md:text-2xl font-bold mb-4 flex items-center justify-between ' + th + '"><span class="flex items-center gap-2"><i class="ph-fill ph-question"></i> ' + title + '</span>' + (isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-3xl"></i>' : '') + '</h3><p class="text-lg md:text-xl font-bold text-slate-800 mb-6">' + qRaw.q + '</p><div class="grid grid-cols-1 md:grid-cols-2 gap-4">';

      st.opts.forEach((opt, idx) => {
        let cls = "bg-slate-50 border-slate-200 hover:bg-slate-100 text-base md:text-lg shadow-sm";
        if (isCompleted) { 
          cls = idx === st.ansIdx ? "bg-emerald-50 border-emerald-400 text-emerald-800 font-bold" : "bg-slate-50 text-slate-400 border-slate-100"; 
        } else if (st.selected === idx) { 
          cls = idx === st.ansIdx ? "bg-emerald-50 border-emerald-400 text-emerald-800 font-bold ring-2 ring-emerald-200" : "bg-rose-50 border-rose-300 text-rose-700 ring-2 ring-rose-200"; 
        }
        html += '<button onclick="handleMCQ(\'' + id + '\', ' + idx + ', ' + st.ansIdx + ')" ' + (isCompleted ? 'disabled' : '') + ' class="p-4 rounded-xl border-2 text-left font-bold fade-transition ' + cls + '">' + opt + '</button>';
      });
      return html + '</div></div>';
    }
    window.handleMCQ = function(id, selIdx, ansIdx) {
      if (mcqStates[id].selected !== null) return;
      mcqStates[id].selected = selIdx; render();
      if (selIdx === ansIdx) setTimeout(() => { progressTask(id); }, 600);
      else setTimeout(() => { mcqStates[id].selected = null; render(); }, 1000);
    }

    const tfStates = {};
    function renderMiniTF(id, title, qPool, isCompleted, theme) {
      if (!tfStates[id]) {
        const varIdx = Math.floor(Math.random() * qPool.length);
        tfStates[id] = { selected: null, varIdx: varIdx };
      }
      const st = tfStates[id];
      const qRaw = qPool[st.varIdx];
      const th = 'text-' + theme + '-700';
      const bgComp = 'bg-' + theme + '-50 border-' + theme + '-200 opacity-90';

      let html = '<div class="bg-white rounded-2xl p-4 md:p-6 shadow-sm border-2 fade-transition ' + (isCompleted ? bgComp : 'border-slate-200') + '"><h3 class="text-xl md:text-2xl font-bold mb-4 flex items-center justify-between ' + th + '"><span class="flex items-center gap-2"><i class="ph-fill ph-check-square-offset"></i> ' + title + '</span>' + (isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-3xl"></i>' : '') + '</h3><p class="text-lg md:text-xl font-bold text-slate-800 mb-6">' + qRaw.q + '</p><div class="flex gap-4 justify-center">';
      
      const tCls = isCompleted ? (qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-slate-50 text-slate-400 border-slate-100") : (st.selected === true ? (qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-rose-50 border-rose-300 text-rose-700") : "bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700 shadow-sm");
      const fCls = isCompleted ? (!qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-slate-50 text-slate-400 border-slate-100") : (st.selected === false ? (!qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-rose-50 border-rose-300 text-rose-700") : "bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700 shadow-sm");

      html += '<button onclick="handleTF(\'' + id + '\', true, ' + qRaw.a + ')" ' + (isCompleted?'disabled':'') + ' class="flex-1 max-w-[200px] p-4 rounded-xl border-2 text-2xl font-bold fade-transition text-center ' + tCls + '">⭕ 是</button>';
      html += '<button onclick="handleTF(\'' + id + '\', false, ' + qRaw.a + ')" ' + (isCompleted?'disabled':'') + ' class="flex-1 max-w-[200px] p-4 rounded-xl border-2 text-2xl font-bold fade-transition text-center ' + fCls + '">❌ 非</button>';
      return html + '</div></div>';
    }
    window.handleTF = function(id, sel, ans) {
      if (tfStates[id].selected !== null) return;
      tfStates[id].selected = sel; render();
      if (sel === ans) setTimeout(() => { progressTask(id); }, 600);
      else setTimeout(() => { tfStates[id].selected = null; render(); }, 1000);
    }

    const fillStates = {};
    function renderMiniFill(id, title, qPool, isCompleted, theme) {
      if (!fillStates[id]) {
        let bInit = {};
        const varIdx = Math.floor(Math.random() * qPool.length);
        const qRaw = qPool[varIdx];
        qRaw.ans.forEach((_, i) => { bInit['b'+(i+1)] = null; }); 
        
        let wordCards = [];
        qRaw.ans.forEach((a, i) => wordCards.push({ id: 'a'+i, text: a, correctBlank: 'b'+(i+1), c: 'bg-' + theme + '-100 text-' + theme + '-800' }));
        qRaw.distractors.forEach((d, i) => wordCards.push({ id: 'd'+i, text: d, correctBlank: 'none', c: 'bg-' + theme + '-100 text-' + theme + '-800' }));
        
        fillStates[id] = { b: bInit, sel: null, err: null, words: shuffleArray(wordCards), varIdx: varIdx, qRaw: qRaw };
      }
      const st = fillStates[id];
      if (isCompleted) {
         st.qRaw.ans.forEach((a, i) => {
             st.b['b'+(i+1)] = {text: a};
         });
      }
      const th = 'text-' + theme + '-700';
      const bgComp = 'bg-' + theme + '-50 border-' + theme + '-200 opacity-90';

      let html = '<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ' + (isCompleted ? bgComp : 'border-slate-200') + '"><h3 class="text-xl md:text-2xl font-bold ' + th + ' mb-4 flex items-center justify-between"><span class="flex items-center gap-2"><i class="ph-fill ph-puzzle-piece"></i> ' + title + '</span>' + (isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-3xl"></i>' : '') + '</h3><p class="text-slate-600 mb-6 text-base font-bold">點擊字卡拿起來，填入正確的空格中！</p>';

      if (!isCompleted) {
        html += '<div class="flex flex-wrap justify-center gap-3 mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-200 min-h-[4rem]">';
        st.words.forEach(w => {
          const isUsed = Object.values(st.b).some(v => v && v.id === w.id);
          if (isUsed) { html += '<div class="w-20 opacity-0"></div>'; return; }
          const isSelected = st.sel?.id === w.id;
          let cls = 'px-4 py-2 rounded-full font-bold text-lg md:text-xl transition-colors cursor-pointer shadow-sm ' + w.c + ' ' + (isSelected ? 'ring-4 ring-' + theme + '-400' : 'hover:opacity-90');
          html += '<button onclick="handleFillWord(\'' + id + '\', \'' + w.id + '\')" class="' + cls + '">' + w.text + '</button>';
        });
        html += '</div>';
      }

      let contentHtml = st.qRaw.qParts[0];
      st.qRaw.ans.forEach((_, i) => {
        const key = 'b'+(i+1);
        const val = st.b[key];
        let boxHtml = '';
        if (val) {
          boxHtml = '<span class="inline-block mx-2 px-4 py-1 rounded-full text-white bg-emerald-500 align-middle leading-none shadow-sm">' + val.text + '</span>';
        } else {
          const isErr = st.err === key;
          const isSel = !!st.sel && !isErr;
          let cls = 'inline-block mx-2 w-24 h-10 border-b-4 border-dashed align-middle transition-colors outline-none ' + (isErr ? 'border-rose-500 bg-rose-50' : 'border-' + theme + '-400 bg-white/50') + ' ' + (isSel ? 'hover:bg-' + theme + '-100 cursor-pointer border-' + theme + '-500' : '');
          boxHtml = '<button onclick="handleFillBox(\'' + id + '\', \'' + key + '\')" class="' + cls + '"></button>';
        }
        contentHtml += boxHtml + st.qRaw.qParts[i+1];
      });

      html += '<div class="text-xl md:text-2xl leading-loose font-bold text-slate-700 bg-' + theme + '-50 p-6 rounded-2xl border border-' + theme + '-200 shadow-inner">' + contentHtml + '</div></div>';
      return html;
    }

    window.handleFillWord = function(id, wordId) {
      const st = fillStates[id];
      const wordObj = st.words.find(w => w.id === wordId);
      if (Object.values(st.b).some(v => v && v.id === wordId)) return;
      st.sel = wordObj; render();
    };
    window.handleFillBox = function(id, boxKey) {
      const st = fillStates[id];
      if (!st.sel) return;
      if (st.sel.correctBlank === boxKey) {
        st.b[boxKey] = st.sel; st.sel = null; render();
        if (Object.values(st.b).every(v => v !== null)) setTimeout(() => progressTask(id), 600);
      } else {
        st.err = boxKey; render(); setTimeout(() => { st.err = null; render(); }, 1000);
      }
    };

    // --- 圖形視覺化填空題產生器 ---
    const visFillStates = {};
    function renderVisualDiagramFill(id, title, qData, isCompleted, theme) {
      if (!visFillStates[id]) {
        let opts = qData.ans.concat(qData.distractors || []);
        let shuffled = shuffleArray(opts);
        let ansIndices = qData.ans.map(a => shuffled.indexOf(a));
        visFillStates[id] = {
            blanks: new Array(qData.ans.length).fill(null),
            opts: shuffled,
            ansIndices: ansIndices,
            sel: null,
            err: null
        };
      }
      const st = visFillStates[id];
      const th = 'text-' + theme + '-700';
      const bgComp = 'bg-' + theme + '-50 border-' + theme + '-200 opacity-95';

      let html = '<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ' + (isCompleted ? bgComp : 'border-slate-200') + '"><h3 class="text-xl md:text-2xl font-bold ' + th + ' mb-4 flex items-center justify-between"><span class="flex items-center gap-2"><i class="ph-fill ph-intersect"></i> ' + title + '</span>' + (isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-3xl"></i>' : '') + '</h3><p class="text-slate-600 mb-6 text-base font-bold">點擊下方的名詞字卡，再點擊圖中的空格完成對應！</p>';

      if (!isCompleted) {
        html += '<div class="flex flex-wrap justify-center gap-3 mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-200 min-h-[4rem]">';
        st.opts.forEach((opt, idx) => {
          const isUsed = st.blanks.includes(idx);
          if (isUsed) { html += '<div class="w-20 opacity-0"></div>'; return; }
          const isSelected = st.sel === idx;
          let cls = 'px-4 py-2 rounded-full font-bold text-lg md:text-xl transition-colors cursor-pointer shadow-sm bg-' + theme + '-100 text-' + theme + '-800 ' + (isSelected ? 'ring-4 ring-' + theme + '-400' : 'hover:opacity-90');
          html += '<button onclick="handleVisFillWord(\'' + id + '\', ' + idx + ')" class="' + cls + '">' + opt + '</button>';
        });
        html += '</div>';
      }

      html += '<div class="relative w-full max-w-2xl mx-auto min-h-[300px] bg-slate-50 border-2 border-slate-200 rounded-2xl mb-4 flex items-center justify-center overflow-hidden shadow-inner py-6 px-4">' + qData.svg;

      qData.slots.forEach((slot, i) => {
        let valIdx = st.blanks[i];
        let text = valIdx !== null ? st.opts[valIdx] : '點擊填寫';
        let cls = '';
        if (isCompleted) {
            text = qData.ans[i]; 
            cls = 'bg-emerald-100 text-emerald-800 border-emerald-500 font-bold';
        } else if (valIdx !== null) {
            let isAllFilled = st.blanks.every(s => s !== null);
            if (isAllFilled) {
                cls = valIdx === st.ansIndices[i] ? 'bg-emerald-100 text-emerald-800 border-emerald-500' : 'bg-rose-100 text-rose-800 border-rose-500';
            } else {
                cls = 'bg-' + theme + '-100 text-' + theme + '-800 border-' + theme + '-500';
            }
        } else {
            let isErr = st.err === i;
            let isSel = !!(st.sel !== null) && !isErr;
            cls = isErr ? 'bg-rose-50 border-rose-500 text-rose-500' : 'bg-white border-' + theme + '-300 text-slate-500 ' + (isSel ? 'hover:bg-' + theme + '-50 border-' + theme + '-400 cursor-pointer' : '');
        }
        
        let position = '';
        if(slot.top) position += 'top: ' + slot.top + ';';
        if(slot.left) position += 'left: ' + slot.left + ';';
        if(slot.right) position += 'right: ' + slot.right + ';';
        if(slot.bottom) position += 'bottom: ' + slot.bottom + ';';

        let clickHandler = isCompleted ? '' : (valIdx !== null ? 'onclick="clearVisFillBlank(\'' + id + '\', ' + i + ')"' : 'onclick="handleVisFillBox(\'' + id + '\', ' + i + ')"');
        let titleText = (valIdx !== null && !isCompleted) ? ' title="點擊清除"' : '';
        html += '<button style="' + position + '" ' + clickHandler + ' ' + titleText + ' class="absolute center-absolute px-4 py-2 text-base md:text-xl border-b-4 rounded-xl shadow-md transition-colors whitespace-nowrap font-bold outline-none ' + cls + '">' + text + '</button>';
      });

      html += '</div></div>';
      return html;
    }

    window.handleVisFillWord = function(id, optIdx) {
      const st = visFillStates[id];
      if (st.blanks.includes(optIdx)) return;
      st.sel = optIdx; render();
    };

    window.handleVisFillBox = function(id, boxIdx) {
      const st = visFillStates[id];
      if (st.sel === null) return;
      
      st.blanks[boxIdx] = st.sel;
      st.sel = null;
      render();

      if (st.blanks.every(v => v !== null)) {
          let isCorrect = st.blanks.every((val, i) => val === st.ansIndices[i]);
          if (isCorrect) {
              setTimeout(() => progressTask(id), 600);
          } else {
              setTimeout(() => { 
                  st.err = null;
                  st.blanks.fill(null); 
                  render(); 
              }, 1200);
          }
      }
    };

    window.clearVisFillBlank = function(id, blankIdx) {
      const st = visFillStates[id];
      if (st.blanks[blankIdx] !== null) {
        st.blanks[blankIdx] = null;
        render();
      }
    };


    // --- 全局狀態推進 ---
    window.progressTask = function(taskId) {
      if (taskId.startsWith('comp')) compProgress++;
      else if (taskId.startsWith('circuit')) circuitProgress++;
      else if (taskId.startsWith('cond')) condProgress++;
      render();
    }

    // 主渲染邏輯
    function render() {
      renderProgressBar();
      const main = document.getElementById('main-content');
      switch (steps[currentStepIndex]) {
        case 'welcome': main.innerHTML = renderWelcome(); break;
        case 'components': main.innerHTML = renderComponents(); break;
        case 'circuit': main.innerHTML = renderCircuit(); break;
        case 'conductor': main.innerHTML = renderConductor(); break;
        case 'quiz': main.innerHTML = renderQuiz(); break;
      }
    }

    render();
  </script>
</body>
</html>
