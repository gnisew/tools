<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能源與電路：生活中的能源</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Phosphor Icons 做為圖示庫 -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* 隱藏捲軸但保留捲動功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 零干擾平滑動畫設計 */
    .fade-transition {
      transition: opacity 0.4s ease-in-out, background-color 0.3s ease-in-out, border-color 0.3s ease-in-out, color 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    /* 自訂緩慢旋轉動畫 (用於風車、水車) */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 4s linear infinite;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-16 min-h-screen">

  <!-- 標題列：沉穩色系，取消 sticky 以最大化可視空間 -->
  <header class="bg-slate-700 text-white p-4 shadow-md">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="ph ph-lightning text-3xl text-amber-400"></i>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-wider">生活中的能源</h1>
      </div>
    </div>
  </header>

  <!-- 全解鎖導航列 -->
  <div id="progress-container" class="max-w-4xl mx-auto px-4 pt-6 fade-transition">
    <div class="bg-white p-4 rounded-2xl shadow-sm border-2 border-slate-200 flex flex-wrap justify-between items-center gap-2 overflow-x-auto hide-scrollbar" id="progress-bar">
      <!-- JS 渲染進度條 -->
    </div>
  </div>

  <main id="main-content" class="max-w-4xl mx-auto p-4 mt-4 fade-transition">
    <!-- JS 渲染內容 -->
  </main>

  <script>
    // --- 實用的隨機洗牌函數 ---
    function shuffleArray(array) {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    }

    // --- 系統狀態管理 ---
    const steps = ['welcome', 'discover', 'power', 'apply', 'quiz'];
    let currentStepIndex = 0;
    
    // 各大關卡的細部任務進度 (每關需完成 3 個小測驗)
    let discoverProgress = 0;    
    let powerProgress = 0;  
    let applyProgress = 0;   

    // 互動實驗室狀態
    let discoverExpState = null; 
    let powerPlantState = null; 
    let applyExpState = null;

    // 分類遊戲狀態 (電的應用)
    const baseSortItems = [
      { id: 1, text: '電燈', type: 'light', emoji: '💡', desc: '照亮黑暗的房間' },
      { id: 2, text: '電烤箱', type: 'heat', emoji: '🍞', desc: '加熱並烤熟食物' },
      { id: 3, text: '電動車', type: 'power', emoji: '🚗', desc: '載運人移動行駛' },
      { id: 4, text: '手電筒', type: 'light', emoji: '🔦', desc: '提供局部的照明' },
      { id: 5, text: '電熱水瓶', type: 'heat', emoji: '♨️', desc: '將水煮沸保溫' },
      { id: 6, text: '電扶梯', type: 'power', emoji: '🪜', desc: '載著人往上或往下' },
    ];
    let sortItems = [];
    let sortCurrentIndex = 0;
    let sortFeedback = null;

    // --- 最終測驗題庫池 ---
    const rawQuizPools = [
      [ // 概念1：太陽能
        { q: "地球上能量的主要來源是什麼？", options: ["月亮", "太陽", "海洋", "星星"], answer: 1 },
        { q: "植物會將哪一種能源轉換成養分來生長？", options: ["地熱", "風力", "水力", "太陽的光"], answer: 3 }
      ],
      [ // 概念2：動植物與能源
        { q: "有些動物（例如烏龜）會藉由太陽的熱來做什麼？", options: ["提供光線", "提高體溫", "產生電力", "製造食物"], answer: 1 },
        { q: "植物利用太陽光轉換成養分，動物利用太陽熱提高體溫，這說明了什麼？", options: ["太陽是萬物生存的動力來源", "只有動物需要太陽", "只有植物需要太陽", "太陽只能用來發電"], answer: 0 }
      ],
      [ // 概念3：生活能源應用 (風、水、地熱)
        { q: "帆船主要是利用哪一種能源來推動並在水上移動？", options: ["太陽能", "水力", "地熱", "風力"], answer: 3 },
        { q: "我們去泡的天然溫泉，主要是水被哪一種能源加熱所形成的？", options: ["太陽能", "地熱", "瓦斯", "煤炭"], answer: 1 }
      ],
      [ // 概念4：燃燒產生的熱能
        { q: "烤肉時，我們是利用哪一種方式產生的熱來烤熟食物？", options: ["燃燒木炭", "燃燒汽油", "摩擦生熱", "太陽照射"], answer: 0 },
        { q: "家裡在廚房烹煮食物時，最常利用什麼燃燒產生的熱？", options: ["汽油", "瓦斯", "地熱", "水力"], answer: 1 }
      ],
      [ // 概念5：轉換成電力的設施
        { q: "下列哪一個設施的主要功能是將能源「轉換成電」方便我們使用？", options: ["加油站", "火力發電廠", "自來水廠", "瓦斯行"], answer: 1 },
        { q: "我們可以用很多方式來發電，下列哪一個「不是」常見的發電方式？", options: ["風力發電", "太陽能發電", "時間發電", "水力發電"], answer: 2 }
      ],
      [ // 概念6：電的應用 (光)
        { q: "電燈是將電轉換成什麼形式，來幫助我們在黑暗中看清楚？", options: ["熱", "動力", "聲音", "光"], answer: 3 },
        { q: "下列哪一種物品主要是將電轉換成「光」來運作的？", options: ["手電筒", "電烤箱", "電扶梯", "電風扇"], answer: 0 }
      ],
      [ // 概念7：電的應用 (熱)
        { q: "電烤箱是將電轉換成什麼形式，藉此來加熱食物？", options: ["動力", "光", "熱", "風"], answer: 2 },
        { q: "下列哪一種家電，最主要是將電轉換成「熱」來方便我們生活？", options: ["電動車", "電熱水瓶", "日光燈", "電視機"], answer: 1 }
      ],
      [ // 概念8：電的應用 (動力)
        { q: "百貨公司裡的「電扶梯」是將電轉換成什麼，來載運人們移動？", options: ["光", "熱", "動力", "引力"], answer: 2 },
        { q: "需要到充電站充電的「電動車」，是將電轉換成什麼來讓車輛行駛？", options: ["熱", "光", "動力", "磁力"], answer: 2 }
      ],
      [ // 概念9：綜合概念 (是非辨析)
        { q: "關於生活中的能源，下列敘述哪一個是正確的？", options: ["電可以直接從大自然中挖出來", "電烤箱是將電轉換成光來烤麵包", "能源可以轉換成不同的形式來應用", "地球上的能源只有太陽能是有用的"], answer: 2 },
        { q: "關於電的應用，下列哪一個配對是「錯誤」的？", options: ["電燈：電轉換成光", "電烤箱：電轉換成熱", "電扶梯：電轉換成光", "電動機車：電轉換成動力"], answer: 2 }
      ],
      [ // 概念10：能源的來源與重要性
        { q: "為什麼我們生活周遭處處都需要電？", options: ["因為電會自己產生", "因為電可以轉換成光、熱、動力，讓生活更便利", "因為電只是一種玩具", "因為電不能轉換成其他東西"], answer: 1 },
        { q: "我們平常使用的「電」，是怎麼來的？", options: ["天上掉下來的", "從各種能源（如風力、水力、太陽能等）轉換來的", "從土裡挖出來的", "從海裡撈起來的"], answer: 1 }
      ]
    ];

    let quizState = 'dashboard'; 
    let quizData = [];
    let quizCurrentQ = 0;
    let quizScore = 0;
    let quizSelectedOption = null;
    let quizIsAnswered = false;
    let quizStartTime = 0;
    const LOCAL_STORAGE_KEY = '42hz41'; 

    function initQuizData() {
      quizData = rawQuizPools.map(pool => {
        const qRaw = pool[Math.floor(Math.random() * pool.length)];
        const correctOpt = qRaw.options[qRaw.answer];
        const shuffledOptions = shuffleArray(qRaw.options);
        return {
          question: qRaw.q,
          options: shuffledOptions,
          answer: shuffledOptions.indexOf(correctOpt)
        };
      });
    }

    function formatDuration(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const mins = Math.floor(totalSecs / 60);
      const secs = totalSecs % 60;
      return `${mins}分 ${secs}秒`;
    }

    // --- 導航與進度條 ---
    function jumpToStep(index) {
      currentStepIndex = index;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderProgressBar() {
      const bar = document.getElementById('progress-bar');
      
      const stages = [
        { name: '出發', icon: 'ph-flag-pennant', color: 'amber' },
        { name: '認識能源', icon: 'ph-sun', color: 'orange' },
        { name: '發電廠', icon: 'ph-factory', color: 'teal' },
        { name: '電的應用', icon: 'ph-plug', color: 'cyan' },
        { name: '最終測驗', icon: 'ph-file-question', color: 'indigo' },
      ];

      let html = '';
      stages.forEach((stage, idx) => {
        const isActive = currentStepIndex === idx;
        // 每關需要完成 3 個檢核任務
        const isPassed = (idx === 1 && discoverProgress >= 3) || 
                         (idx === 2 && powerProgress >= 3) || 
                         (idx === 3 && applyProgress >= 3);

        let iconHtml = isPassed ? '<i class="ph-fill ph-check-circle text-xl"></i>' : `<i class="ph ${stage.icon} text-xl"></i>`;
        
        let circleClass = `w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-sm fade-transition `;
        if (isActive) circleClass += `bg-${stage.color}-500 ring-4 ring-${stage.color}-200`;
        else if (isPassed) circleClass += `bg-emerald-400`;
        else circleClass += `bg-slate-300`;

        let textClass = `text-xs font-bold whitespace-nowrap mt-1 ${isActive ? `text-${stage.color}-600` : 'text-slate-500'}`;

        html += `
          <div class="flex items-center">
            <button onclick="jumpToStep(${idx})" class="flex flex-col items-center px-2 py-1 fade-transition cursor-pointer hover:bg-slate-50 rounded-lg">
              <div class="${circleClass}">${iconHtml}</div>
              <span class="${textClass}">${stage.name}</span>
            </button>
        `;
        if (idx < stages.length - 1) {
          html += `<div class="hidden sm:block w-8 md:w-12 h-1 rounded-full mx-1 ${isPassed ? 'bg-emerald-300' : 'bg-slate-200'}"></div>`;
        }
        html += `</div>`;
      });
      bar.innerHTML = html;
    }

    // --- 區塊渲染：0. 首頁 ---
    function renderWelcome() {
      return `
        <div class="bg-white rounded-3xl p-8 md:p-12 shadow-sm border-2 border-slate-200 text-center mt-8 fade-transition">
          <div class="inline-block bg-amber-50 p-6 rounded-full mb-6">
            <i class="ph ph-lightning text-7xl text-amber-500"></i>
          </div>
          <h2 class="text-4xl md:text-5xl font-bold text-slate-800 mb-6">能源探索特攻隊</h2>
          <p class="text-xl md:text-2xl text-slate-600 leading-relaxed mb-8 max-w-2xl mx-auto">
            生活中有許多不同的能源，我們不可或缺的「電」，就是從各種能源轉換來的喔！<br/><br/>
            大自然提供了哪些能源？電又是怎麼讓燈泡亮起來、讓車子跑起來的呢？快來加入特攻隊一起探索吧！
          </p>
          <button onclick="jumpToStep(1)" class="inline-flex items-center gap-3 bg-amber-500 hover:bg-amber-600 text-white px-8 py-4 rounded-full text-2xl font-bold fade-transition shadow-sm">
            <i class="ph-fill ph-play-circle text-3xl"></i> 開始探索！
          </button>
        </div>
      `;
    }

    // --- 區塊渲染：1. 認識能源 (橘色系/Orange) ---
    function renderDiscover() {
      let expText = '點擊上方按鈕，看看大自然提供了哪些能源！';
      if (discoverExpState === 'sun') expText = '🌻 太陽的光和熱：植物利用陽光製造養分，動物利用熱提高體溫！';
      if (discoverExpState === 'wind') expText = '⛵ 風力能：看不見的風，卻能產生強大的力量推動帆船前進！';
      if (discoverExpState === 'geo') expText = '♨️ 地熱能：地底下的熱能把地下水加熱，湧出地面就變成舒服的溫泉！';
      if (discoverExpState === 'fire') expText = '🔥 燃燒的熱能：燃燒木炭或瓦斯，產生的熱可以用來烹煮美味食物！';

      let content = `
        <div class="space-y-6 fade-transition">
          <div class="bg-orange-50 border-l-8 border-orange-500 p-4 rounded-r-2xl shadow-sm flex gap-4 items-start">
            <div class="text-4xl">☀️</div>
            <div>
              <h3 class="font-bold text-orange-800 text-lg">探索任務：尋找生活中的能源</h3>
              <p class="text-orange-700">「太陽是地球上能量的主要來源。親自點擊大自然的魔法，觀察這些能源能做什麼用吧！」</p>
            </div>
          </div>

          <!-- 互動實驗室 -->
          <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 border-slate-200 text-center">
            <h2 class="text-2xl font-bold text-orange-600 mb-6 flex justify-center items-center gap-2"><i class="ph-fill ph-magnifying-glass"></i> 能源觀察站</h2>
            <div class="flex flex-wrap justify-center gap-3 mb-6">
               <button onclick="triggerDiscoverExp('sun')" class="bg-yellow-50 hover:bg-yellow-100 border-2 border-yellow-300 text-yellow-800 px-4 py-3 rounded-xl font-bold fade-transition ${discoverExpState==='sun'?'ring-4 ring-yellow-400':''}">☀️ 太陽能</button>
               <button onclick="triggerDiscoverExp('wind')" class="bg-sky-50 hover:bg-sky-100 border-2 border-sky-300 text-sky-800 px-4 py-3 rounded-xl font-bold fade-transition ${discoverExpState==='wind'?'ring-4 ring-sky-400':''}">💨 風力能</button>
               <button onclick="triggerDiscoverExp('geo')" class="bg-rose-50 hover:bg-rose-100 border-2 border-rose-300 text-rose-800 px-4 py-3 rounded-xl font-bold fade-transition ${discoverExpState==='geo'?'ring-4 ring-rose-400':''}">♨️ 地熱能</button>
               <button onclick="triggerDiscoverExp('fire')" class="bg-orange-50 hover:bg-orange-100 border-2 border-orange-300 text-orange-800 px-4 py-3 rounded-xl font-bold fade-transition ${discoverExpState==='fire'?'ring-4 ring-orange-400':''}">🔥 燃燒熱能</button>
            </div>
            <div class="p-4 bg-orange-100 rounded-xl text-orange-800 font-bold min-h-[4rem] flex items-center justify-center fade-transition shadow-inner text-lg">
               ${expText}
            </div>
          </div>
      `;

      // 任務一：配對
      if (discoverProgress >= 0) {
        content += renderMatchingGame('discoverMatch', '任務一：能源應用連連看', discoverProgress > 0, 
          [
            {id:'sun', e:'🌻', t:'太陽的光', c:'bg-yellow-50 text-yellow-800'}, 
            {id:'wind', e:'⛵', t:'風力', c:'bg-sky-50 text-sky-800'}, 
            {id:'geo', e:'♨️', t:'地熱', c:'bg-rose-50 text-rose-800'},
            {id:'fire', e:'🔥', t:'燃燒瓦斯', c:'bg-orange-50 text-orange-800'}
          ],
          [
            {id:'fire', t:'產生熱能來烹煮美味的食物'}, 
            {id:'sun', t:'讓植物轉換成養分慢慢長大'}, 
            {id:'geo', t:'把地下水加熱變成可以泡的溫泉'},
            {id:'wind', t:'推動帆船讓船在水面上移動'}
          ], 'orange'
        );
      }
      
      // 任務二：隨機是非題池
      if (discoverProgress >= 1) {
        content += renderMiniTF('discoverTF', '任務二：觀念是非題', 
          [
            {q: '太陽可以提供光和熱，是地球上萬物生存非常重要的動力來源。', a: true},
            {q: '烤肉時，我們是利用「水力」產生的熱來把食物烤熟。', a: false},
            {q: '植物會吸收大自然中太陽的光，轉換成養分來幫助自己生長。', a: true},
            {q: '帆船在水面上移動，主要是利用水力將船往前推的。', a: false}
          ], discoverProgress > 1, 'orange');
      }
      
      // 任務三：隨機填空題池
      if (discoverProgress >= 2) {
        content += renderMiniFill('discoverFill', '任務三：能源填空測驗', discoverProgress > 2, 
          [
            { qParts: ["植物的生長需要", "的光；天然的溫泉是水被", "加熱形成的。"], ans: ["太陽", "地熱"], distractors: ["風力", "燃燒"] },
            { qParts: ["烤肉是利用", "木炭產生的熱；帆船是利用大自然的", "來推動。"], ans: ["燃燒", "風力"], distractors: ["太陽", "水力"] }
          ], 'orange'
        );
      }

      content += `
        <div class="text-center fade-transition ${discoverProgress === 3 ? 'opacity-100' : 'opacity-0 pointer-events-none hidden'}">
          <button onclick="jumpToStep(2)" class="inline-flex items-center gap-2 bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-full text-xl font-bold fade-transition shadow-sm">
            認識能源了！前往發電廠 <i class="ph-bold ph-arrow-right"></i>
          </button>
        </div>
      </div>`;

      return content;
    }

    window.triggerDiscoverExp = function(type) {
      discoverExpState = type;
      render();
    }

    // --- 區塊渲染：2. 發電廠 (藍綠色/Teal) ---
    function renderPower() {
      let plantIcon = 'ph-city';
      let plantColor = 'text-slate-400';
      let plantDesc = '請點擊下方的按鈕，啟動發電廠！';
      let animClass = '';
      let cityState = 'brightness-50'; // 城市未供電時暗暗的

      if (powerPlantState === 'solar') {
        plantIcon = 'ph-sun'; plantColor = 'text-yellow-500'; plantDesc = '☀️ 太陽能發電：利用太陽的光轉換成電！'; cityState = 'brightness-100 drop-shadow-lg'; animClass = 'animate-pulse';
      } else if (powerPlantState === 'wind') {
        plantIcon = 'ph-wind'; plantColor = 'text-sky-500'; plantDesc = '💨 風力發電：利用風吹動風機轉換成電！'; cityState = 'brightness-100 drop-shadow-lg'; animClass = 'animate-spin-slow';
      } else if (powerPlantState === 'hydro') {
        plantIcon = 'ph-waves'; plantColor = 'text-blue-500'; plantDesc = '💧 水力發電：利用水從高處流下的力量轉換成電！'; cityState = 'brightness-100 drop-shadow-lg'; animClass = 'animate-bounce';
      } else if (powerPlantState === 'coal') {
        plantIcon = 'ph-fire'; plantColor = 'text-orange-500'; plantDesc = '🔥 火力發電：燃燒煤炭或瓦斯產生熱，再轉換成電！'; cityState = 'brightness-100 drop-shadow-lg'; animClass = 'animate-pulse';
      }

      let content = `
        <div class="space-y-6 fade-transition">
          <div class="bg-teal-50 border-l-8 border-teal-500 p-4 rounded-r-2xl shadow-sm flex gap-4 items-start">
            <div class="text-4xl">🏭</div>
            <div>
              <h3 class="font-bold text-teal-800 text-lg">探索任務：將能源轉換成電</h3>

    window.handleQuizAnswer = function(idx) {
      if (quizIsAnswered) return;
      quizSelectedOption = idx; quizIsAnswered = true;
      if (idx === quizData[quizCurrentQ].answer) quizScore += 10;
      render();

      setTimeout(() => {
        if (quizCurrentQ + 1 < quizData.length) { 
          quizCurrentQ++; quizSelectedOption = null; quizIsAnswered = false; 
        } else { 
          const durationMs = Date.now() - quizStartTime;
          saveQuizRecord(quizScore, durationMs);
          quizState = 'result'; 
        }
        render();
      }, 1200); 
    }

      const now = new Date();
      const record = {
         date: now.toLocaleDateString('zh-TW'),
         time: now.toLocaleTimeString('zh-TW', { hour12: false }),
         score: score,
         duration: formatDuration(durationMs)
      };
      history.unshift(record); 
      history = history.slice(0, 5);
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(history));
    }

    window.returnToQuizDashboard = function() {
      quizState = 'dashboard';
      render();
    }

    // --- 共用小測驗產生器 (防弊隨機池) ---
    // MCQ
    const mcqStates = {};
    function renderMiniMCQ(id, title, qPool, isCompleted, theme) {
      if (!mcqStates[id]) {
        const varIdx = Math.floor(Math.random() * qPool.length);
        const qRaw = qPool[varIdx];
        const correctOpt = qRaw.opts[qRaw.a];
        const shuffledOpts = shuffleArray(qRaw.opts);
        const newAnsIdx = shuffledOpts.indexOf(correctOpt);
        mcqStates[id] = { selected: null, opts: shuffledOpts, ansIdx: newAnsIdx, varIdx: varIdx };
      }
      const st = mcqStates[id];
      const qRaw = qPool[st.varIdx];
      const th = `text-${theme}-700`;
      const bgComp = `bg-${theme}-50 border-${theme}-200 opacity-80`;

      let html = `<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ${isCompleted ? bgComp : `border-slate-200`}">
          <h3 class="text-xl font-bold mb-4 flex items-center justify-between ${th}">
            <span class="flex items-center gap-2"><i class="ph-fill ph-question"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-2xl"></i>' : ''}
          </h3>
          <p class="text-xl font-bold text-slate-800 mb-6">${qRaw.q}</p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

      st.opts.forEach((opt, idx) => {
        let cls = "bg-slate-50 border-slate-200 hover:bg-slate-100";
        if (isCompleted) { 
          cls = idx === st.ansIdx ? "bg-emerald-50 border-emerald-400 text-emerald-800 font-bold" : "bg-slate-50 text-slate-400 border-slate-100"; 
        } else if (st.selected === idx) { 
          cls = idx === st.ansIdx ? "bg-emerald-50 border-emerald-400 text-emerald-800 font-bold" : "bg-rose-50 border-rose-300 text-rose-700"; 
        }
        html += `<button onclick="handleMCQ('${id}', ${idx}, ${st.ansIdx})" ${isCompleted ? 'disabled' : ''} class="p-4 rounded-2xl border-2 text-left text-lg font-bold fade-transition ${cls}">${opt}</button>`;
      });
      return html + `</div></div>`;
    }
    window.handleMCQ = function(id, selIdx, ansIdx) {
      if (mcqStates[id].selected !== null) return;
      mcqStates[id].selected = selIdx; render();
      if (selIdx === ansIdx) setTimeout(() => { progressTask(id); }, 600);
      else setTimeout(() => { mcqStates[id].selected = null; render(); }, 800);
    }

    // TF
    const tfStates = {};
    function renderMiniTF(id, title, qPool, isCompleted, theme) {
      if (!tfStates[id]) {
        const varIdx = Math.floor(Math.random() * qPool.length);
        tfStates[id] = { selected: null, varIdx: varIdx };
      }
      const st = tfStates[id];
      const qRaw = qPool[st.varIdx];
      const th = `text-${theme}-700`;
      const bgComp = `bg-${theme}-50 border-${theme}-200 opacity-80`;

      let html = `<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ${isCompleted ? bgComp : `border-slate-200`}">
          <h3 class="text-xl font-bold mb-4 flex items-center justify-between ${th}">
            <span class="flex items-center gap-2"><i class="ph-fill ph-check-square-offset"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-2xl"></i>' : ''}
          </h3>
          <p class="text-xl font-bold text-slate-800 mb-6">${qRaw.q}</p>
          <div class="flex gap-4 justify-center">`;
      
      const tCls = isCompleted ? (qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-slate-50 text-slate-400 border-slate-100") : (st.selected === true ? (qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-rose-50 border-rose-300 text-rose-700") : `bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700`);
      const fCls = isCompleted ? (!qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-slate-50 text-slate-400 border-slate-100") : (st.selected === false ? (!qRaw.a ? "bg-emerald-50 border-emerald-400 text-emerald-800" : "bg-rose-50 border-rose-300 text-rose-700") : `bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-700`);

      html += `<button onclick="handleTF('${id}', true, ${qRaw.a})" ${isCompleted?'disabled':''} class="flex-1 max-w-[200px] p-6 rounded-2xl border-2 text-2xl font-bold fade-transition text-center ${tCls}">⭕ 是</button>`;
      html += `<button onclick="handleTF('${id}', false, ${qRaw.a})" ${isCompleted?'disabled':''} class="flex-1 max-w-[200px] p-6 rounded-2xl border-2 text-2xl font-bold fade-transition text-center ${fCls}">❌ 非</button>`;
      return html + `</div></div>`;
    }
    window.handleTF = function(id, sel, ans) {
      if (tfStates[id].selected !== null) return;
      tfStates[id].selected = sel; render();
      if (sel === ans) setTimeout(() => { progressTask(id); }, 600);
      else setTimeout(() => { tfStates[id].selected = null; render(); }, 800);
    }

    // Matching
    const matchStates = {};
    function renderMatchingGame(id, title, isCompleted, leftItems, rightItems, theme) {
      if (!matchStates[id]) {
        matchStates[id] = { selLeft: null, matches: [], err: false, left: shuffleArray(leftItems), right: shuffleArray(rightItems) };
      }
      const st = matchStates[id];
      if (isCompleted && st.matches.length < st.left.length) st.matches = st.left.map(i=>i.id);
      const th = `text-${theme}-700`;
      const bgComp = `bg-${theme}-50 border-${theme}-200 opacity-80`;

      let html = `<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ${isCompleted ? bgComp : 'border-slate-200'}">
          <h3 class="text-xl font-bold ${th} mb-2 flex items-center justify-between">
            <span class="flex items-center gap-2"><i class="ph-bold ph-link"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-2xl"></i>' : ''}
          </h3>
          <p class="text-slate-600 mb-6">點擊左邊的項目，再點擊右邊對應的說明連線起來！</p>
          <div class="flex flex-col md:flex-row gap-4 justify-between">
            <div class="w-full md:w-2/5 flex flex-col gap-3">`;
      
      st.left.forEach(item => {
        const isMatched = st.matches.includes(item.id);
        const isSelected = st.selLeft === item.id;
        let cls = isMatched ? 'bg-slate-100 border-slate-200 opacity-50' : item.c;
        cls += isSelected ? ' ring-4 border-transparent' : ' border-transparent hover:brightness-95';
        if (isSelected && st.err) cls += ' bg-rose-100 border-rose-300';
        html += `<button onclick="handleMatchLeft('${id}', '${item.id}')" ${isMatched||isCompleted?'disabled':''} class="flex items-center gap-4 p-4 rounded-2xl border-2 fade-transition text-xl font-bold ${cls}"><span class="text-4xl">${item.e}</span> ${item.t}${isMatched ? '<i class="ph-fill ph-check-circle ml-auto text-emerald-500 text-2xl"></i>' : ''}</button>`;
      });

      html += `</div><div class="w-full md:w-3/5 flex flex-col gap-3">`;

      st.right.forEach(item => {
        const isMatched = st.matches.includes(item.id);
        let cls = isMatched ? 'bg-emerald-50 border-emerald-200 text-emerald-800 opacity-80' : `bg-slate-50 hover:bg-${theme}-50 border-slate-200 text-slate-700`;
        if (!isMatched && st.selLeft) cls += ` ring-2 ring-${theme}-300 cursor-pointer`;
        html += `<button onclick="handleMatchRight('${id}', '${item.id}')" ${isMatched||isCompleted?'disabled':''} class="flex items-center p-4 min-h-[5rem] rounded-2xl border-2 fade-transition text-lg font-bold text-left ${cls}">${item.t}${isMatched ? '<i class="ph-fill ph-check-circle ml-auto text-emerald-500 text-2xl"></i>' : ''}</button>`;
      });
      return html + `</div></div></div>`;
    }
    window.handleMatchLeft = function(id, itemId) {
      if (!matchStates[id].matches.includes(itemId)) { matchStates[id].selLeft = itemId; matchStates[id].err = false; render(); }
    };
    window.handleMatchRight = function(id, itemId) {
      const st = matchStates[id];
      if (!st.selLeft || st.matches.includes(itemId)) return;
      if (st.selLeft === itemId) {
        st.matches.push(itemId); st.selLeft = null; render();
        if (st.matches.length === st.left.length) setTimeout(() => progressTask(id), 500);
      } else {
        st.err = true; render();
        setTimeout(() => { st.selLeft = null; st.err = false; render(); }, 800);
      }
    };

    // FillBlank
    const fillStates = {};
    function renderMiniFill(id, title, isCompleted, words, templateStr, theme) {
      if (!fillStates[id]) {
        let bInit = {};
        words[0].ans.forEach((_, i) => { bInit[`b${i+1}`] = null; }); // 初始化數量
        const varIdx = Math.floor(Math.random() * words.length);
        const qRaw = words[varIdx];
        
        // 製作字卡
        let wordCards = [];
        qRaw.ans.forEach((a, i) => wordCards.push({ id: `a${i}`, text: a, correctBlank: `b${i+1}`, c: `bg-${theme}-100 text-${theme}-800` }));
        qRaw.distractors.forEach((d, i) => wordCards.push({ id: `d${i}`, text: d, correctBlank: 'none', c: `bg-${theme}-100 text-${theme}-800` }));
        
        fillStates[id] = { b: bInit, sel: null, err: null, words: shuffleArray(wordCards), varIdx: varIdx, qRaw: qRaw };
      }
      const st = fillStates[id];
      if (isCompleted) {
         st.qRaw.ans.forEach((a, i) => {
             st.b[`b${i+1}`] = {text: a};
         });
      }
      const th = `text-${theme}-700`;

      let html = `<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ${isCompleted ? `bg-${theme}-50 border-${theme}-200 opacity-80` : `border-slate-200`}">
          <h3 class="text-xl font-bold ${th} mb-2 flex items-center justify-between">
            <span class="flex items-center gap-2"><i class="ph-fill ph-puzzle-piece"></i> ${title}</span>
            ${isCompleted ? '<i class="ph-fill ph-check-circle text-emerald-500 text-2xl"></i>' : ''}
          </h3>
          <p class="text-slate-600 mb-6">點擊字卡拿起來，填入正確的空格中！</p>`;

      if (!isCompleted) {
        html += `<div class="flex flex-wrap justify-center gap-4 mb-6 p-4 bg-slate-50 rounded-2xl border-2 border-slate-200 min-h-[4rem]">`;
        st.words.forEach(w => {
          const isUsed = Object.values(st.b).some(v => v && v.id === w.id);
          if (isUsed) { html += `<div class="w-24 opacity-0"></div>`; return; }
          const isSelected = st.sel?.id === w.id;
          let cls = `px-6 py-2 rounded-full font-bold text-xl transition-colors cursor-pointer ${w.c} ${isSelected ? `ring-4 ring-${theme}-400` : 'hover:opacity-90'}`;
          html += `<button onclick="handleFillWord('${id}', '${w.id}')" class="${cls}">${w.text}</button>`;
        });
        html += `</div>`;
      }

      let contentHtml = st.qRaw.qParts[0];
      st.qRaw.ans.forEach((_, i) => {
        const key = `b${i+1}`;
        const val = st.b[key];
        let boxHtml = '';
        if (val) {
          boxHtml = `<span class="inline-block mx-2 px-4 py-1 rounded-full text-white bg-green-500 align-middle leading-none">${val.text}</span>`;
        } else {
          const isErr = st.err === key;
          const isSel = !!st.sel && !isErr;
          let cls = `inline-block mx-2 w-24 h-10 border-b-4 border-dashed align-middle transition-colors outline-none ${isErr ? 'border-rose-500 bg-rose-50' : `border-${theme}-300 bg-white/50`} ${isSel ? `hover:bg-${theme}-100 cursor-pointer border-${theme}-400` : ''}`;
          boxHtml = `<button onclick="handleFillBox('${id}', '${key}')" class="${cls}"></button>`;
        }
        contentHtml += boxHtml + st.qRaw.qParts[i+1];
      });

      html += `<div class="text-xl md:text-2xl leading-[3rem] font-bold text-slate-700 bg-${theme}-50 p-6 rounded-2xl border-2 border-${theme}-100">${contentHtml}</div></div>`;
      return html;
    }

    window.handleFillWord = function(id, wordId) {
      const st = fillStates[id];
      const wordObj = st.words.find(w => w.id === wordId);
      if (Object.values(st.b).some(v => v && v.id === wordId)) return;
      st.sel = wordObj; render();
    };
    window.handleFillBox = function(id, boxKey) {
      const st = fillStates[id];
      if (!st.sel) return;
      if (st.sel.correctBlank === boxKey) {
        st.b[boxKey] = st.sel; st.sel = null; render();
        if (Object.values(st.b).every(v => v !== null)) setTimeout(() => progressTask(id), 500);
      } else {
        st.err = boxKey; render(); setTimeout(() => { st.err = null; render(); }, 800);
      }
    };

    // --- 全局狀態推進 ---
    window.progressTask = function(taskId) {
      if (taskId.startsWith('discover')) discoverProgress++;
      else if (taskId.startsWith('power')) powerProgress++;
      else if (taskId.startsWith('apply')) applyProgress++;
      render();
    }

    // 主渲染邏輯
    function render() {
      renderProgressBar();
      const main = document.getElementById('main-content');
      switch (steps[currentStepIndex]) {
        case 'welcome': main.innerHTML = renderWelcome(); break;
        case 'discover': main.innerHTML = renderDiscover(); break;
        case 'power': main.innerHTML = renderPower(); break;
        case 'apply': main.innerHTML = renderApply(); break;
        case 'quiz': main.innerHTML = renderQuiz(); break;
      }
    }

    render();
  </script>
</body>
</html>
