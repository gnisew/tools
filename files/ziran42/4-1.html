<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能源與電路：生活中的能源</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .fade-transition {
      transition: opacity 0.4s ease-in-out, background-color 0.3s ease-in-out, border-color 0.3s ease-in-out, color 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 4s linear infinite;
    }
    
    /* 錯誤時的震動動畫 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }
    .animate-shake {
      animation: shake 0.4s ease-in-out;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-16 min-h-screen">

  <header class="bg-slate-700 text-white p-4 shadow-md">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="ph ph-lightning text-3xl text-amber-400"></i>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-wider">生活中的能源</h1>
      </div>
    </div>
  </header>

  <div id="progress-container" class="max-w-4xl mx-auto px-4 pt-6 fade-transition">
    <div class="bg-white p-4 rounded-2xl shadow-sm border-2 border-slate-200 flex flex-wrap justify-between items-center gap-2 overflow-x-auto hide-scrollbar" id="progress-bar"></div>
  </div>

  <main id="main-content" class="max-w-4xl mx-auto p-4 mt-4 fade-transition"></main>

  <script>
    function shuffleArray(array) {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    }

    const steps = ['welcome', 'discover', 'power', 'apply', 'quiz'];
    let currentStepIndex = 0;
    
    let discoverProgress = 0;    
    let powerProgress = 0;  
    let applyProgress = 0;   

    let discoverExpState = null; 
    let powerPlantState = null; 
    let applyExpState = null;

    // --- 分類遊戲狀態 (電器變身雷達) ---
    const baseSortItems = [
      { id: 1, text: '電燈', type: 'light', emoji: '💡', desc: '照亮黑暗的房間' },
      { id: 2, text: '電烤箱', type: 'heat', emoji: '🍞', desc: '加熱並烤熟食物' },
      { id: 3, text: '電動車', type: 'power', emoji: '🚗', desc: '載運人移動行駛' },
      { id: 4, text: '手電筒', type: 'light', emoji: '🔦', desc: '提供局部的照明' },
      { id: 5, text: '電熱水瓶', type: 'heat', emoji: '♨️', desc: '將水煮沸保溫' },
      { id: 6, text: '電扶梯', type: 'power', emoji: '🪜', desc: '載著人往上或往下' },
    ];
    let sortItems = [];
    let sortCurrentIndex = 0;
    let sortGameStarted = false; 
    let sortGameFinished = false; // 新增：記錄是否完成
    let sortStartTime = 0;       
    let sortTimeTaken = 0;       
    let sortErrorCat = null;      

    // 最終測驗題庫池
    const rawQuizPools = [
      [{ q: "地球上能量的主要來源是什麼？", options: ["月亮", "太陽", "海洋", "星星"], answer: 1 }],
      [{ q: "有些動物會藉由太陽的熱來做什麼？", options: ["提供光線", "提高體溫", "產生電力", "製造食物"], answer: 1 }],
      [{ q: "帆船主要是利用哪一種能源來推動？", options: ["太陽能", "水力", "地熱", "風力"], answer: 3 }],
      [{ q: "烤肉時，我們是利用哪種方式產生的熱？", options: ["燃燒木炭", "燃燒汽油", "摩擦生熱", "太陽照射"], answer: 0 }],
      [{ q: "哪一個設施的主要功能是將能源「轉換成電」？", options: ["加油站", "火力發電廠", "自來水廠", "瓦斯行"], answer: 1 }],
      [{ q: "電燈是將電轉換成什麼形式？", options: ["熱", "動力", "聲音", "光"], answer: 3 }],
      [{ q: "電烤箱是將電轉換成什麼形式？", options: ["動力", "光", "熱", "風"], answer: 2 }],
      [{ q: "「電扶梯」是將電轉換成什麼？", options: ["光", "熱", "動力", "引力"], answer: 2 }],
      [{ q: "關於生活中的能源，哪一個正確？", options: ["電可從大自然挖出來", "電烤箱轉電為光", "能源可轉換成不同形式", "只有太陽能有用"], answer: 2 }],
      [{ q: "我們平常使用的「電」，是怎麼來的？", options: ["天上掉下來的", "從各種能源轉換來的", "從土裡挖出來的", "從海裡撈起來的"], answer: 1 }]
    ];

    let quizState = 'dashboard'; 
    let quizData = [];
    let quizCurrentQ = 0;
    let quizScore = 0;
    let quizSelectedOption = null;
    let quizIsAnswered = false;
    let quizStartTime = 0;
    const LOCAL_STORAGE_KEY = '42hz41'; 

    function initQuizData() {
      quizData = rawQuizPools.map(pool => {
        const qRaw = pool[Math.floor(Math.random() * pool.length)];
        const correctOpt = qRaw.options[qRaw.answer];
        const shuffledOptions = shuffleArray(qRaw.options);
        return { question: qRaw.q, options: shuffledOptions, answer: shuffledOptions.indexOf(correctOpt) };
      });
    }

    function jumpToStep(index) {
      currentStepIndex = index;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderProgressBar() {
      const bar = document.getElementById('progress-bar');
      const stages = [
        { name: '出發', icon: 'ph-flag-pennant', color: 'amber' },
        { name: '認識能源', icon: 'ph-sun', color: 'orange' },
        { name: '發電廠', icon: 'ph-factory', color: 'teal' },
        { name: '電的應用', icon: 'ph-plug', color: 'cyan' },
        { name: '最終測驗', icon: 'ph-file-question', color: 'indigo' },
      ];

      let html = '';
      stages.forEach((stage, idx) => {
        const isActive = currentStepIndex === idx;
        const isPassed = (idx === 1 && discoverProgress >= 4) || 
                         (idx === 2 && powerProgress >= 4) || 
                         (idx === 3 && applyProgress >= 3);

        let iconHtml = isPassed ? '<i class="ph-fill ph-check-circle text-xl"></i>' : `<i class="ph ${stage.icon} text-xl"></i>`;
        let circleClass = `w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-sm fade-transition `;
        if (isActive) circleClass += `bg-${stage.color}-500 ring-4 ring-${stage.color}-200`;
        else if (isPassed) circleClass += `bg-emerald-400`;
        else circleClass += `bg-slate-300`;

        html += `
          <div class="flex items-center">
            <button onclick="jumpToStep(${idx})" class="flex flex-col items-center px-2 py-1 fade-transition cursor-pointer hover:bg-slate-50 rounded-lg">
              <div class="${circleClass}">${iconHtml}</div>
              <span class="text-xs font-bold whitespace-nowrap mt-1 ${isActive ? `text-${stage.color}-600` : 'text-slate-500'}">${stage.name}</span>
            </button>
        `;
        if (idx < stages.length - 1) html += `<div class="hidden sm:block w-8 md:w-12 h-1 rounded-full mx-1 ${isPassed ? 'bg-emerald-300' : 'bg-slate-200'}"></div>`;
        html += `</div>`;
      });
      bar.innerHTML = html;
    }

    function renderWelcome() {
      return `
        <div class="bg-white rounded-3xl p-8 md:p-12 shadow-sm border-2 border-slate-200 text-center mt-8 fade-transition">
          <div class="inline-block bg-amber-50 p-6 rounded-full mb-6">
            <i class="ph ph-lightning text-7xl text-amber-500"></i>
          </div>
          <h2 class="text-4xl md:text-5xl font-bold text-slate-800 mb-6">能源探索特攻隊</h2>
          <p class="text-xl md:text-2xl text-slate-600 leading-relaxed mb-8 max-w-2xl mx-auto">
            生活中有許多不同的能源，我們不可或缺的「電」，就是從各種能源轉換來的喔！<br/><br/>
            大自然提供了哪些能源？電又是怎麼來的？快來加入特攻隊一起探索吧！
          </p>
          <button onclick="jumpToStep(1)" class="inline-flex items-center gap-3 bg-amber-500 hover:bg-amber-600 text-white px-8 py-4 rounded-full text-2xl font-bold shadow-sm">
            <i class="ph-fill ph-play-circle text-3xl"></i> 開始探索！
          </button>
        </div>
      `;
    }

    /* -----------------------------------------------------------------
       遊戲一：情境填空配對 (能源應用情境鑑定)
       ----------------------------------------------------------------- */
    const energyGridState = {
      isInit: false,
      isStarted: false,
      isFinished: false, // 新增：記錄遊戲是否完成
      startTime: 0,
      timeTaken: 0,
      selectedWord: null,
      errorBox: null,
      words: ['汽油', '太陽', '水力', '地熱', '瓦斯', '風力'],
      cards: [
        { id: 'c1', ans: '太陽', text: '的光可以讓植物轉換成養分。', emoji: '🌻', bg: 'bg-green-100' },
        { id: 'c2', ans: '地熱', text: '可以讓水加熱而形成溫泉。', emoji: '♨️', bg: 'bg-stone-200' },
        { id: 'c3', ans: '瓦斯', text: '可以燃燒而產生熱來烹煮食物。', emoji: '🍳', bg: 'bg-orange-100' },
        { id: 'c4', ans: '汽油', text: '燃燒產生的熱可轉換成車子動力。', emoji: '🚗', bg: 'bg-blue-100' },
        { id: 'c5', ans: '風力', text: '可以推動風帆使船移動。', emoji: '⛵', bg: 'bg-cyan-100' },
        { id: 'c6', ans: '水力', text: '可以推動水車轉動。', emoji: '🎡', bg: 'bg-sky-100' }
      ],
      placed: {} 
    };

    window.startEnergyGridGame = function() {
      energyGridState.words = shuffleArray(energyGridState.words);
      energyGridState.isInit = true;
      energyGridState.isStarted = true;
      energyGridState.isFinished = false;
      energyGridState.startTime = Date.now();
      energyGridState.placed = {};
      energyGridState.selectedWord = null;
      energyGridState.errorBox = null;
      render();
    };

    function renderEnergyGridGame() {
      const st = energyGridState;

      let html = `
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 fade-transition ${st.isFinished ? 'bg-orange-50 border-orange-200 opacity-90' : 'border-slate-200'}">
          <h3 class="text-xl font-bold text-orange-700 mb-4 flex items-center justify-between">
            <span class="flex items-center gap-2"><i class="ph-fill ph-image"></i> 任務四：能源應用情境鑑定</span>
            ${st.isFinished ? '<i class="ph-fill ph-check-circle text-emerald-500 text-2xl"></i>' : ''}
          </h3>
      `;

      // 尚未開始遊戲時顯示開始畫面
      if (!st.isStarted && !st.isFinished) {
        html += `
          <div class="text-center py-10 fade-transition">
            <i class="ph-fill ph-timer text-6xl text-orange-400 mb-4 block"></i>
            <p class="text-slate-600 mb-6 font-bold text-lg">準備好挑戰情境鑑定嗎？系統將為你計時喔！</p>
            <button onclick="startEnergyGridGame()" class="inline-flex items-center gap-2 bg-orange-500 hover:bg-orange-600 text-white px-8 py-3 rounded-full text-xl font-bold transition-all shadow-md hover:scale-105">
              <i class="ph-bold ph-play"></i> 開始計時挑戰
            </button>
          </div></div>`;
        return html;
      }

      // 遊戲完成時顯示成績與重新開始按鈕
      if (st.isFinished) {
        html += `
          <div class="flex flex-col items-center justify-center gap-4 mb-6">
            <div class="text-center text-emerald-600 font-bold text-xl bg-emerald-50 py-3 px-8 rounded-xl border border-emerald-200 shadow-sm">
              ✅ 挑戰成功！總共花費時間：${st.timeTaken} 秒
            </div>
            <button onclick="startEnergyGridGame()" class="inline-flex items-center gap-2 bg-white hover:bg-orange-50 text-orange-600 border-2 border-orange-200 px-6 py-2 rounded-full font-bold transition-all shadow-sm hover:scale-105">
              <i class="ph-bold ph-arrow-counter-clockwise"></i> 再玩一次
            </button>
          </div>`;
      } else {
        html += `<p class="text-slate-600 mb-6">點擊上方的「能源字卡」，再點擊對應圖片裡的「空格」填寫答案吧！</p>`;
      }

      // 渲染字卡區
      if (!st.isFinished) {
        html += `<div class="flex flex-wrap justify-center gap-3 mb-8 bg-slate-50 p-4 rounded-2xl border border-slate-200">`;
        st.words.forEach(word => {
          const isUsed = Object.values(st.placed).includes(word);
          if (isUsed) {
            html += `<div class="px-6 py-2 border-2 border-transparent text-transparent select-none cursor-default">✔️</div>`;
          } else {
            const isSel = st.selectedWord === word;
            html += `<button onclick="handleGridWordSelect('${word}')" class="px-6 py-2 rounded-xl font-bold text-lg transition-all ${isSel ? 'bg-orange-500 text-white shadow-md scale-110' : 'bg-white border-2 border-orange-200 text-orange-700 hover:bg-orange-100'}">${word}</button>`;
          }
        });
        html += `</div>`;
      }

      // 渲染情境卡片區
      html += `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">`;
      st.cards.forEach((card, idx) => {
        const hasAnswer = st.placed[card.id];
        const isError = st.errorBox === card.id;
        
        let boxHtml = '';
        if (hasAnswer) {
          boxHtml = `<span class="inline-block px-3 py-1 bg-emerald-500 text-white rounded-lg mx-1 font-bold shadow-sm">${hasAnswer}</span>`;
        } else {
          let boxClass = `inline-block w-16 h-8 border-b-4 border-dashed mx-1 align-middle cursor-pointer transition-all `;
          if (isError) boxClass += `border-rose-500 bg-rose-50 animate-shake`;
          else if (st.selectedWord) boxClass += `border-orange-400 bg-orange-50 hover:bg-orange-200`;
          else boxClass += `border-slate-300 bg-white`;
          
          boxHtml = `<button onclick="handleGridBoxSelect('${card.id}')" class="${boxClass}"></button>`;
        }

        html += `
          <div class="rounded-2xl border-2 border-slate-200 overflow-hidden bg-white shadow-sm flex flex-col fade-transition">
            <div class="h-24 ${card.bg} flex items-center justify-center text-5xl relative">
              <span class="absolute top-2 left-2 bg-white text-slate-500 text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center shadow-sm">${idx + 1}</span>
              ${card.emoji}
            </div>
            <div class="p-4 text-center text-slate-700 font-bold leading-relaxed flex-grow flex items-center justify-center">
              <div>${boxHtml} ${card.text}</div>
            </div>
          </div>
        `;
      });
      html += `</div></div>`;
      return html;
    }

    window.handleGridWordSelect = function(word) {
      if (Object.values(energyGridState.placed).includes(word)) return;
      energyGridState.selectedWord = word;
      render();
    };

    window.handleGridBoxSelect = function(cardId) {
      const st = energyGridState;
      if (!st.selectedWord || st.isFinished) return; 
      
      const card = st.cards.find(c => c.id === cardId);
      if (card.ans === st.selectedWord) {
        st.placed[cardId] = st.selectedWord;
        st.selectedWord = null;
        
        if (Object.keys(st.placed).length === st.cards.length) {
          st.timeTaken = Math.floor((Date.now() - st.startTime) / 1000);
          st.isFinished = true;
          // 推進全域進度 (只有第一次完成會增加)
          if (discoverProgress < 4) setTimeout(() => progressTask('discoverGrid'), 500);
        }
        render();
      } else {
        st.errorBox = cardId;
        render();
        setTimeout(() => { st.errorBox = null; render(); }, 400);
      }
    };

    // --- 區塊渲染：1. 認識能源 ---
    function renderDiscover() {
      let expText = '點擊上方按鈕，看看大自然提供了哪些能源！';
      if (discoverExpState === 'sun') expText = '🌻 太陽的光和熱：植物利用陽光製造養分，動物利用熱提高體溫！';
      if (discoverExpState === 'wind') expText = '⛵ 風力能：看不見的風，卻能產生推動帆船前進的力量！';
      if (discoverExpState === 'geo') expText = '♨️ 地熱能：地底下的熱能把地下水加熱，湧出地面變成溫泉！';
      if (discoverExpState === 'fire') expText = '🔥 燃燒的熱能：燃燒木炭或瓦斯，產生的熱可以用來烹煮食物！';

      let content = `
        <div class="space-y-6 fade-transition">
          <div class="bg-orange-50 border-l-8 border-orange-500 p-4 rounded-r-2xl shadow-sm flex gap-4 items-start">
            <div class="text-4xl">☀️</div>
            <div>
              <h3 class="font-bold text-orange-800 text-lg">探索任務：尋找生活中的能源</h3>
              <p class="text-orange-700">「太陽是地球上能量的主要來源。親自點擊觀察這些能源能做什麼用吧！」</p>
            </div>
          </div>

          <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 border-slate-200 text-center">
            <h2 class="text-2xl font-bold text-orange-600 mb-6 flex justify-center items-center gap-2"><i class="ph-fill ph-magnifying-glass"></i> 能源觀察站</h2>
            <div class="flex flex-wrap justify-center gap-3 mb-6">
               <button onclick="triggerDiscoverExp('sun')" class="bg-yellow-50 hover:bg-yellow-100 border-2 border-yellow-300 text-yellow-800 px-4 py-3 rounded-xl font-bold ${discoverExpState==='sun'?'ring-4 ring-yellow-400':''}">☀️ 太陽能</button>
               <button onclick="triggerDiscoverExp('wind')" class="bg-sky-50 hover:bg-sky-100 border-2 border-sky-300 text-sky-800 px-4 py-3 rounded-xl font-bold ${discoverExpState==='wind'?'ring-4 ring-sky-400':''}">💨 風力能</button>
               <button onclick="triggerDiscoverExp('geo')" class="bg-rose-50 hover:bg-rose-100 border-2 border-rose-300 text-rose-800 px-4 py-3 rounded-xl font-bold ${discoverExpState==='geo'?'ring-4 ring-rose-400':''}">♨️ 地熱能</button>
               <button onclick="triggerDiscoverExp('fire')" class="bg-orange-50 hover:bg-orange-100 border-2 border-orange-300 text-orange-800 px-4 py-3 rounded-xl font-bold ${discoverExpState==='fire'?'ring-4 ring-orange-400':''}">🔥 燃燒熱能</button>
            </div>
            <div class="p-4 bg-orange-100 rounded-xl text-orange-800 font-bold min-h-[4rem] flex items-center justify-center shadow-inner text-lg">
               ${expText}
            </div>
          </div>
      `;

      if (discoverProgress >= 0) content += renderMatchingGame('discoverMatch', '任務一：能源連連看', discoverProgress > 0, [{id:'sun', e:'🌻', t:'太陽的光', c:'bg-yellow-50 text-yellow-800'}, {id:'wind', e:'⛵', t:'風力', c:'bg-sky-50 text-sky-800'}, {id:'geo', e:'♨️', t:'地熱', c:'bg-rose-50 text-rose-800'},{id:'fire', e:'🔥', t:'燃燒瓦斯', c:'bg-orange-50 text-orange-800'}], [{id:'fire', t:'產生熱能來烹煮食物'}, {id:'sun', t:'讓植物轉換成養分長大'}, {id:'geo', t:'把地下水加熱變成溫泉'},{id:'wind', t:'推動帆船讓船移動'}], 'orange');
      if (discoverProgress >= 1) content += renderMiniTF('discoverTF', '任務二：觀念是非題', [{q: '太陽提供光和熱，是萬物生存重要動力來源。', a: true},{q: '烤肉是利用水力產生的熱。', a: false}], discoverProgress > 1, 'orange');
      if (discoverProgress >= 2) content += renderMiniFill('discoverFill', '任務三：文字填空', discoverProgress > 2, [{ qParts: ["植物生長需要", "的光；溫泉是水被", "加熱形成的。"], ans: ["太陽", "地熱"], distractors: ["風力", "燃燒"] }], 'orange');
      if (discoverProgress >= 3) content += renderEnergyGridGame(); // 移除 isCompleted 參數，依賴內部狀態

      content += `
        <div class="text-center fade-transition ${discoverProgress === 4 ? 'opacity-100' : 'opacity-0 pointer-events-none hidden'}">
          <button onclick="jumpToStep(2)" class="inline-flex items-center gap-2 bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-full text-xl font-bold shadow-sm">
            全數破關！前往發電廠 <i class="ph-bold ph-arrow-right"></i>
          </button>
        </div>
      </div>`;
      return content;
    }

    window.triggerDiscoverExp = function(type) { discoverExpState = type; render(); }

    /* -----------------------------------------------------------------
       遊戲二：能源永續分類箱 (再生/非再生)
       ----------------------------------------------------------------- */
    const renewSortState = {
      isInit: false,
      isStarted: false,
      isFinished: false, // 新增：記錄遊戲是否完成
      startTime: 0,
      timeTaken: 0,

      html += `

    window.handleRenewItemSelect = function(id) {
      renewSortState.selectedItem = renewSortState.items.find(i => i.id === id);
      render();
    };

    window.handleRenewColumnSelect = function(colType) {
      const st = renewSortState;
      if (!st.selectedItem || st.isFinished) return;
      
      if (st.selectedItem.type === colType) {
        if (colType === 're') st.placedRe.push(st.selectedItem);
        else st.placedNon.push(st.selectedItem);
        
        st.selectedItem = null;
        
        // 檢查是否完成
        if (st.placedRe.length + st.placedNon.length === st.items.length) {
          st.timeTaken = Math.floor((Date.now() - st.startTime) / 1000);
          st.isFinished = true;
          if (powerProgress < 4) setTimeout(() => progressTask('powerSort'), 500);
        }
        render();
      } else {
        st.errorColumn = colType;
        render();
        setTimeout(() => { st.errorColumn = null; render(); }, 400);
      }
    };

    // --- 區塊渲染：2. 發電廠 ---

              <button onclick="triggerPowerPlant('wind')" class="bg-sky-100 hover:bg-sky-200 border-2 border-sky-400 text-sky-800 px-4 py-3 rounded-xl font-bold">💨 風力</button>
              <button onclick="triggerPowerPlant('hydro')" class="bg-blue-100 hover:bg-blue-200 border-2 border-blue-400 text-blue-800 px-4 py-3 rounded-xl font-bold">💧 水力</button>
              <button onclick="triggerPowerPlant('coal')" class="bg-orange-100 hover:bg-orange-200 border-2 border-orange-400 text-orange-800 px-4 py-3 rounded-xl font-bold">🔥 燃煤</button>
            </div>
          </div>
      `;

      if (powerProgress >= 0) content += renderMiniMCQ('powerMCQ', '任務一：發電選擇', [{q: '將大自然能源轉換成什麼最方便使用？', opts: ["木炭", "瓦斯", "電", "溫泉"], a: 2}], powerProgress > 0, 'teal');
      if (powerProgress >= 1) content += renderMiniTF('powerTF', '任務二：是非判斷', [{q: '除了火力發電，也能利用風水太陽發電。', a: true}], powerProgress > 1, 'teal');
      if (powerProgress >= 2) content += renderMiniFill('powerFill', '任務三：文字填空', powerProgress > 2, [{ qParts: ["太陽能利用太陽的", "發電；火力利用煤炭", "發電。"], ans: ["光", "燃燒"], distractors: ["風力", "地熱"] }], 'teal');

    window.triggerPowerPlant = function(type) { powerPlantState = type; render(); }

    // --- 區塊渲染：3. 電的應用 ---
    function renderApply() {
      let content = `
        <div class="space-y-6 fade-transition">

          ${renderSortGame('任務一：電器變身雷達')}
      `;

      if (applyProgress >= 1) content += renderMiniFill('applyFill', '任務二：變身填空', applyProgress > 1, [{ qParts: ["電烤箱將電轉換成", "；電扶梯將電轉換成", "。"], ans: ["熱", "動力"], distractors: ["光", "聲音"] }], 'cyan');
      if (applyProgress >= 2) content += renderMiniMCQ('applyMCQ', '任務三：應用選擇', [{q: '吹風機吹出熱風，主要是將電轉換成？', opts: ["動力和熱", "光和熱", "光和動力", "只有光"], a: 0}], applyProgress > 2, 'cyan');

    /* -----------------------------------------------------------------
       遊戲三：電器變身雷達
       ----------------------------------------------------------------- */
    window.startSortGame = function() { 
      sortItems = shuffleArray(baseSortItems); 
      sortCurrentIndex = 0; 
      sortGameStarted = true; 
      sortGameFinished = false;
      sortErrorCat = null;
      sortStartTime = Date.now(); 
      render(); 
    }

    function renderSortGame(title) {
      let html = `<div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 ${sortGameFinished ? 'bg-cyan-50 border-cyan-200 opacity-90' : 'border-slate-200'}">
          <h2 class="text-xl font-bold text-cyan-700 mb-4 flex items-center justify-between">
            <span class="flex items-center gap-2"><i class="ph-fill ph-basket"></i> ${title}</span>
            ${sortGameFinished ? '<i class="ph-fill ph-check-circle text-emerald-500 text-2xl"></i>' : ''}
          </h2>`;
          
      if (!sortGameFinished && !sortGameStarted) {
        html += `
          <div class="text-center py-10 fade-transition">
            <i class="ph-fill ph-timer text-6xl text-cyan-400 mb-4 block"></i>
            <p class="text-slate-600 mb-6 font-bold text-lg">準備好挑戰電器變身雷達了嗎？系統將為你計時喔！</p>
            <button onclick="startSortGame()" class="inline-flex items-center gap-2 bg-cyan-500 hover:bg-cyan-600 text-white px-8 py-3 rounded-full text-xl font-bold transition-all shadow-md hover:scale-105">
              <i class="ph-bold ph-play"></i> 開始計時挑戰
            </button>
          </div>`;
      } else if (sortGameStarted && !sortGameFinished) {
        const cur = sortItems[sortCurrentIndex];
        html += `<div class="text-center mb-6"><div class="text-6xl mb-2">${cur.emoji}</div><h3 class="text-2xl font-bold">${cur.text}</h3></div><div class="flex gap-2 md:gap-4 justify-center">`;
        [{id:'light',t:'光'},{id:'heat',t:'熱'},{id:'power',t:'動力'}].forEach(b => {
          let btnCls = "bg-slate-100 hover:bg-slate-200 text-slate-700 border-transparent";
          if (sortErrorCat === b.id) {
             btnCls = "bg-rose-500 text-white border-rose-600 animate-shake"; // 錯誤變色加搖晃
          }
          html += `<button onclick="handleSort('${b.id}')" class="px-6 py-3 border-2 rounded-xl text-lg font-bold transition-all ${btnCls}">${b.t}</button>`;
        });
        html += `</div>`;
      } else if (sortGameFinished) {
        html += `
          <div class="flex flex-col items-center justify-center gap-4">
            <div class="text-center text-emerald-600 font-bold text-xl bg-emerald-50 py-3 px-8 rounded-xl border border-emerald-200 shadow-sm">
              ✅ 鑑定完成！總共花費時間：${sortTimeTaken} 秒
            </div>
            <button onclick="startSortGame()" class="inline-flex items-center gap-2 bg-white hover:bg-cyan-50 text-cyan-600 border-2 border-cyan-200 px-6 py-2 rounded-full font-bold transition-all shadow-sm hover:scale-105">
              <i class="ph-bold ph-arrow-counter-clockwise"></i> 再玩一次
            </button>
          </div>`;
      }
      return html + `</div>`;
    }

    window.handleSort = function(cat) {
      if (sortErrorCat || sortGameFinished) return; // 防呆
      const cur = sortItems[sortCurrentIndex];
      
      if (cur.type === cat) {
        sortCurrentIndex++;
        if (sortCurrentIndex >= sortItems.length) {
          sortTimeTaken = Math.floor((Date.now() - sortStartTime) / 1000);
          sortGameFinished = true;
          sortGameStarted = false;
          if (applyProgress === 0) setTimeout(() => progressTask('applySort'), 500);
        }
        render();
      } else {
        sortErrorCat = cat;
        render();
        setTimeout(() => { sortErrorCat = null; render(); }, 400);
      }
    }

    // --- 區塊渲染：4. 最終測驗 ---
    function renderQuiz() {
      if (quizState === 'dashboard') {
        return `<div class="text-center p-8"><h2 class="text-3xl font-bold text-indigo-800 mb-4">能源知識總挑戰</h2><button onclick="startFinalQuiz()" class="bg-indigo-600 text-white px-8 py-4 rounded-full font-bold">開始測驗</button></div>`;
      }
      if (quizState === 'result') {
        return `<div class="text-center p-8"><h2 class="text-4xl font-bold text-indigo-600 mb-4">測驗結束</h2><p class="text-2xl">得分：${quizScore} / 100</p><button onclick="returnToQuizDashboard()" class="mt-4 bg-slate-200 px-6 py-2 rounded-full font-bold">返回</button></div>`;
      }
      const q = quizData[quizCurrentQ];
      let html = `<div class="p-8"><h2 class="text-2xl font-bold mb-6">${q.question}</h2><div class="grid grid-cols-2 gap-4">`;
      q.options.forEach((opt, idx) => {
        let cls = "bg-slate-50 border-slate-200 text-slate-700";
        if (quizIsAnswered && idx === q.answer) cls = "bg-emerald-50 border-emerald-400 text-emerald-800";
        else if (quizIsAnswered && idx === quizSelectedOption) cls = "bg-rose-50 border-rose-300 text-rose-700";
        html += `<button onclick="handleQuizAnswer(${idx})" ${quizIsAnswered?'disabled':''} class="p-4 border-2 rounded-xl text-left font-bold ${cls}">${opt}</button>`;
      });
      return html + `</div></div>`;
    }

    window.startFinalQuiz = function() { initQuizData(); quizCurrentQ = 0; quizScore = 0; quizIsAnswered = false; quizStartTime = Date.now(); quizState = 'playing'; render(); }
    window.handleQuizAnswer = function(idx) {
      if (quizIsAnswered) return;
      quizSelectedOption = idx; quizIsAnswered = true;
      if (idx === quizData[quizCurrentQ].answer) quizScore += 10;
      render();
      setTimeout(() => {
        if (quizCurrentQ + 1 < quizData.length) { quizCurrentQ++; quizSelectedOption = null; quizIsAnswered = false; }
        else { quizState = 'result'; }
        render();
      }, 1000);
    }
    window.returnToQuizDashboard = function() { quizState = 'dashboard'; render(); }

    // --- 共用小遊戲底層 ---
    const mcqStates = {};
    function renderMiniMCQ(id, title, qPool, isCompleted, theme) {
      if (!mcqStates[id]) mcqStates[id] = { selected: null, qRaw: qPool[0], opts: shuffleArray(qPool[0].opts) };
      const st = mcqStates[id]; const ansIdx = st.opts.indexOf(st.qRaw.opts[st.qRaw.a]);
      let html = `<div class="bg-white rounded-3xl p-6 shadow-sm border-2 ${isCompleted?`bg-${theme}-50 border-${theme}-200 opacity-90`:'border-slate-200'}"><h3 class="font-bold text-xl mb-4 text-${theme}-700">${title}</h3><p class="font-bold mb-4">${st.qRaw.q}</p><div class="grid grid-cols-2 gap-4">`;
      st.opts.forEach((opt, idx) => {
        let cls = isCompleted ? (idx===ansIdx?'bg-emerald-50 text-emerald-800 border-emerald-300':'bg-slate-50 text-slate-400 border-slate-100') : (st.selected===idx?(idx===ansIdx?'bg-emerald-50 border-emerald-300':'bg-rose-50 border-rose-300'):'bg-slate-50 hover:bg-slate-100 border-slate-200');
        html += `<button onclick="handleMCQ('${id}', ${idx}, ${ansIdx})" class="p-4 border-2 rounded-xl font-bold transition-colors ${cls}">${opt}</button>`;
      });
      return html + `</div></div>`;
    }
    window.handleMCQ = function(id, selIdx, ansIdx) { if(mcqStates[id].selected!==null)return; mcqStates[id].selected=selIdx; render(); if(selIdx===ansIdx)setTimeout(()=>progressTask(id),500); else setTimeout(()=>{mcqStates[id].selected=null;render();},800);}

    const tfStates = {};
    function renderMiniTF(id, title, qPool, isCompleted, theme) {
      if (!tfStates[id]) tfStates[id] = { selected: null, qRaw: qPool[0] };
      const st = tfStates[id];
      let html = `<div class="bg-white rounded-3xl p-6 shadow-sm border-2 ${isCompleted?`bg-${theme}-50 border-${theme}-200 opacity-90`:'border-slate-200'}"><h3 class="font-bold text-xl mb-4 text-${theme}-700">${title}</h3><p class="font-bold mb-4">${st.qRaw.q}</p><div class="flex gap-4">`;
      [true, false].forEach(v => {
        let cls = isCompleted ? (v===st.qRaw.a?'bg-emerald-50 border-emerald-300 text-emerald-800':'bg-slate-50 text-slate-400 border-slate-100') : (st.selected===v?(v===st.qRaw.a?'bg-emerald-50 border-emerald-300':'bg-rose-50 border-rose-300 animate-shake'):'bg-slate-50 hover:bg-slate-100 border-slate-200');
        html += `<button onclick="handleTF('${id}', ${v}, ${st.qRaw.a})" class="flex-1 p-4 border-2 rounded-xl font-bold transition-all ${cls}">${v?'⭕ 是':'❌ 非'}</button>`;
      });
      return html + `</div></div>`;
    }
    window.handleTF = function(id, sel, ans) { if(tfStates[id].selected!==null)return; tfStates[id].selected=sel; render(); if(sel===ans)setTimeout(()=>progressTask(id),500); else setTimeout(()=>{tfStates[id].selected=null;render();},800);}

    const matchStates = {};
    function renderMatchingGame(id, title, isCompleted, l, r, theme) {
      if (!matchStates[id]) matchStates[id] = { sel: null, matches: [], err: false, l: shuffleArray(l), r: shuffleArray(r) };
      const st = matchStates[id]; if(isCompleted && st.matches.length < l.length) st.matches = l.map(i=>i.id);
      let html = `<div class="bg-white rounded-3xl p-6 shadow-sm border-2 ${isCompleted?`bg-${theme}-50 border-${theme}-200 opacity-90`:'border-slate-200'}"><h3 class="font-bold text-xl mb-4 text-${theme}-700">${title}</h3><div class="flex gap-4"><div class="w-1/2 space-y-2">`;
      st.l.forEach(i => {
         let btnCls = st.matches.includes(i.id)?'bg-slate-100 opacity-50 border-slate-200':(st.sel===i.id?(st.err?'bg-rose-100 border-rose-400 animate-shake ring-4 ring-rose-200':'ring-4 border-transparent'):i.c + ' border-transparent');
         html += `<button onclick="matchL('${id}','${i.id}')" class="w-full p-3 border-2 rounded-xl font-bold transition-all ${btnCls}">${i.e} ${i.t}</button>`;
      });
      html += `</div><div class="w-1/2 space-y-2">`;
      st.r.forEach(i => html += `<button onclick="matchR('${id}','${i.id}')" class="w-full p-3 border-2 rounded-xl font-bold text-left transition-colors ${st.matches.includes(i.id)?'bg-emerald-50 border-emerald-200 text-emerald-800':'bg-slate-50 hover:bg-slate-100 border-slate-200'}">${i.t}</button>`);
      return html + `</div></div></div>`;
    }
    window.matchL = function(id, v) { matchStates[id].sel = v; matchStates[id].err = false; render(); }
    window.matchR = function(id, v) { 
      const st = matchStates[id]; if(!st.sel || st.matches.includes(v)) return;
      if (st.sel === v) { st.matches.push(v); st.sel = null; render(); if(st.matches.length === st.l.length) setTimeout(()=>progressTask(id),500); }
      else { st.err = true; render(); setTimeout(() => { st.sel = null; st.err = false; render(); }, 400); }
    }

    const fillStates = {};
    function renderMiniFill(id, title, isCompleted, words, theme) {
      if (!fillStates[id]) fillStates[id] = { b: {b1:null, b2:null}, sel: null, err: null, words: shuffleArray([...words[0].ans, ...words[0].distractors]), q: words[0] };
      const st = fillStates[id]; if (isCompleted) { st.b.b1 = st.q.ans[0]; st.b.b2 = st.q.ans[1]; }
      let html = `<div class="bg-white rounded-3xl p-6 shadow-sm border-2 ${isCompleted?`bg-${theme}-50 border-${theme}-200 opacity-90`:'border-slate-200'}"><h3 class="font-bold text-xl mb-4 text-${theme}-700">${title}</h3>`;
      if (!isCompleted) {
        html += `<div class="flex gap-2 mb-4">`;
        st.words.forEach(w => { if(!Object.values(st.b).includes(w)) html += `<button onclick="fillW('${id}','${w}')" class="px-4 py-1 rounded-full font-bold bg-${theme}-100 transition-all ${st.sel===w?`ring-4 ring-${theme}-400 scale-110`:''}">${w}</button>`; });
        html += `</div>`;
      }
      html += `<div class="text-xl font-bold leading-[3rem] p-4 bg-${theme}-50 rounded-xl border border-${theme}-100">${st.q.qParts[0]}`;
      [1,2].forEach(i => {
        let bHtml = st.b[`b${i}`] ? `<span class="bg-green-500 text-white px-3 py-1 rounded-full mx-1 shadow-sm">${st.b[`b${i}`]}</span>` : `<button onclick="fillB('${id}','b${i}')" class="inline-block w-20 h-8 border-b-4 border-dashed mx-1 align-middle cursor-pointer transition-colors ${st.err===`b${i}`?'border-rose-500 bg-rose-50 animate-shake':`border-${theme}-300 hover:bg-${theme}-100`}"></button>`;
        html += bHtml + st.q.qParts[i];
      });
      return html + `</div></div>`;
    }
    window.fillW = function(id, w) { fillStates[id].sel = w; render(); }
    window.fillB = function(id, bKey) {
      const st = fillStates[id]; if (!st.sel) return;
      const ansKey = st.q.ans.indexOf(st.sel) === 0 ? 'b1' : 'b2';
      if (ansKey === bKey) { st.b[bKey] = st.sel; st.sel = null; render(); if(st.b.b1 && st.b.b2) setTimeout(()=>progressTask(id),500); }
      else { st.err = bKey; render(); setTimeout(()=>{st.err=null;render();},400); }
    }

    // 全局推進
    window.progressTask = function(taskId) {
      if (taskId.startsWith('discover')) discoverProgress++;
      else if (taskId.startsWith('power')) powerProgress++;
      else if (taskId.startsWith('apply')) applyProgress++;
      render();
    }

    function render() {
      renderProgressBar();
      const main = document.getElementById('main-content');
      switch (steps[currentStepIndex]) {
        case 'welcome': main.innerHTML = renderWelcome(); break;
        case 'discover': main.innerHTML = renderDiscover(); break;
        case 'power': main.innerHTML = renderPower(); break;
        case 'apply': main.innerHTML = renderApply(); break;
        case 'quiz': main.innerHTML = renderQuiz(); break;
      }
    }
    render();
  </script>
</body>
</html>
