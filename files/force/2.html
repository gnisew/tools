<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>力的表示：互動小探險</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fdfbf7;
            user-select: none;
        }
        
        /* 重新美化：符合課本圖例的加粗箭頭樣式 */
        .force-arrow {
            transform-origin: 0% 50%;
            transition: width 0.05s linear, transform 0.05s linear;
            pointer-events: none;
            z-index: 15;
            border-radius: 6px 0 0 6px;
            background-color: #ea4335; /* 採用更飽和的紅色 */
            height: 12px !important; /* 加粗線條 */
        }
        .force-arrow::after {
            content: '';
            position: absolute;
            right: -24px;
            top: 50%;
            transform: translateY(-50%);
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-left: 24px solid #ea4335;
        }
        
        /* 重新美化：更清晰的作用點樣式 */
        .action-point {
            background-color: #ea4335;
            border: 4px solid #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 20;
            width: 24px !important;
            height: 24px !important;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -65%); }
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
        
        .tab-active {
            background-color: #22c55e;
            color: white;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
        }
        .tab-inactive {
            background-color: #e2e8f0;
            color: #475569;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
        }
        
        #ball-container {
            cursor: grab;
        }
        #ball-container:active {
            cursor: grabbing;
        }
        
        .grass-bg {
            background-color: #f4fcf6; 
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-green-400">
        
        <header class="bg-green-100 p-6 text-center relative border-b-4 border-green-400">
            <h1 class="text-3xl md:text-4xl font-black text-green-800 tracking-wider">⚽ 力的表示小探險 🚀</h1>
            <p class="mt-2 text-green-700 font-bold text-lg">讓我們用箭頭畫出看不見的「力」！</p>
        </header>

        <nav class="flex justify-center p-4 gap-4 bg-green-50">
            <button onclick="switchTab('learn')" id="tab-learn" class="tab-active px-6 py-3 rounded-2xl font-bold text-lg transition-all transform hover:scale-105 active:scale-95">📖 學習區</button>
            <button onclick="switchTab('game')" id="tab-game" class="tab-inactive px-6 py-3 rounded-2xl font-bold text-lg transition-all transform hover:scale-105 active:scale-95">🎮 遊戲挑戰</button>
            <button onclick="switchTab('quiz')" id="tab-quiz" class="tab-inactive px-6 py-3 rounded-2xl font-bold text-lg transition-all transform hover:scale-105 active:scale-95">📝 測驗區</button>
        </nav>

        <main class="p-6 md:p-8">
            
            <!-- 1. 學習區 -->
            <section id="sec-learn" class="block space-y-6">
                <div class="bg-blue-50 border-4 border-blue-200 rounded-2xl p-6">
                    <h2 class="text-2xl font-bold text-blue-800 mb-4">🎯 力的三個重要元素</h2>
                    <p class="text-lg text-gray-700 mb-4">我們看不見力，但可以用<span class="text-red-600 font-bold">紅色的箭頭</span>來表示它！請觀察下面的足球：</p>
                    
                    <div class="relative w-full h-64 grass-bg rounded-xl border-2 border-green-300 flex items-center justify-center overflow-hidden mb-4 shadow-inner">
                        
                        <!-- 足球置於左側，避免與右邊文字重疊 -->
                        <div class="absolute left-[20%] md:left-[30%] top-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[80px] h-[80px]">
                            <div class="text-[75px] absolute inset-0 flex items-center justify-center leading-none">⚽</div>
                            <!-- 作用點在左緣，箭頭向右穿透 -->
                            <div class="absolute rounded-full action-point" style="top: 50%; left: 8px; transform: translate(-50%, -50%);"></div>
                            <div class="absolute force-arrow w-[120px] md:w-[150px]" style="top: 50%; left: 8px; transform: translateY(-50%) rotate(0deg);"></div>
                        </div>
                        
                        <!-- 標籤：完美避開中央圖案與彼此重疊 -->
                        <div class="absolute top-6 left-4 md:left-12 bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-full text-sm md:text-base font-bold shadow-md text-red-600 border border-red-200">作用點 (點)</div>
                        <div class="absolute top-[30%] right-4 md:right-16 bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-full text-sm md:text-base font-bold shadow-md text-red-600 border border-red-200">力的大小 (長度)</div>
                        <div class="absolute bottom-8 right-4 md:right-16 bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-full text-sm md:text-base font-bold shadow-md text-red-600 border border-red-200">力的方向 (箭頭)</div>
                    </div>
                </div>
            </section>

            <!-- 2. 遊戲挑戰區 -->
            <section id="sec-game" class="hidden space-y-4">
                <div class="bg-yellow-50 border-4 border-yellow-300 rounded-2xl p-6">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                        <h2 class="text-2xl font-bold text-yellow-800">🏆 精準傳球打怪物！</h2>
                        
                        <!-- 計時與得分面板 -->
                        <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-xl border-2 border-yellow-400 shadow-sm w-full md:w-auto">
                            <div class="text-lg font-bold text-gray-700">⏱️ 時間：<span id="game-timer" class="text-red-500 text-2xl">100</span> 秒</div>
                            <div class="text-lg font-bold text-gray-700">⭐ 得分：<span id="game-score" class="text-green-600 text-2xl">0</span></div>
                            <button onclick="startGame()" class="ml-2 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-1.5 px-4 rounded-lg shadow-md active:translate-y-1 transition-all">重新開始</button>
                        </div>
                    </div>

                    <p class="text-gray-700 mb-4 font-bold">
                        <span class="text-red-600">操作說明：</span>在足球上按住拖拉，畫出力箭頭。
                        <span class="text-blue-700">挑戰目標：箭頭拉越長，球飛越遠！讓球<span class="text-red-600 underline text-base">剛好停在怪物內</span>！</span>
                    </p>
                    
                    <div id="game-arena" class="relative w-full h-72 md:h-96 grass-bg border-4 border-green-400 rounded-xl overflow-hidden shadow-inner mb-6">
                        
                        <!-- 目標怪物與透明判定圈 -->
                        <div id="target" class="absolute transform -translate-x-1/2 -translate-y-1/2 z-0 animate-bounce-slow transition-transform duration-300 flex items-center justify-center w-[70px] h-[70px]">
                            <!-- 透明的判定圈圈：幫助學生視覺對齊，並消除 emoji 本身留白的誤差 -->
                            <div class="absolute inset-0 bg-white/60 rounded-full border-2 border-dashed border-gray-500 shadow-sm"></div>
                            <div id="target-emoji" class="text-5xl relative z-10 select-none">👾</div>
                        </div>
                        
                        <!-- 足球 -->
                        <div id="ball-container" class="absolute z-30 transition-all w-[60px] h-[60px]" style="left: 15%; top: 50%; transform: translate(-50%, -50%);">
                            <div class="text-[55px] absolute inset-0 flex items-center justify-center select-none" id="ball-emoji">⚽</div>
                            
                            <div id="action-point" class="absolute rounded-full action-point hidden"></div>
                            <div id="player-arrow" class="absolute force-arrow hidden"></div>
                        </div>
                    </div>

                    <div class="mt-2 text-center h-12">
                        <p id="game-message" class="text-xl font-bold text-blue-700"></p>
                    </div>
                </div>
            </section>

            <!-- 3. 測驗區 -->
            <section id="sec-quiz" class="hidden space-y-6">
                <div class="bg-purple-50 border-4 border-purple-200 rounded-2xl p-6">
                    <h2 class="text-2xl font-bold text-purple-800 mb-4">🧠 觀念大考驗</h2>
                    <p class="text-gray-700 mb-6 font-bold">請選出最正確的答案。注意喔，選項順序會改變！</p>
                    
                    <div id="quiz-container" class="space-y-8"></div>

                    <div id="quiz-result" class="hidden mt-8 text-center bg-white p-6 rounded-xl border-4 border-green-400">
                        <h3 class="text-3xl font-black text-green-600 mb-2">測驗完成！</h3>
                        <p class="text-2xl font-bold text-gray-700">你的分數是：<span id="score-display" class="text-red-500 text-4xl"></span> / 100</p>
                        <button onclick="initQuiz()" class="mt-6 bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-8 rounded-full shadow-[0_4px_0_#7e22ce] active:shadow-none active:translate-y-1 transition-all">
                            再挑戰一次
                        </button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script>
        let gameFirstStarted = false;

        function switchTab(tabId) {
            ['learn', 'game', 'quiz'].forEach(id => {
                document.getElementById('sec-' + id).classList.add('hidden');
                let btn = document.getElementById('tab-' + id);
                btn.classList.remove('tab-active');
                btn.classList.add('tab-inactive');
            });
            document.getElementById('sec-' + tabId).classList.remove('hidden');
            let activeBtn = document.getElementById('tab-' + tabId);
            activeBtn.classList.remove('tab-inactive');
            activeBtn.classList.add('tab-active');

            if(tabId === 'game') {
                if(!gameFirstStarted) {
                    gameFirstStarted = true;
                    startGame();
                } else if(!isKicking) {
                    setupGame(false); // 切換回來時保留當前關卡位置
                }
            }
            if(tabId === 'quiz' && !quizInitialized) initQuiz();
        }

        const arena = document.getElementById('game-arena');
        const target = document.getElementById('target');
        const targetEmoji = document.getElementById('target-emoji');
        const ballContainer = document.getElementById('ball-container');
        const playerArrow = document.getElementById('player-arrow');
        const actionPoint = document.getElementById('action-point');
        const gameMessage = document.getElementById('game-message');

        let targetPos = { x: 0, y: 0 };
        let ballStartPos = { x: 0, y: 0 };
        let arenaRect;
        let isDragging = false;
        let isKicking = false;
        let dragStartPos = { x: 0, y: 0 };
        let dynamicMaxForce = 220; 
        const MONSTERS = ['👾', '👽', '🤖', '👻', '👹', '👺', '🦖', '🐉', '🐲', '🧟', '🧛', '💀', '😈', '🎃'];
        
        // 【修正核心】：將物理判定半徑設定與實際視覺圖形相符
        // 足球寬高為 60px，所以半徑為 30
        const BALL_RADIUS = 30; 
        
        // 【修正核心】：放寬碰撞距離判定
        // 球半徑(30) + 怪物圈圈半徑(35) = 65。當距離為 65 時，兩者邊緣剛好碰到。
        // 將 HIT_RADIUS 設為 60，代表只要球體有「明顯壓到」怪物圈圈，就算作得分，改善邊緣沒判定的情況。
        const HIT_RADIUS = 60; 

        // 記錄當前關卡資訊
        let currentLevelData = { bx: 15, by: 50, tx: 85, ty: 50, monster: '👾' };

        // 遊戲狀態變數
        let gameScore = 0;
        let timeLeft = 100;
        let timerInterval = null;
        let isGameActive = false;

        function startGame() {
            if (timerInterval) clearInterval(timerInterval);
            
            gameScore = 0;
            timeLeft = 100;
            isGameActive = true;
            isKicking = false;
            
            document.getElementById('game-score').innerText = gameScore;
            document.getElementById('game-timer').innerText = timeLeft;
            
            setupGame(true); // 強制產生新關卡
            
            gameMessage.innerText = "遊戲開始！請在足球上拖拉來射門！";
            gameMessage.className = "text-xl font-bold text-blue-700";

            timerInterval = setInterval(() => {
                if(!isGameActive) return;
                timeLeft--;
                document.getElementById('game-timer').innerText = timeLeft;
                
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isGameActive = false;
                    gameMessage.innerText = `⏳ 時間到！挑戰結束，你的總得分是：${gameScore} 分！`;
                    gameMessage.className = "text-2xl font-black text-red-600 animate-bounce";
                    
                    // 隱藏拖拉提示
                    playerArrow.classList.add('hidden');
                    actionPoint.classList.add('hidden');
                }
            }, 1000);
        }

        // 參數 forceNewLevel 決定是否要刷新怪物跟球的初始位置
        function setupGame(forceNewLevel = true) {
            if(isKicking) return;
            arenaRect = arena.getBoundingClientRect();
            
            dynamicMaxForce = Math.min(220, arenaRect.width * 0.4);

            if (forceNewLevel) {
                let ballOnLeft = Math.random() < 0.5;
                let bx = ballOnLeft ? 15 + Math.random() * 15 : 70 + Math.random() * 15;
                let tx = ballOnLeft ? 65 + Math.random() * 20 : 15 + Math.random() * 20;
                let by = 20 + Math.random() * 60;
                let ty = 20 + Math.random() * 60;
                
                currentLevelData = { bx, by, tx, ty, monster: MONSTERS[Math.floor(Math.random() * MONSTERS.length)] };
            }

            // 套用關卡位置
            let { bx, by, tx, ty, monster } = currentLevelData;

            ballContainer.style.transition = 'none'; // 讓球瞬間歸位
            ballContainer.style.left = `${bx}%`;
            ballContainer.style.top = `${by}%`;
            ballContainer.style.transform = 'translate(-50%, -50%) rotate(0deg)';
            
            ballStartPos = {
                x: arenaRect.width * (bx / 100),
                y: arenaRect.height * (by / 100)
            };
            
            targetEmoji.innerText = monster;
            target.style.left = `${tx}%`;
            target.style.top = `${ty}%`;
            target.style.transform = "translate(-50%, -50%) scale(1)";
            
            targetPos = {
                x: arenaRect.width * (tx / 100),
                y: arenaRect.height * (ty / 100)
            };

            playerArrow.classList.add('hidden');
            actionPoint.classList.add('hidden');
            
            if(isGameActive && !forceNewLevel) {
                gameMessage.innerText = "請再試一次！調整好你的箭頭長短！";
                gameMessage.className = "text-xl font-bold text-blue-700";
            } else if (isGameActive && forceNewLevel && gameScore > 0) {
                gameMessage.innerText = "下一題！請在足球上拖拉，控制力道來射門！";
                gameMessage.className = "text-xl font-bold text-blue-700";
            }
        }

        ballContainer.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', endDrag);
        ballContainer.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', onDrag, {passive: false});
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            if(isKicking || !isGameActive) return;
            e.preventDefault(); 
            isDragging = true;
            
            let clientX = e.clientX || e.touches[0].clientX;
            let clientY = e.clientY || e.touches[0].clientY;
            dragStartPos = { x: clientX, y: clientY };
            
            playerArrow.style.width = '0px';
            playerArrow.classList.remove('hidden');
            actionPoint.classList.remove('hidden');
        }

        function onDrag(e) {
            if(!isDragging || isKicking || !isGameActive) return;
            e.preventDefault();
            
            let clientX = e.clientX || e.touches[0].clientX;
            let clientY = e.clientY || e.touches[0].clientY;

            let dx = clientX - dragStartPos.x;
            let dy = clientY - dragStartPos.y;
            
            let length = Math.sqrt(dx*dx + dy*dy);
            let force = Math.min(length, dynamicMaxForce);

            let angle = Math.atan2(dy, dx);
            let angleDeg = angle * (180 / Math.PI);

            let centerX = 30; // 足球寬度 60 的中心點
            let centerY = 30;
            let dotX = centerX - Math.cos(angle) * BALL_RADIUS;
            let dotY = centerY - Math.sin(angle) * BALL_RADIUS;

            actionPoint.style.left = `${dotX}px`;
            actionPoint.style.top = `${dotY}px`;
            actionPoint.style.transform = `translate(-50%, -50%)`;

            let visualArrowLength = Math.max(force + BALL_RADIUS, BALL_RADIUS * 2 + 5); 
            
            playerArrow.style.left = `${dotX}px`;
            playerArrow.style.top = `${dotY}px`;
            playerArrow.style.width = `${visualArrowLength}px`;
            playerArrow.style.transform = `translateY(-50%) rotate(${angleDeg}deg)`;
        }

        function endDrag(e) {
            if(!isDragging || isKicking || !isGameActive) return;
            isDragging = false;

            playerArrow.classList.add('hidden');
            actionPoint.classList.add('hidden');

            let visualLength = parseFloat(playerArrow.style.width) || 0;
            let force = visualLength - BALL_RADIUS; 
            
            let transformString = playerArrow.style.transform;
            let angleMatch = transformString.match(/rotate\(([-\d.]+)deg\)/);
            let angleDeg = angleMatch ? parseFloat(angleMatch[1]) : 0;
            
            if(force < 10) {
                gameMessage.innerText = "力氣太小了，再試一次！";
                gameMessage.className = "text-xl font-bold text-blue-700";
                return;
            }

            kickBall(force, angleDeg);
        }

        function kickBall(force, angleDeg) {
            isKicking = true;
            arenaRect = arena.getBoundingClientRect();

            const rad = angleDeg * (Math.PI / 180);
            
            const maxTravelDistance = arenaRect.width * 0.75; 
            const distanceMultiplier = maxTravelDistance / dynamicMaxForce;
            
            const travelDistance = force * distanceMultiplier;

            const dx = Math.cos(rad) * travelDistance;
            const dy = Math.sin(rad) * travelDistance;

            let finalX = ballStartPos.x + dx;
            let finalY = ballStartPos.y + dy;

            let distToTarget = Math.sqrt(Math.pow(finalX - targetPos.x, 2) + Math.pow(finalY - targetPos.y, 2));

            let event = "miss";

            if (distToTarget < HIT_RADIUS) {
                event = "target"; 
            } else if (
                finalX < BALL_RADIUS || finalX > arenaRect.width - BALL_RADIUS ||
                finalY < BALL_RADIUS || finalY > arenaRect.height - BALL_RADIUS
            ) {
                event = "wall";
            } else {
                event = "miss";
            }

            let duration = Math.max(500, Math.min(1000, travelDistance * 1.5));
            const rotateDeg = travelDistance * 1.5;

            ballContainer.style.transition = `all ${duration}ms cubic-bezier(0.25, 1, 0.5, 1)`;
            ballContainer.style.left = `${(finalX / arenaRect.width) * 100}%`;
            ballContainer.style.top = `${(finalY / arenaRect.height) * 100}%`;
            ballContainer.style.transform = `translate(-50%, -50%) rotate(${rotateDeg}deg)`;

            setTimeout(() => {
                if(!isGameActive) {
                    // 若動畫期間時間到，確保狀態重置
                    isKicking = false;
                    return;
                }

                if (event === "wall") {
                    gameMessage.innerText = "💥 哎呀！力氣太大飛出界了！退回原點再試一次！";
                    gameMessage.className = "text-xl font-bold text-red-600 animate-bounce";
                    resetGameAfterDelay(1500, false); // false 代表維持同一個關卡
                } else if (event === "target") {
                    gameScore += 10;
                    document.getElementById('game-score').innerText = gameScore;
                    
                    gameMessage.innerText = "🎉 太精準了！得分 +10！";
                    gameMessage.className = "text-2xl font-black text-green-600 animate-bounce";
                    targetEmoji.innerText = "💥";
                    target.style.transform = "translate(-50%, -50%) scale(1.5) rotate(36deg)";
                    resetGameAfterDelay(2000, true); // true 代表產生新關卡
                } else {
                    gameMessage.innerText = "💨 可惜，力量沒抓好（飛過頭或掉在前面）...退回原點再試一次！";
                    gameMessage.className = "text-xl font-bold text-blue-700";
                    resetGameAfterDelay(1500, false); // false 代表維持同一個關卡
                }
            }, duration + 50);
        }

        // 參數 isHit 決定是否要更新為新關卡
        function resetGameAfterDelay(delay = 1500, isHit = true) {
            setTimeout(() => {
                isKicking = false;
                if(isGameActive) setupGame(isHit);
            }, delay);
        }

        window.addEventListener('resize', () => {
            if(!document.getElementById('sec-game').classList.contains('hidden')) {
                if(!isKicking && isGameActive) setupGame(false);
            }
        });

        // --- 測驗邏輯 ---
        const questionsData = [
            {
                q: "1. 畫力的時候，箭頭的「長度」代表什麼？",
                options: [
                    { text: "力量的大小", isCorrect: true },  
                    { text: "力量的方向", isCorrect: false }, 
                    { text: "作用的位置", isCorrect: false }, 
                    { text: "物體的重量", isCorrect: false }  
                ]
            },
            {
                q: "2. 畫力的時候，箭頭的「點」代表什麼？",
                options: [
                    { text: "力量作用點", isCorrect: true },  
                    { text: "力量終止點", isCorrect: false }, 
                    { text: "力量時間點", isCorrect: false }, 
                    { text: "力量消失點", isCorrect: false }  
                ]
            },
            {
                q: "3. 畫力的時候，箭頭的「尖端指著哪裡」代表什麼？",
                options: [
                    { text: "施力的方向", isCorrect: true },  
                    { text: "施力的大小", isCorrect: false }, 
                    { text: "施力的時間", isCorrect: false }, 
                    { text: "施力的位置", isCorrect: false }  
                ]
            },
            {
                q: "4. 如果你想表示「非常大」的力氣，箭頭應該怎麼畫？",
                options: [
                    { text: "畫得長一點", isCorrect: true },  
                    { text: "畫得短一點", isCorrect: false }, 
                    { text: "畫得粗一點", isCorrect: false }, 
                    { text: "畫得細一點", isCorrect: false }  
                ]
            },
            {
                q: "5. 有兩支「長度一樣」，但「指著相反方向」的箭頭，代表什麼意思？",
                options: [
                    { text: "力氣一樣大，但方向不同", isCorrect: true },  
                    { text: "力氣不一樣，但方向相同", isCorrect: false }, 
                    { text: "力氣一樣大，且方向相同", isCorrect: false }, 
                    { text: "力氣不一樣，且方向不同", isCorrect: false }  
                ]
            }
        ];

        let quizInitialized = false;
        let userAnswers = new Array(5).fill(null);

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            quizInitialized = true;
            userAnswers = new Array(5).fill(null);
            document.getElementById('quiz-result').classList.add('hidden');
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            questionsData.forEach((qData, qIndex) => {
                let shuffledOptions = shuffleArray([...qData.options]);
                let questionHTML = `
                    <div class="bg-white p-5 rounded-xl border-2 border-purple-100 shadow-sm" id="q-block-${qIndex}">
                        <h3 class="text-xl font-bold text-gray-800 mb-4">${qData.q}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                `;

                shuffledOptions.forEach((opt, optIndex) => {
                    questionHTML += `
                        <button onclick="selectOption(${qIndex}, ${optIndex}, ${opt.isCorrect})" id="btn-q${qIndex}-o${optIndex}" 
                                class="quiz-option text-left px-4 py-3 rounded-lg border-2 border-gray-200 font-bold text-gray-700 hover:bg-purple-50 hover:border-purple-300 transition-colors">
                            ${opt.text}
                        </button>
                    `;
                });

                questionHTML += `
                        </div>
                        <div id="feedback-${qIndex}" class="mt-3 text-lg font-bold hidden"></div>
                    </div>
                `;
                container.innerHTML += questionHTML;
            });
            
            container.innerHTML += `
                <div class="text-center mt-6">
                    <button onclick="submitQuiz()" class="bg-purple-600 hover:bg-purple-700 text-white text-xl font-bold py-3 px-10 rounded-full shadow-[0_4px_0_#581c87] active:shadow-none active:translate-y-1 transition-all">
                        交卷看成績！ 💯
                    </button>
                </div>
            `;
        }

        function selectOption(qIndex, optIndex, isCorrect) {
            userAnswers[qIndex] = isCorrect;
            for(let i=0; i<4; i++) {
                let btn = document.getElementById(`btn-q${qIndex}-o${i}`);
                if(btn) {
                    btn.classList.remove('bg-purple-100', 'border-purple-500', 'text-purple-800');
                    btn.classList.add('border-gray-200', 'text-gray-700');
                }
            }
            let selectedBtn = document.getElementById(`btn-q${qIndex}-o${optIndex}`);
            selectedBtn.classList.remove('border-gray-200', 'text-gray-700');
            selectedBtn.classList.add('bg-purple-100', 'border-purple-500', 'text-purple-800');
        }

        function submitQuiz() {
            if(userAnswers.includes(null)) {
                alert("還有題目沒回答完喔！");
                return;
            }

            let correctCount = 0;
            userAnswers.forEach((isCorrect, index) => {
                let feedback = document.getElementById(`feedback-${index}`);
                let block = document.getElementById(`q-block-${index}`);
                feedback.classList.remove('hidden');
                
                for(let i=0; i<4; i++) {
                    let btn = document.getElementById(`btn-q${index}-o${i}`);
                    if(btn) btn.disabled = true;
                }

                if(isCorrect) {
                    correctCount++;
                    feedback.innerText = "✅ 答對了！你真棒！";
                    feedback.className = "mt-3 text-lg font-bold text-green-600";
                    block.classList.add('border-green-300', 'bg-green-50');
                } else {
                    feedback.innerText = "❌ 答錯囉，請再複習一下「學習區」！";
                    feedback.className = "mt-3 text-lg font-bold text-red-600";
                    block.classList.add('border-red-300', 'bg-red-50');
                }
            });

            let score = correctCount * 20;
            document.getElementById('score-display').innerText = score;
            document.getElementById('quiz-result').classList.remove('hidden');
            document.getElementById('quiz-result').scrollIntoView({ behavior: 'smooth' });
        }

        // 預設開啟學習區
        switchTab('learn');

    </script>
</body>
</html>
