<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>烏衣行文字比對WeSingDiff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafbfc;--surface:#fff;--surface2:#f3f4f6;--border:#e5e7eb;
  --text:#111827;--text-dim:#6b7280;--text-muted:#9ca3af;
  --red:#dc2626;--red-bg:rgba(220,38,38,.06);--red-text:#991b1b;
  --green:#2563eb;--green-bg:rgba(37,99,235,.06);--green-text:#1e40af;
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.06);
  --yellow:#d97706;--yellow-bg:rgba(217,119,6,.05);
  --font-ui:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono','Menlo','Consolas',monospace;
  --diff-font-size:13px;--diff-line-height:24px;
  --radius:8px;--radius-sm:6px;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#181a20;--surface2:#1e2028;--border:#2a2d37;
  --text:#e4e5e7;--text-dim:#9ca3af;--text-muted:#6b7280;
  --red:#f87171;--red-bg:rgba(248,113,113,.08);--red-text:#fca5a5;
  --green:#60a5fa;--green-bg:rgba(96,165,250,.08);--green-text:#93c5fd;
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.08);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.06);
}
html,body{height:100%;height:100dvh;overflow:hidden;font-family:var(--font-ui);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:14px;height:14px}
::-webkit-scrollbar-track{background:var(--surface2);margin:2px}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:7px;border:3px solid var(--surface2);min-height:40px;cursor:default}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
header{display:flex;align-items:center;justify-content:center;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);gap:8px;position:relative;width:100%}

.toolbar{display:flex;align-items:center;gap:6px}
.toolbar-right{position:absolute;right:16px;display:flex;align-items:center;gap:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-dim);font-size:13px;font-family:var(--font-ui);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
.btn:hover{background:var(--surface2);color:var(--text);border-color:var(--text-muted)}
.btn.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
.btn-primary:hover{opacity:.9;background:var(--blue);color:#fff}
.btn-exit{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow);font-weight:500}
.btn-exit:hover{background:var(--yellow);color:#fff}
.btn-icon{width:34px;height:34px;padding:0;border-radius:var(--radius-sm)}
.btn svg{width:16px;height:16px;flex-shrink:0}
.dropdown-group{position:relative}
.dropdown-toggle svg{margin-left:2px;transition:transform .15s}
.dropdown-group.open .dropdown-toggle svg{transform:rotate(180deg)}
.dropdown-menu{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:50;min-width:170px;padding:6px 0;max-height:70vh;overflow-y:auto}
.dropdown-group.open .dropdown-menu{display:block}
.dropdown-item{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;color:var(--text);cursor:pointer;transition:background .1s;white-space:nowrap}
.dropdown-item:hover{background:var(--surface2)}
.dropdown-item input[type=checkbox]{accent-color:var(--blue);width:14px;height:14px;flex-shrink:0}
.dropdown-sep{height:1px;background:var(--border);margin:4px 0}
.search-bar{display:flex;align-items:center;gap:6px;padding:6px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.search-bar input[type=text]{padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font-ui);background:var(--surface);color:var(--text);outline:none}
.search-bar input[type=text]:focus{border-color:var(--blue)}
.btn-sm{padding:3px 8px;font-size:11px;min-width:28px}
.search-count{font-size:11px;color:var(--text-muted);white-space:nowrap}
.search-opt{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text-dim);cursor:pointer;white-space:nowrap}
.search-opt input{accent-color:var(--blue);width:13px;height:13px}
.search-match-current{background:var(--yellow)!important;border-radius:2px;outline:2px solid var(--yellow);outline-offset:-1px}
.search-match{background:rgba(217,119,6,.25);border-radius:2px}
.workspace{flex:1;display:flex;overflow:hidden;min-height:0}
.col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.col+.col{border-left:1px solid var(--border)}
.col-head{display:flex;align-items:center;padding:8px 14px;font-size:12px;color:var(--text-dim);gap:8px;border-bottom:1px solid var(--border);background:var(--surface)}
.col-label{font-weight:500;color:var(--text);font-size:12px}
.col-meta{margin-left:auto;font-size:11px;color:var(--text-muted)}
textarea.input-area{flex:1;width:100%;border:none;outline:none;resize:none;padding:12px 14px;font-family:var(--font-mono);font-size:var(--diff-font-size);line-height:var(--diff-line-height);background:var(--surface);color:var(--text);tab-size:2}
textarea.input-area::placeholder{color:var(--text-muted)}

.diff-scroll{flex:1;overflow:auto;display:none;min-height:0}
.diff-scroll.visible{display:block}
.line{display:flex;min-height:var(--diff-line-height);line-height:var(--diff-line-height);font-size:var(--diff-font-size);font-family:var(--font-mono);position:relative}
.line-num{width:48px;min-width:48px;text-align:right;padding-right:10px;color:var(--text-muted);user-select:none;font-size:11px;display:flex;justify-content:flex-end;align-items:center}
.line-num[data-side]{cursor:pointer}
.line-num[data-side]:hover{color:var(--text)}
.line-content{flex:1;padding:0 14px;white-space:pre;font-variant-ligatures:none;min-width:0;cursor:text}
.line-content.wrap{white-space:pre-wrap;word-break:break-all}
.line.added{background:var(--green-bg)}
.line.removed{background:var(--red-bg)}
.line.modified{background:var(--yellow-bg)}
.line.equal .line-content{color:var(--text-dim)}
.char-del{background:var(--red-bg);color:var(--red-text);border-radius:2px;padding:0 1px}
.char-ins{background:rgba(37,99,235,.12);color:var(--green-text);border-radius:2px;padding:0 1px}
.bold-diff .char-del,.bold-diff .char-ins{font-weight:700}
[data-theme="dark"] .char-del{color:var(--red)}
[data-theme="dark"] .char-ins{background:rgba(96,165,250,.15);color:var(--green)}
.line-content[contenteditable="true"]{outline:none;cursor:text}
.line-content[contenteditable="true"]:focus{box-shadow:inset 0 0 0 2px var(--blue-bg);border-radius:2px}
.line-content.editing{background:rgba(37,99,235,.04)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);padding:8px 18px;background:var(--text);color:var(--bg);border-radius:var(--radius);font-size:13px;opacity:0;transition:all .25s;z-index:100;pointer-events:none;white-space:nowrap}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
.file-drop{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.file-drop.visible{opacity:.95;pointer-events:all}
.file-drop-inner{border:2px dashed var(--blue);border-radius:16px;padding:60px;text-align:center;color:var(--blue);font-size:15px;font-weight:500}
.input-wrap{flex:1;position:relative;overflow:hidden}
.input-wrap .input-area{position:absolute;inset:0}
.input-wrap .ln-gutter{position:absolute;left:0;top:0;bottom:0;width:48px;background:var(--surface2);border-right:1px solid var(--border);overflow:hidden;pointer-events:none;z-index:1;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);display:none;padding:12px 0}
.input-wrap .ln-gutter.visible{display:block}
.input-wrap .ln-gutter .ln-line{height:var(--diff-line-height);display:flex;align-items:center;justify-content:flex-end;padding-right:10px}
.input-wrap .input-area.with-gutter{padding-left:58px}
.placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px;text-align:center;padding:40px;font-family:var(--font-ui)}
.hidden-input{display:none}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-overlay.visible{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;padding-bottom:calc(20px + env(safe-area-inset-bottom));min-width:260px;max-width:340px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.modal-msg{font-size:13px;color:var(--text);margin-bottom:16px;line-height:1.5}
.modal-btns{display:flex;justify-content:flex-end;gap:8px}
.modal-btns .btn{min-width:64px}
@media(max-width:768px){
  .workspace{flex-direction:column}
  .col+.col{border-left:none;border-top:1px solid var(--border)}
  .col{min-height:0}
  header{padding:8px 12px}
  .btn{padding:6px 10px;font-size:12px}
  .btn-icon{width:36px;height:36px}
  .col-head{padding:6px 10px}
  textarea.input-area{padding:8px 10px}
  .dropdown-toggle{padding:6px 8px;font-size:11px}
  .dropdown-menu{min-width:150px}
  .dropdown-item{padding:5px 12px;font-size:11px}
  .line-num{width:36px;min-width:36px;padding-right:6px;font-size:10px}
  .input-wrap .ln-gutter{width:36px}
  .input-wrap .input-area.with-gutter{padding-left:44px}
  .placeholder{font-size:12px;padding:20px}
  .toast{bottom:calc(24px + env(safe-area-inset-bottom))}
}
@media(max-height:500px){
  header{padding:6px 10px}
  .col-head{padding:4px 10px}
  .btn{padding:4px 8px;font-size:11px}
  .btn-icon{width:30px;height:30px}
}
</style>
<script src="https://gnisew.github.io/tools/ime/ime-button.js"></script>
</head>
<body>
<div class="app">
  <header>
      <button class="btn btn-icon" id="btnWrap" onclick="toggleWrap()" title="換行" style="position:absolute;left:16px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M3 12h15a3 3 0 110 6h-4"/><polyline points="13 16 11 18 13 20"/><path d="M3 18h4"/></svg>
      </button>
      <button class="btn btn-icon" id="btnSelectMode" onclick="toggleSelectMode()" title="選取模式" style="display:none;position:absolute;left:56px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
      </button>
      <button class="btn btn-primary" id="btnDiff" onclick="toggleDiff()">
        <svg id="iconPlay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="iconStop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        <span id="btnDiffLabel">烏衣行比對</span>
      </button>
      <div class="toolbar-right">
        <button class="btn btn-icon" id="btnSearchToggle" onclick="openSearch()" title="尋找取代 (Ctrl+F)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="btn btn-icon" onclick="clearAll()" title="清除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6l-12 12"/><path d="M6 6l12 12"/></svg>
        </button>
        <div class="dropdown-group" id="ddSettings">
          <button class="btn dropdown-toggle" onclick="toggleDropdown('ddSettings')">
            設定<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dropdown-menu">
            <label class="dropdown-item"><input type="checkbox" id="optAutoSave">暫存</label>
            <label class="dropdown-item"><input type="checkbox" id="optLineNum" checked>行號</label>
            <label class="dropdown-item" id="optInlineViewWrap" style="display:none"><input type="checkbox" id="optInlineView" onchange="setView(this.checked?'inline':'side')">行內檢視</label>
            <label class="dropdown-item"><input type="checkbox" id="optInlineExpand">行內展開</label>
			<label class="dropdown-item"><input type="checkbox" id="optBoldDiff">差異加粗</label>
            <label class="dropdown-item"><input type="checkbox" id="optDiffTop">差異置頂</label>
			<div class="dropdown-item" style="cursor:default">忽略字元<input type="text" id="optIgnoreChars" placeholder="如 _/ 空格" style="width:80px;padding:2px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;font-family:var(--font-ui);color:var(--text);background:var(--surface);margin-left:4px"></div>
            <div class="dropdown-sep"></div>
            <label class="dropdown-item"><input type="checkbox" id="optShowA" checked>顯示 🅰️ 欄</label>
            <label class="dropdown-item"><input type="checkbox" id="optShowB" checked>顯示 🅱️ 欄</label>
            <div class="dropdown-sep"></div>
            <div class="dropdown-item" onclick="swapTexts()">交換 🅰️/🅱️</div>
            <div class="dropdown-item" onclick="toggleTheme()">切換主題</div>
            <div class="dropdown-sep"></div>
            <div class="dropdown-item" onclick="exportAs('txt')">匯出 .txt</div>
            <div class="dropdown-item" onclick="exportAs('html')">匯出 .html</div>
            <div class="dropdown-item" onclick="exportAs('rtf')">匯出 .rtf</div>
            <div class="dropdown-sep"></div>
            <label class="dropdown-item"><input type="checkbox" id="optCharDiff" checked>字元級差異</label>
            <label class="dropdown-item"><input type="checkbox" id="optTrim" checked>忽略行尾空白</label>
            <label class="dropdown-item"><input type="checkbox" id="optIgnoreEmpty">忽略空行</label>
            <div class="dropdown-sep"></div>

            <div class="dropdown-item" style="cursor:default">字型<select id="optFontFamily" style="margin-left:4px"><option value="default">預設</option><optgroup label="注音符號"><option value="BpmfZihiSerif-Regular">注音宋</option><option value="BpmfZihiKaiStd-Regular">注音楷書</option><option value="BpmfZihiSans-Regular">注音黑體</option><option value="BpmfZihiBox-R">注音方體</option><option value="BpmfZihiOnly-R">注音符號</option></optgroup><optgroup label="台語字型"><option value="TaigiGenRyuM-TL-R">台語明體</option><option value="TaigiGenRyuM-TLHI-R">台語明體TLHI</option><option value="TaigiGenRyuM-HI-R">台語明體HI</option><option value="TaigiKaiStd-TL-R">台語楷書</option><option value="TaigiKaiStd-TLHI-R">台語楷書TLHI</option><option value="TaigiKaiStd-HI-R">台語楷書HI</option><option value="TaigiGenSekiG-TL-R">台語黑體</option><option value="TaigiGenSekiG-TLHI-R">台語黑體TLHI</option><option value="TaigiGenSekiG-HI-R">台語黑體HI</option><option value="TaigiGenSenR-TL-R">台語圓體</option><option value="TaigiGenSenR-TLHI-R">台語圓體TLHI</option><option value="TaigiGenSenR-HI-R">台語圓體HI</option></optgroup><optgroup label="其他"><option value="EngTRESSA">英文花體A</option><option value="EngTRESSB">英文花體B</option><option value="Tauhu-Oo">豆腐字</option><option value="ToneOZ-Pinyin-Kai-Traditional">拼音楷書</option></optgroup></select></div>
            <div class="dropdown-item" style="cursor:default">大小<select id="optFontSize" style="margin-left:4px"><option value="12">12</option><option value="13" selected>13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="18">18</option><option value="20">20</option><option value="24">24</option></select></div>
          </div>
        </div>
      </div>
    </header>
  <div class="search-bar" id="searchBar" style="display:none">
    <label class="search-opt"><input type="checkbox" id="searchScopeA" checked>🅰️</label>
    <label class="search-opt"><input type="checkbox" id="searchScopeB" checked>🅱️</label>
    <input type="text" id="searchInput" placeholder="尋找..." style="flex:0 0 160px">
    <button class="btn btn-sm" onclick="doSearch()" title="尋找 (Enter)">尋找</button>
    <input type="text" id="replaceInput" placeholder="取代..." style="flex:0 0 120px">
    <button class="btn btn-sm" id="btnSearchPrev" onclick="searchPrev()" title="上一個 (Shift+Enter)">◂</button>
    <button class="btn btn-sm" id="btnSearchNext" onclick="searchNext()" title="下一個 (Enter)">▸</button>
    <span class="search-count" id="searchCount"></span>
    <button class="btn btn-sm" onclick="searchReplace()" title="取代">取代</button>
    <button class="btn btn-sm" onclick="searchReplaceAll()" title="全部取代">全部取代</button>
    <label class="search-opt"><input type="checkbox" id="searchRegex" onchange="onSearchChange()">正則</label>
    <label class="search-opt"><input type="checkbox" id="searchCjk" onchange="onSearchChange()">漢字</label>
    <label class="search-opt"><input type="checkbox" id="searchTop">置頂</label>
  </div>
  <div class="workspace">
    <div class="col" id="colLeft">
      <div class="col-head">
        <span class="col-label">🅰️</span>
        <button class="btn" style="padding:3px 8px;font-size:11px" onclick="loadFile('left')">載入</button>
        <button class="btn" style="padding:3px 8px;font-size:11px" onclick="copyText('left')">複製</button>
        <button class="btn" style="padding:3px 8px;font-size:11px" onclick="clearSide('left')">清除</button>
        <span class="col-meta" id="metaLeft"></span>
      </div>
      <div class="input-wrap" id="wrapLeft">

      </div>

    <div class="col" id="colRight">
      <div class="col-head">
        <span class="col-label">🅱️</span>
        <button class="btn" style="padding:3px 8px;font-size:11px" onclick="loadFile('right')">載入</button>
        <button class="btn" style="padding:3px 8px;font-size:11px" onclick="copyText('right')">複製</button>

<input type="file" class="hidden-input" id="fileInput" accept=".txt,.md,.js,.ts,.py,.java,.c,.cpp,.h,.css,.html,.json,.xml,.yaml,.yml,.csv,.sql,.rb,.go,.rs,.vue,.jsx,.tsx">
<input type="checkbox" id="optWrap" class="hidden-input" checked>

<div class="file-drop" id="fileDrop"><div class="file-drop-inner">拖放檔案到此處</div></div>

    <div class="modal-btns">
      <button class="btn" onclick="closeModal(false)">取消</button>
      <button class="btn btn-primary" onclick="closeModal(true)" id="modalOk" style="background:var(--red);border-color:var(--red)">確定清除</button>
    </div>
  </div>
</div>
<script>
let view='side',diffResult=null,leftText='',rightText='';
let leftLines=[],rightLines=[];
let leftLinesOrig=[],rightLinesOrig=[];
let toastTimer=null;
let _metaTimer=null;
let _rediffTimer=null;
let _rendering=false;
function updateMetaDebounced(){
  if(_metaTimer)clearTimeout(_metaTimer);
  _metaTimer=setTimeout(()=>{updateMeta('left');updateMeta('right');_metaTimer=null;},300);
}
let inputMode=true;

function $(id){return document.getElementById(id)}

function getOpt(k){const el=$('opt'+k[0].toUpperCase()+k.slice(1));return el?el.checked:false;}
function showToast(msg,ms){
  if(toastTimer)clearTimeout(toastTimer);

    if(!lines.length){showToast('無內容可複製');return;}
    const stash=[];
    Array.from(scrollEl.childNodes).forEach(n=>{
      if(n.nodeType===3){stash.push({parent:scrollEl,node:n,next:n.nextSibling});scrollEl.removeChild(n);}
    });

      l.querySelectorAll('.line-num').forEach(el=>{el.style.display='none';stash.push({node:el});});
      Array.from(l.childNodes).forEach(n=>{
        if(n.nodeType===3&&n.textContent.trim()===''){stash.push({parent:l,node:n,next:n.nextSibling});l.removeChild(n);}
      });
    });
    const range=document.createRange();
    range.selectNodeContents(scrollEl);
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    stash.forEach(e=>{if(e.parent){if(e.next&&e.next.parentNode===e.parent)e.parent.insertBefore(e.node,e.next);else e.parent.appendChild(e.node);}else{e.node.style.display='';}});

function applyOpts(lines){
  if(getOpt('trim'))lines=lines.map(l=>l.replace(/\s+$/,''));
  if(getOpt('ignoreEmpty'))lines=lines.map(l=>l.trim()===''?'':l);
  const ignoreChars=$('optIgnoreChars').value;
  if(ignoreChars){
    const escaped=ignoreChars.split('').map(c=>c.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&')).join('');
    const re=new RegExp('['+escaped+']','g');
    lines=lines.map(l=>l.replace(re,''));
  }
  return lines;
}

function runDiff(){
  if(!inputMode)showInput();
  leftText=$('inputLeft').value;rightText=$('inputRight').value;
  if(!leftText&&!rightText){showToast('請先輸入文字');return;}
  updateMeta('left');updateMeta('right');
  leftLinesOrig=leftText.split('\n');
  rightLinesOrig=rightText.split('\n');
  leftLines=applyOpts(leftLinesOrig.slice());
  rightLines=applyOpts(rightLinesOrig.slice());
  diffResult=computeLineDiff(leftLines,rightLines,leftLinesOrig,rightLinesOrig);
  showDiff();renderDiff();
  showToast('比對完成');
}

function computeLineDiff(a,b,aOrig,bOrig){
  const m=a.length,n=b.length;
  if(m===0&&n===0)return{ops:[],stats:{added:0,removed:0,modified:0,total:0}};
  if(m===0){const ops=[];for(let i=0;i<n;i++)ops.push({type:'added',leftNum:null,rightNum:i+1,leftText:'',rightText:bOrig[i]});return{ops,stats:{added:n,removed:0,modified:0,total:n}};}
  if(n===0){const ops=[];for(let i=0;i<m;i++)ops.push({type:'removed',leftNum:i+1,rightNum:null,leftText:aOrig[i],rightText:''});return{ops,stats:{added:0,removed:m,modified:0,total:m}};}
  if(m*n>5e5)return computeLineDiffLCS(a,b,aOrig,bOrig);
  const max=m+n,off=max,maxD=Math.min(max,500);
  const V=new Array(2*max+1);
  const trace=[];
  for(let d=0;d<=maxD;d++){
    trace.push(V.slice());
    for(let k=-d;k<=d;k+=2){
      let x;
      if(k===-d||(k!==d&&V[k-1+off]<V[k+1+off]))x=V[k+1+off]||0;
      else x=(V[k-1+off]||0)+1;
      let y=x-k;
      while(x<m&&y<n&&a[x]===b[y]){x++;y++;}
      V[k+off]=x;
      if(x>=m&&y>=n)return myersBacktrace(trace,V,a,b,off,m,n,aOrig,bOrig);
    }
  }
  return computeLineDiffLCS(a,b,aOrig,bOrig);
}
function myersBacktrace(trace,Vfinal,a,b,off,m,n,aOrig,bOrig){
  const rawOps=[];let x=m,y=n;
  let Vcur=Vfinal;
  for(let d=trace.length-1;d>=0;d--){
    const Vprev=trace[d];
    const k=x-y;
    let pk;
    if(k===-d)pk=k+1;else if(k===d)pk=k-1;
    else pk=(Vprev[k-1+off]||0)>=(Vprev[k+1+off]||0)?k-1:k+1;
    const px=Vprev[pk+off]||0,py=px-pk;
    while(x>px&&y>py){x--;y--;rawOps.push({type:'equal',left:x,right:y});}
    if(d>0){
      if(x===px){y--;rawOps.push({type:'add',right:y});}
      else{x--;rawOps.push({type:'remove',left:x});}
    }
  }
  rawOps.reverse();
  return groupOps(rawOps,a,b,aOrig,bOrig);
}
function computeLineDiffLCS(a,b,aOrig,bOrig){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>new Uint32Array(n+1));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    if(a[i-1]===b[j-1])dp[i][j]=dp[i-1][j-1]+1;
    else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
  }
  const ops=[];let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){ops.push({type:'equal',left:i-1,right:j-1});i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){ops.push({type:'add',right:j-1});j--;}
    else{ops.push({type:'remove',left:i-1});i--;}
  }
  ops.reverse();
  return groupOps(ops,a,b,aOrig,bOrig);
}
function groupOps(rawOps,a,b,aOrig,bOrig){
  const grouped=[];let gi=-1;
  for(const op of rawOps){
    if(op.type==='equal'){grouped.push({...op,group:'equal'});gi=-1;}
    else{if(gi<0||grouped[gi].group!=='change'){grouped.push({group:'change',items:[]});gi=grouped.length-1;}grouped[gi].items.push(op);}
  }
  const result=[];let stats={added:0,removed:0,modified:0,total:0};
  for(const g of grouped){
    if(g.group==='equal'){result.push({type:'equal',leftNum:g.left+1,rightNum:g.right+1,leftText:aOrig[g.left],rightText:bOrig[g.right]});}
    else{
      const rm=[],ad=[];
      for(const x of g.items){if(x.type==='remove')rm.push(x);else ad.push(x);}
      const mx=Math.max(rm.length,ad.length);
      stats.modified+=Math.min(rm.length,ad.length);
      stats.removed+=Math.max(0,rm.length-ad.length);
      stats.added+=Math.max(0,ad.length-rm.length);
      for(let k=0;k<mx;k++){
        if(rm[k]&&ad[k])result.push({type:'modified',leftNum:rm[k].left+1,rightNum:ad[k].right+1,leftText:aOrig[rm[k].left],rightText:bOrig[ad[k].right]});
        else if(rm[k])result.push({type:'removed',leftNum:rm[k].left+1,rightNum:null,leftText:aOrig[rm[k].left],rightText:''});
        else result.push({type:'added',leftNum:null,rightNum:ad[k].right+1,leftText:'',rightText:bOrig[ad[k].right]});
      }
    }
  }
  stats.total=result.length;
  return{ops:result,stats};
}

function computeCharDiff(s,t){
  const ignoreChars=$('optIgnoreChars').value;
  let re=null;
  if(ignoreChars){
    const escaped=ignoreChars.split('').map(c=>c.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&')).join('');
    re=new RegExp('['+escaped+']','g');
  }
  const aClean=[...s.replace(re,'')];
  const bClean=[...t.replace(re,'')];
  const m=aClean.length,n=bClean.length;
  const dp=Array.from({length:m+1},()=>new Uint32Array(n+1));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    if(aClean[i-1]===bClean[j-1])dp[i][j]=dp[i-1][j-1]+1;else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
  }
  const delClean=new Set(),insClean=new Set();let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&aClean[i-1]===bClean[j-1]){i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){insClean.add(j-1);j--;}
    else{delClean.add(i-1);i--;}
  }
  const delStatus=new Map(),insStatus=new Map();
  const sChars=[...s],tChars=[...t];
  let ci=0;
  for(let k=0;k<sChars.length;k++){
    if(re&&re.test(sChars[k])){re.lastIndex=0;delStatus.set(k,'same');}
    else{delStatus.set(k,delClean.has(ci)?'del':'same');ci++;}
  }
  ci=0;
  for(let k=0;k<tChars.length;k++){
    if(re&&re.test(tChars[k])){re.lastIndex=0;insStatus.set(k,'same');}
    else{insStatus.set(k,insClean.has(ci)?'ins':'same');ci++;}
  }
  const old=[],newArr=[];
  for(let k=0;k<sChars.length;k++)old.push({ch:sChars[k],type:delStatus.get(k)});
  for(let k=0;k<tChars.length;k++)newArr.push({ch:tChars[k],type:insStatus.get(k)});
  return{old,new:newArr};
}

function renderDiff(){
  if(!diffResult)return;
  try{
  const orig=diffResult.ops;
  let used=false;
  if($('searchBar').style.display!=='none'&&$('searchTop').checked&&_searchMatches.length>0){
    const matchSet=new Set();
    for(const m of _searchMatches){
      if(m.side==='left')matchSet.add('left:'+m.ln);
      else matchSet.add('right:'+m.ln);
    }
    const sorted=orig.slice().sort((a,b)=>{
      const aM=matchSet.has('left:'+a.leftNum)||matchSet.has('right:'+a.rightNum);
      const bM=matchSet.has('left:'+b.leftNum)||matchSet.has('right:'+b.rightNum);
      return(aM?0:1)-(bM?0:1);
    });
    diffResult.ops=sorted;used=true;
  }else if(getOpt('diffTop')){
    const sorted=orig.slice().sort((a,b)=>{const o={removed:0,modified:1,added:2,equal:3};return(o[a.type]??3)-(o[b.type]??3);});
    diffResult.ops=sorted;used=true;
  }
  if(view==='side')renderSideBySide();else renderInline();
  if(used)diffResult.ops=orig;
  setupLineNumClick();
  }catch(e){console.error('renderDiff error:',e);}
}

function renderSideBySide(){
  const showLN=getOpt('lineNum'),charDiff=getOpt('charDiff'),wrap=getOpt('wrap');
  const wc=wrap?' wrap':'';
  let leftHTML='',rightHTML='';
  for(const op of diffResult.ops){
    if(op.type==='equal'){
      leftHTML+=`<div class="line equal">${lnNum(op.leftNum,showLN,'left')}<div class="line-content${wc}" data-side="left" data-ln="${op.leftNum}">${esc(op.leftText)||' '}</div></div>`;
      rightHTML+=`<div class="line equal">${lnNum(op.rightNum,showLN,'right')}<div class="line-content${wc}" data-side="right" data-ln="${op.rightNum}">${esc(op.rightText)||' '}</div></div>`;
    }else if(op.type==='modified'){
      let l=esc(op.leftText)||' ',r=esc(op.rightText)||' ';
      if(charDiff){const cd=computeCharDiff(op.leftText,op.rightText);l=renderChars(cd.old);r=renderChars(cd.new);if(!l)l=' ';if(!r)r=' ';}
      leftHTML+=`<div class="line modified">${lnNum(op.leftNum,showLN,'left')}<div class="line-content${wc}" data-side="left" data-ln="${op.leftNum}">${l}</div></div>`;
      rightHTML+=`<div class="line modified">${lnNum(op.rightNum,showLN,'right')}<div class="line-content${wc}" data-side="right" data-ln="${op.rightNum}">${r}</div></div>`;
    }else if(op.type==='removed'){
      leftHTML+=`<div class="line removed">${lnNum(op.leftNum,showLN,'left')}<div class="line-content${wc}" data-side="left" data-ln="${op.leftNum}">${esc(op.leftText)}</div></div>`;
      rightHTML+=`<div class="line removed">${lnNumEmpty(showLN)}<div class="line-content${wc}"> </div></div>`;
    }else if(op.type==='added'){
      leftHTML+=`<div class="line added">${lnNumEmpty(showLN)}<div class="line-content${wc}"> </div></div>`;
      rightHTML+=`<div class="line added">${lnNum(op.rightNum,showLN,'right')}<div class="line-content${wc}" data-side="right" data-ln="${op.rightNum}">${esc(op.rightText)}</div></div>`;
    }
  }
  $('scrollLeft').innerHTML=leftHTML||'<div class="placeholder">兩側文字完全相同</div>';
  $('scrollRight').innerHTML=rightHTML||'<div class="placeholder">兩側文字完全相同</div>';
  setupSelectable();setupSyncScroll();syncRowHeights();
}

function syncRowHeights(){
  if(view!=='side')return;
  const lLines=$('scrollLeft').querySelectorAll('.line');
  const rLines=$('scrollRight').querySelectorAll('.line');
  const len=Math.min(lLines.length,rLines.length);
  for(let i=0;i<len;i++){
    lLines[i].style.minHeight='';
    rLines[i].style.minHeight='';
  }
  for(let i=0;i<len;i++){
    const h=Math.max(lLines[i].offsetHeight,rLines[i].offsetHeight);
    lLines[i].style.minHeight=h+'px';
    rLines[i].style.minHeight=h+'px';
  }
}

function renderInline(){
  const showLN=getOpt('lineNum'),charDiff=getOpt('charDiff'),wrap=getOpt('wrap'),expand=getOpt('inlineExpand');
  const wc=wrap?' wrap':'';
  let html='';
  for(const op of diffResult.ops){
    if(op.type==='equal'){
      if(expand){
        const lnL=showLN?`<div class="line-num" data-side="left" data-ln="${op.leftNum}">${op.leftNum}</div><div class="line-num"></div>`:'';
        const lnR=showLN?`<div class="line-num"></div><div class="line-num" data-side="right" data-ln="${op.rightNum}">${op.rightNum}</div>`:'';
        html+=`<div class="line equal">${lnL}<div class="line-content${wc}" data-side="left" data-ln="${op.leftNum}">${esc(op.leftText)||' '}</div></div>`;
        html+=`<div class="line equal">${lnR}<div class="line-content${wc}" data-side="right" data-ln="${op.rightNum}">${esc(op.rightText)||' '}</div></div>`;
      }else{
        const ln=showLN?`<div class="line-num" data-side="left" data-ln="${op.leftNum}">${op.leftNum}</div><div class="line-num" data-side="right" data-ln="${op.rightNum}">${op.rightNum}</div>`:'';
        html+=`<div class="line equal">${ln}<div class="line-content${wc}" data-side="left" data-ln="${op.leftNum}">${esc(op.leftText)||' '}</div></div>`;
      }
    }else if(op.type==='modified'){
      let l=esc(op.leftText)||' ',r=esc(op.rightText)||' ';
      if(charDiff){const cd=computeCharDiff(op.leftText,op.rightText);l=renderChars(cd.old);r=renderChars(cd.new);if(!l)l=' ';if(!r)r=' ';}
      const lnL=showLN?`<div class="line-num" style="color:var(--red)" data-side="left" data-ln="${op.leftNum}">${op.leftNum}</div>`:'';
      const lnR=showLN?`<div class="line-num" style="color:var(--green)" data-side="right" data-ln="${op.rightNum}">${op.rightNum}</div>`:'';
      html+=`<div class="line removed">${lnL}${lnR}<div class="line-content${wc}" data-side="left" data-ln="${op.leftNum}">${l}</div></div>`;
      html+=`<div class="line added">${lnL}${lnR}<div class="line-content${wc}" data-side="right" data-ln="${op.rightNum}">${r}</div></div>`;
    }else if(op.type==='removed'){
      const ln=showLN?`<div class="line-num" style="color:var(--red)" data-side="left" data-ln="${op.leftNum}">${op.leftNum}</div><div class="line-num"></div>`:'';
      html+=`<div class="line removed">${ln}<div class="line-content${wc}" data-side="left" data-ln="${op.leftNum}">${esc(op.leftText)}</div></div>`;
    }else if(op.type==='added'){
      const ln=showLN?`<div class="line-num"></div><div class="line-num" style="color:var(--green)" data-side="right" data-ln="${op.rightNum}">${op.rightNum}</div>`:'';
      html+=`<div class="line added">${ln}<div class="line-content${wc}" data-side="right" data-ln="${op.rightNum}">${esc(op.rightText)}</div></div>`;
    }
  }
  $('scrollLeft').innerHTML=html||'<div class="placeholder">兩側文字完全相同</div>';
  setupSelectable();
}

function setupLineNumClick(){
  document.querySelectorAll('.diff-scroll.visible .line-num[data-side]').forEach(el=>{
    if(el.dataset.lnBound)return;
    el.dataset.lnBound='1';
    el.style.cursor='pointer';
    el.addEventListener('click',()=>{
      const side=el.dataset.side;
      const ln=parseInt(el.dataset.ln);
      if(isNaN(ln))return;
      const scrollEl=side==='left'?$('scrollLeft'):$('scrollRight');
      const contentEl=scrollEl.querySelector(`.line-content[data-side="${side}"][data-ln="${ln}"]`);
      if(!contentEl)return;
      contentEl.focus();
      const range=document.createRange();
      range.selectNodeContents(contentEl);
      const sel=window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
  });
}

function lnNum(v,show,side){return show?`<div class="line-num" data-side="${side}" data-ln="${v}">${v}</div>`:'';}
function lnNumEmpty(show){return show?`<div class="line-num"></div>`:'';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderChars(segs){return segs.map(s=>s.type==='same'?esc(s.ch):`<span class="char-${s.type==='del'?'del':'ins'}">${esc(s.ch)}</span>`).join('');}

function setupSyncScroll(){
  if(view!=='side')return;
  const sl=$('scrollLeft'),sr=$('scrollRight');
  let syncing=false;
  sl.onscroll=()=>{if(!syncing&&getOpt('charDiff')===undefined||true){syncing=true;sr.scrollTop=sl.scrollTop;syncing=false;}};
  sr.onscroll=()=>{if(!syncing){syncing=true;sl.scrollTop=sr.scrollTop;syncing=false;}};
  if(window._rowHeightRO)window._rowHeightRO.disconnect();
  window._rowHeightRO=new ResizeObserver(()=>syncRowHeights());
  window._rowHeightRO.observe(sl);
}

let _keyHandled=false;
let _editLineEl=null;
let _editSwitching=false;

function scheduleRediff(delay){
  if(_searchFocused)return;
  if(_rediffTimer)clearTimeout(_rediffTimer);
  _rediffTimer=setTimeout(()=>{_rediffTimer=null;rediff();},delay||300);
}

function rediff(){
  if(_rediffTimer){clearTimeout(_rediffTimer);_rediffTimer=null;}
  _rendering=true;
  diffResult=computeLineDiff(leftLines,rightLines,leftLinesOrig,rightLinesOrig);
  renderDiff();
  _rendering=false;
  if(!inputMode&&$('searchBar').style.display!=='none'&&_searchTerm){
    _searchMatches=findAllDiff(_searchTerm);
    _searchIdx=_searchMatches.length>0?Math.min(_searchIdx,_searchMatches.length-1):-1;
    highlightDiff();
    if(_searchIdx>=0)focusCurrent();
    $('searchCount').textContent=_searchMatches.length?`${_searchIdx+1} / ${_searchMatches.length}`:'無符合';
  }
}

function getSelectedText(el,range){
  const pre=document.createRange();
  pre.selectNodeContents(el);
  pre.setEnd(range.startContainer,range.startOffset);
  const before=pre.toString();
  const post=document.createRange();
  post.selectNodeContents(el);
  post.setStart(range.endContainer,range.endOffset);
  const after=post.toString();
  return{before,after};
}

function enterEditMode(el){
  if(_editLineEl===el)return;
  _editSwitching=true;
  exitEditMode();
  _editLineEl=el;
  el.contentEditable='true';
  el.spellcheck=false;
  el.dataset.orig=el.textContent;
  el.classList.add('editing');
  el.focus();
  el.addEventListener('blur',_onEditBlur);
  el.addEventListener('keydown',_onEditKeydown);
  setTimeout(()=>{_editSwitching=false;},0);
}

function exitEditMode(){
  if(!_editLineEl)return;
  const el=_editLineEl;
  _editLineEl=null;
  el.removeEventListener('blur',_onEditBlur);
  el.removeEventListener('keydown',_onEditKeydown);
  if(el.isConnected){el.contentEditable='false';el.classList.remove('editing');onEdit(el);}
}

function onEdit(el){
  if(!el.isConnected)return;
  const side=el.dataset.side,ln=parseInt(el.dataset.ln),newText=el.textContent;
  if(isNaN(ln))return;
  const arr=side==='left'?leftLines:rightLines;
  const arrOrig=side==='left'?leftLinesOrig:rightLinesOrig;
  const old=arrOrig[ln-1]||'';
  if(newText===old)return;
  arrOrig[ln-1]=newText;
  arr[ln-1]=applyOpts([newText])[0];
  el.dataset.orig=newText;
  syncArrays();updateMetaDebounced();
  if($('searchBar').style.display==='none')rediff();else scheduleRediff(500);
}

function syncArrays(){
  leftText=leftLinesOrig.join('\n');rightText=rightLinesOrig.join('\n');
  $('inputLeft').value=leftText;$('inputRight').value=rightText;
}

function _onEditBlur(){setTimeout(()=>{if(!_editSwitching&&!_searchFocused&&_editLineEl&&$('searchBar').style.display==='none')exitEditMode();},0);}

function _onEditKeydown(e){
  const el=_editLineEl||e.target;
  if(!el||!el.dataset.side)return;
  const side=el.dataset.side,ln=parseInt(el.dataset.ln);
  if(isNaN(ln))return;
  const arr=side==='left'?leftLinesOrig:rightLinesOrig;
  const arrProc=side==='left'?leftLines:rightLines;
  if(e.key==='Escape'){
    e.preventDefault();
    el.textContent=el.dataset.orig||'';
    exitEditMode();
    return;
  }
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    _keyHandled=true;
    const sel=window.getSelection();
    const range=sel.getRangeAt(0);
    const{before,after}=getSelectedText(el,range);
    arr[ln-1]=before;
    arr.splice(ln,0,after);
    arrProc[ln-1]=applyOpts([before])[0];
    arrProc.splice(ln,0,applyOpts([after])[0]);
    syncArrays();updateMetaDebounced();
    if($('searchBar').style.display==='none')rediff();else scheduleRediff(500);
    setTimeout(()=>{
      _keyHandled=false;
      const newEl=document.querySelector(`.line-content[data-side="${side}"][data-ln="${ln+1}"]`);
      if(newEl)enterEditMode(newEl);
    },0);
    return;
  }
  if(e.key==='Backspace'){
    const sel=window.getSelection();
    const range=sel.getRangeAt(0);
    if(!range.collapsed){
      e.preventDefault();
      _keyHandled=true;
      const{before,after}=getSelectedText(el,range);
      const newText=before+after;
      const old=arr[ln-1]||'';
      if(newText!==old){arr[ln-1]=newText;arrProc[ln-1]=applyOpts([newText])[0];syncArrays();updateMetaDebounced();if($('searchBar').style.display==='none')rediff();else scheduleRediff(500);}
      setTimeout(()=>{_keyHandled=false;},0);
      return;
    }
    const pre=range.cloneRange();
    pre.selectNodeContents(el);
    pre.setEnd(range.startContainer,range.startOffset);
    if(pre.toString().length===0&&ln>1){
      e.preventDefault();
      _keyHandled=true;
      const prevText=arr[ln-2]||'';
      const curText=el.textContent;
      arr[ln-2]=prevText+curText;
      arr.splice(ln-1,1);
      arrProc[ln-2]=applyOpts([prevText+curText])[0];
      arrProc.splice(ln-1,1);
      syncArrays();updateMetaDebounced();if($('searchBar').style.display==='none')rediff();else scheduleRediff(500);
      setTimeout(()=>{
        _keyHandled=false;
        const newEl=document.querySelector(`.line-content[data-side="${side}"][data-ln="${ln-1}"]`);
        if(newEl)enterEditMode(newEl);
      },0);
    }
  }
  if(e.key==='Delete'){
    const sel=window.getSelection();
    const range=sel.getRangeAt(0);
    if(!range.collapsed){
      e.preventDefault();
      _keyHandled=true;
      const{before,after}=getSelectedText(el,range);
      const newText=before+after;
      const old=arr[ln-1]||'';
      if(newText!==old){arr[ln-1]=newText;arrProc[ln-1]=applyOpts([newText])[0];syncArrays();updateMetaDebounced();if($('searchBar').style.display==='none')rediff();else scheduleRediff(500);}
      setTimeout(()=>{_keyHandled=false;},0);
      return;
    }
    const pre=range.cloneRange();
    pre.selectNodeContents(el);
    pre.setEnd(range.endContainer,range.endOffset);
    if(pre.toString().length===el.textContent.length&&ln<arr.length){
      e.preventDefault();
      _keyHandled=true;
      const curText=el.textContent;
      const nextText=arr[ln]||'';
      arr[ln-1]=curText+nextText;
      arr.splice(ln,1);
      arrProc[ln-1]=applyOpts([curText+nextText])[0];
      arrProc.splice(ln,1);
      syncArrays();updateMetaDebounced();if($('searchBar').style.display==='none')rediff();else scheduleRediff(500);
      setTimeout(()=>{
        _keyHandled=false;
        const newEl=document.querySelector(`.line-content[data-side="${side}"][data-ln="${ln}"]`);
        if(newEl)enterEditMode(newEl);
      },0);
    }
  }
}

function insertLineAfter(side,ln){
  const arr=side==='left'?leftLinesOrig:rightLinesOrig;
  const arrProc=side==='left'?leftLines:rightLines;
  arr.splice(ln,0,'');
  arrProc.splice(ln,0,'');
  syncArrays();updateMetaDebounced();scheduleRediff(300);
  setTimeout(()=>{
    const newEl=document.querySelector(`.line-content[data-side="${side}"][data-ln="${ln+1}"]`);
    if(newEl){enterEditMode(newEl);}
  },50);
}

function deleteLine(side,ln){
  const arr=side==='left'?leftLinesOrig:rightLinesOrig;
  const arrProc=side==='left'?leftLines:rightLines;
  if(arr.length<=1)return;
  arr.splice(ln-1,1);
  arrProc.splice(ln-1,1);
  syncArrays();updateMetaDebounced();scheduleRediff(300);
  setTimeout(()=>{
    const focusLn=Math.min(ln,arr.length);
    const newEl=document.querySelector(`.line-content[data-side="${side}"][data-ln="${focusLn}"]`);
    if(newEl)enterEditMode(newEl);
  },50);
}

document.addEventListener('keydown',e=>{
  if(e.isComposing)return;
  if(!e.ctrlKey&&!e.metaKey)return;
  const el=document.activeElement;
  if(!el||!el.classList.contains('line-content'))return;
  const side=el.dataset.side,ln=parseInt(el.dataset.ln);
  if(isNaN(ln)||!side)return;
  if(e.key==='Enter'){
    e.preventDefault();e.stopPropagation();
    insertLineAfter(side,ln);
  }else if(e.key==='Delete'){
    e.preventDefault();e.stopPropagation();
    deleteLine(side,ln);
  }
},true);

function setupSelectable(){
  const selectMode=getSelectMode();
  document.querySelectorAll('.diff-scroll.visible .line-content[data-side]').forEach(el=>{
    if(el.dataset.selBound)return;
    el.dataset.selBound='1';
    if(selectMode){
      el.contentEditable='false';
      el.addEventListener('dblclick',()=>{enterEditMode(el);});
    }else{
      el.contentEditable='true';el.spellcheck=false;
      el.dataset.orig=el.textContent;
      const side=el.dataset.side,ln=parseInt(el.dataset.ln);
      const arr=side==='left'?leftLinesOrig:rightLinesOrig;
      const arrProc=side==='left'?leftLines:rightLines;
      el.addEventListener('mousedown',()=>{_editSwitching=true;setTimeout(()=>{_editSwitching=false;},0);});
      el.addEventListener('input',()=>{
        if(!el.isConnected)return;
        arr[ln-1]=el.textContent;
        arrProc[ln-1]=applyOpts([el.textContent])[0];
        el.dataset.orig=el.textContent;
        syncArrays();updateMetaDebounced();
        scheduleRediff(300);
      });
      el.addEventListener('blur',()=>{
        if(!el.isConnected||_rendering||_searchFocused)return;
        if($('searchBar').style.display!=='none')return;
        if(!_editSwitching)rediff();
      });
    }
  });
}

function setupLineNumClick(){
  document.querySelectorAll('.diff-scroll.visible .line-num[data-side]').forEach(el=>{
    if(el.dataset.lnBound)return;
    el.dataset.lnBound='1';
    el.style.cursor='pointer';
    el.addEventListener('click',()=>{
      const side=el.dataset.side;
      const ln=parseInt(el.dataset.ln);
      if(isNaN(ln))return;
      const scrollEl=side==='left'?$('scrollLeft'):$('scrollRight');
      const contentEl=scrollEl.querySelector(`.line-content[data-side="${side}"][data-ln="${ln}"]`);
      if(!contentEl)return;
      const range=document.createRange();
      range.selectNodeContents(contentEl);
      const sel=window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
  });
}

function getSelectedText(el,range){
  const pre=document.createRange();
  pre.selectNodeContents(el);
  pre.setEnd(range.startContainer,range.startOffset);
  const before=pre.toString();
  const post=document.createRange();
  post.selectNodeContents(el);
  post.setStart(range.endContainer,range.endOffset);
  const after=post.toString();
  return{before,after};
}

function updateGutter(side){
  const ta=side==='left'?$('inputLeft'):$('inputRight');
  const gutter=side==='left'?$('gutterLeft'):$('gutterRight');
  const show=getOpt('lineNum');
  gutter.classList.toggle('visible',show&&inputMode);
  ta.classList.toggle('with-gutter',show&&inputMode);
  if(!show||!inputMode)return;
  const lines=(ta.value||'').split('\n');
  const lineH=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--diff-line-height'))||24;
  let h='';
  for(let i=1;i<=lines.length;i++){
    h+=`<div class="ln-line" style="height:${lineH}px;line-height:${lineH}px">${i}</div>`;
  }
  gutter.innerHTML=h;
  gutter.scrollTop=ta.scrollTop;
}

function syncGutterScroll(side){
  const ta=side==='left'?$('inputLeft'):$('inputRight');
  const gutter=side==='left'?$('gutterLeft'):$('gutterRight');
  gutter.scrollTop=ta.scrollTop;
}
['inputLeft','inputRight'].forEach(id=>{
  $(id).addEventListener('input',()=>{updateGutter(id==='inputLeft'?'left':'right');});
  $(id).addEventListener('scroll',()=>{syncGutterScroll(id==='inputLeft'?'left':'right');});
});
function refreshGutters(){updateGutter('left');updateGutter('right');}
displayOpts.concat(['optLineNum']).forEach(id=>{$(id).addEventListener('change',()=>{if(inputMode)refreshGutters();});});
['optShowA','optShowB'].forEach(id=>{
  $(id).addEventListener('change',function(){
    const other=id==='optShowA'?'optShowB':'optShowA';
    if(!this.checked&&!$(other).checked){this.checked=true;showToast('至少顯示一欄');return;}
    localStorage.setItem('diffpro-'+id,this.checked?'1':'0');
    if(inputMode){$('colLeft').style.display=isShowSide('left')?'':'none';$('colRight').style.display=isShowSide('right')?'':'none';refreshGutters();}
    else{if(view==='side'){$('colLeft').style.display=isShowSide('left')?'':'none';$('colRight').style.display=isShowSide('right')?'':'none';}rediff();}
    updateMeta('left');updateMeta('right');
  });
});
(function(){
  if(localStorage.getItem('diffpro-optShowA')==='0')$('optShowA').checked=false;
  if(localStorage.getItem('diffpro-optShowB')==='0')$('optShowB').checked=false;
  if(isShowSide('left')===false)$('colLeft').style.display='none';
  if(isShowSide('right')===false)$('colRight').style.display='none';
})();

function download(name,content,type){
  const blob=new Blob([content],{type:type+';charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
  URL.revokeObjectURL(a.href);
}
function escRtf(s){return s.replace(/\\/g,'\\\\').replace(/{/g,'\\{').replace(/}/g,'\\}').replace(/\n/g,'\\par ');}
